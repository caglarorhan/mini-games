<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Tetris — Mini Games Arcade</title>
<style>
  :root {
    --bg-dark: #0f0a1e;
    --bg-card: #1a1333;
    --border: #2a1f4e;
    --pink: #ff6b9d;
    --orange: #ff8a47;
    --yellow: #ffd166;
    --green: #06d6a0;
    --cyan: #00e5ff;
    --blue: #118ab2;
    --purple: #a855f7;
    --deep-purple: #7c3aed;
    --text-light: #f0e6ff;
    --text-muted: #a99ec4;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text-light);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-x: hidden;
  }

  /* ── Floating background blobs ── */
  .bg-shapes {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-shapes .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: blobFloat 20s ease-in-out infinite alternate;
  }

  .blob:nth-child(1) { width: 350px; height: 350px; background: var(--cyan); top: -10%; right: -5%; animation-duration: 24s; }
  .blob:nth-child(2) { width: 300px; height: 300px; background: var(--pink); bottom: -5%; left: -5%; animation-duration: 20s; animation-delay: -6s; }
  .blob:nth-child(3) { width: 250px; height: 250px; background: var(--yellow); top: 40%; left: 50%; animation-duration: 28s; animation-delay: -12s; }

  @keyframes blobFloat {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -20px) scale(1.1); }
    100% { transform: translate(-20px, 30px) scale(0.95); }
  }

  /* ── Page content ── */
  .page-content {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Top nav bar ── */
  .top-bar {
    width: 100%;
    max-width: 760px;
    padding: 20px 16px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 50px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.2s;
  }

  .back-link:hover {
    color: var(--cyan);
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.05);
  }

  .game-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--cyan), var(--blue));
    color: white;
    padding: 5px 14px;
    border-radius: 50px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Header ── */
  header {
    width: 100%;
    text-align: center;
    padding: 24px 0 12px;
  }

  .title {
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan), var(--green), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .title-sub {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── Game wrapper ── */
  .game-wrap {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 20px;
    padding: 20px 16px 40px;
    width: 100%;
    max-width: 720px;
  }

  /* ── HUD (top info bar) ── */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    gap: 10px;
    width: 300px;
    margin-bottom: 10px;
  }

  .hud-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    flex: 1;
    text-align: center;
  }

  .hud-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .hud-value {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--cyan);
  }

  .hud-box:nth-child(2) .hud-value { color: var(--pink); }
  .hud-box:nth-child(3) .hud-value { color: var(--yellow); }

  /* ── Board column ── */
  .board-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Canvas ── */
  #board {
    border: 2px solid var(--purple);
    box-shadow: 0 0 15px rgba(168,85,247,0.3), 0 0 40px rgba(168,85,247,0.1), inset 0 0 40px rgba(168,85,247,0.05);
    display: block;
    background: #0a0618;
    border-radius: 4px;
    image-rendering: pixelated;
  }

  /* ── Side panel ── */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-top: 4px;
    min-width: 120px;
  }

  .panel-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px;
  }

  .panel-box h3 {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 700;
  }

  #next-canvas {
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }

  /* ── Speed toggle ── */
  .speed-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .speed-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 7px 10px;
    cursor: pointer;
    border-radius: 10px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    text-align: left;
  }

  .speed-btn:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(168,85,247,0.06);
  }

  .speed-btn.active {
    border-color: var(--purple);
    color: white;
    background: linear-gradient(135deg, var(--purple), var(--deep-purple));
  }

  /* ── Controls hint ── */
  .controls-hint {
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 2;
    letter-spacing: 0.3px;
  }

  .controls-hint span {
    color: var(--yellow);
    font-weight: 700;
  }

  /* ── Overlay ── */
  .board-wrapper {
    position: relative;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(15,10,30,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
    backdrop-filter: blur(4px);
    border-radius: 4px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1.8;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  .overlay-sub {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-align: center;
    line-height: 2;
  }

  .start-btn {
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.85rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    border: none;
    color: white;
    padding: 14px 30px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 50px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(168,85,247,0.3);
  }

  .start-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 30px rgba(168,85,247,0.5);
  }

  .start-btn:active {
    transform: scale(0.97);
  }

  /* ── Level indicator bar ── */
  .level-bar-wrap {
    width: 300px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  #level-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange));
    width: 0%;
    transition: width 0.3s;
    border-radius: 4px;
    box-shadow: 0 0 8px rgba(168,85,247,0.4);
  }

  /* ── Mobile controls ── */
  .mobile-controls {
    display: none;
    gap: 8px;
    padding: 10px 16px 30px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 360px;
    width: 100%;
  }

  .mobile-btn {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-light);
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .mobile-btn:active {
    background: var(--purple);
    border-color: var(--purple);
    transform: scale(0.92);
  }

  .mobile-btn-wide {
    width: 132px;
  }

  .mobile-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }

  /* ── Footer ── */
  .game-footer {
    text-align: center;
    padding: 20px;
    color: var(--text-muted);
    font-size: 0.78rem;
  }

  .game-footer a {
    color: var(--cyan);
    text-decoration: none;
  }

  .game-footer a:hover {
    text-decoration: underline;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .game-wrap {
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 12px 8px 20px;
    }

    .hud { width: 260px; }
    .level-bar-wrap { width: 260px; }

    #board {
      width: 260px !important;
      height: 520px !important;
    }

    .side-panel {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      min-width: unset;
      width: 100%;
      max-width: 360px;
    }

    .panel-box {
      flex: 1;
      min-width: 100px;
    }

    .mobile-controls {
      display: flex;
    }
  }
</style>
</head>
<body>

<!-- Background blobs -->
<div class="bg-shapes">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="page-content">

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="back-link">&#8592; Home</a>

  </div>

  <header>
    <div class="title">&#129521; Tetris</div>

    <div class="board-col">

            &#8593; Rotate &nbsp; &#8592; &#8594; Move<br>

      </div>

      <div class="panel-box">
        <h3>Speed</h3>
        <div class="speed-group">
          <button class="speed-btn" data-speed="slow">&#128034; Slow</button>
          <button class="speed-btn active" data-speed="normal">&#9889; Normal</button>
          <button class="speed-btn" data-speed="fast">&#128293; Fast</button>
        </div>

      <div class="panel-box">

  <div class="game-footer">

  </div>

<script>
// ═══════════════════════════════════════════
//  TETRIS ENGINE
// ═══════════════════════════════════════════

const COLS = 10;
const ROWS = 20;
const CELL = 30;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

// ── Piece definitions (using our arcade palette) ──
const PIECES = [
  { shape: [[1,1,1,1]], color: '#00e5ff', glow: '#00e5ff' },       // I - cyan
  { shape: [[1,1],[1,1]], color: '#ffd166', glow: '#ffd166' },      // O - yellow
  { shape: [[0,1,0],[1,1,1]], color: '#a855f7', glow: '#a855f7' },  // T - purple
  { shape: [[0,1,1],[1,1,0]], color: '#06d6a0', glow: '#06d6a0' },  // S - green
  { shape: [[1,1,0],[0,1,1]], color: '#ff6b9d', glow: '#ff6b9d' },  // Z - pink
  { shape: [[1,0,0],[1,1,1]], color: '#118ab2', glow: '#118ab2' },  // J - blue
  { shape: [[0,0,1],[1,1,1]], color: '#ff8a47', glow: '#ff8a47' },  // L - orange
];

// ── Speed settings ─────────────────────────
const SPEEDS = { slow: 700, normal: 400, fast: 150 };
let speedKey = 'normal';
let dropInterval = SPEEDS[speedKey];

// ── Game state ─────────────────────────────
let board = [];
let current = null;
let next = null;
let score = 0;
let lines = 0;
let level = 1;
let gameRunning = false;
let gamePaused = false;
let lastTime = 0;
let dropCounter = 0;
let animFrameId = null;

// ── DOM refs ───────────────────────────────
const scoreEl   = document.getElementById('score-val');
const linesEl   = document.getElementById('lines-val');
const levelEl   = document.getElementById('level-val');
const levelBar  = document.getElementById('level-bar');
const overlay   = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');
const startBtn  = document.getElementById('start-btn');

// ── Utility ────────────────────────────────
function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  const shape = p.shape.map(r => [...r]);
  return {
    shape,
    color: p.color,
    glow: p.glow,
    x: Math.floor((COLS - shape[0].length) / 2),
    y: 0,
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const out = Array.from({ length: cols }, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      out[c][rows - 1 - r] = shape[r][c];
  return out;
}

function collides(piece, dx, dy, shape) {
  if (dx === undefined) dx = 0;
  if (dy === undefined) dy = 0;
  if (!shape) shape = piece.shape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const nx = piece.x + c + dx;
      const ny = piece.y + r + dy;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
      if (ny >= 0 && board[ny][nx]) return true;
    }
  }
  return false;
}

function lock(piece) {
  piece.shape.forEach(function(row, r) {
    row.forEach(function(cell, c) {
      if (cell) {
        var y = piece.y + r;
        if (y < 0) { endGame(); return; }
        board[y][piece.x + c] = piece.color;
      }
    });
  });
  clearLines();
}

function clearLines() {
  var cleared = 0;
  for (var r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(function(c) { return c !== null; })) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared) {
    var pts = [0, 100, 300, 500, 800];
    score += (pts[cleared] || 800) * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    updateHUD();
  }
}

function updateHUD() {
  scoreEl.textContent = score.toLocaleString();
  linesEl.textContent = lines;
  levelEl.textContent = level;
  var pct = ((lines % 10) / 10) * 100;
  levelBar.style.width = pct + '%';
}

// ── Drawing ────────────────────────────────
function drawCell(context, x, y, color, size) {
  if (!size) size = CELL;
  var pad = 1;
  var s = size - pad * 2;

  var grad = context.createLinearGradient(x * size + pad, y * size + pad, x * size + size, y * size + size);
  grad.addColorStop(0, lighten(color, 0.35));
  grad.addColorStop(1, darken(color, 0.25));
  context.fillStyle = grad;

  var rx = x * size + pad;
  var ry = y * size + pad;
  var radius = Math.min(4, s / 4);
  context.beginPath();
  context.moveTo(rx + radius, ry);
  context.lineTo(rx + s - radius, ry);
  context.quadraticCurveTo(rx + s, ry, rx + s, ry + radius);
  context.lineTo(rx + s, ry + s - radius);
  context.quadraticCurveTo(rx + s, ry + s, rx + s - radius, ry + s);
  context.lineTo(rx + radius, ry + s);
  context.quadraticCurveTo(rx, ry + s, rx, ry + s - radius);
  context.lineTo(rx, ry + radius);
  context.quadraticCurveTo(rx, ry, rx + radius, ry);
  context.closePath();
  context.fill();

  // Top/left highlight
  context.fillStyle = 'rgba(255,255,255,0.18)';
  context.fillRect(x * size + pad, y * size + pad, s, 3);
  context.fillRect(x * size + pad, y * size + pad, 3, s);

  // Bottom/right shadow
  context.fillStyle = 'rgba(0,0,0,0.3)';
  context.fillRect(x * size + pad, y * size + size - pad - 3, s, 3);
  context.fillRect(x * size + size - pad - 3, y * size + pad, 3, s);
}

function lighten(hex, amt) { return adjustColor(hex, amt); }
function darken(hex, amt) { return adjustColor(hex, -amt); }

function adjustColor(hex, amt) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.max(0, Math.round(r + 255 * amt)));
  g = Math.min(255, Math.max(0, Math.round(g + 255 * amt)));
  b = Math.min(255, Math.max(0, Math.round(b + 255 * amt)));
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

function drawGhost() {
  if (!current) return;
  var ghostY = current.y;
  while (!collides(current, 0, ghostY - current.y + 1)) ghostY++;
  if (ghostY === current.y) return;

  current.shape.forEach(function(row, r) {
    row.forEach(function(cell, c) {
      if (!cell) return;
      var gx = current.x + c;
      var gy = ghostY + r;
      if (gy < 0 || gy >= ROWS) return;
      ctx.strokeStyle = current.color + '44';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.strokeRect(gx * CELL + 3, gy * CELL + 3, CELL - 6, CELL - 6);
      ctx.setLineDash([]);
    });
  });
}

function drawBoard() {
  ctx.fillStyle = '#0a0618';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle grid dots
  ctx.fillStyle = 'rgba(168,85,247,0.08)';
  for (var c = 0; c <= COLS; c++) {
    for (var r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.arc(c * CELL, r * CELL, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Locked cells
  board.forEach(function(row, r) {
    row.forEach(function(color, c) {
      if (color) drawCell(ctx, c, r, color);
    });
  });

  drawGhost();

  if (current) {
    current.shape.forEach(function(row, r) {
      row.forEach(function(cell, c) {
        if (cell) drawCell(ctx, current.x + c, current.y + r, current.color);
      });
    });
  }
}

function drawNext() {
  nextCtx.clearRect(0, 0, 80, 80);
  if (!next) return;

  var s = 16;
  var offX = Math.floor((4 - next.shape[0].length) / 2);
  var offY = Math.floor((4 - next.shape.length) / 2);

  next.shape.forEach(function(row, r) {
    row.forEach(function(cell, c) {
      if (cell) drawCell(nextCtx, offX + c, offY + r, next.color, s);
    });
  });
}

// ── Game loop ──────────────────────────────
function gameLoop(timestamp) {
  if (!gameRunning || gamePaused) return;
  var delta = timestamp - lastTime;
  lastTime = timestamp;
  dropCounter += delta;

  var levelSpeed = Math.max(dropInterval * 0.15, dropInterval - (level - 1) * 30);

  if (dropCounter >= levelSpeed) {
    moveDown();
    dropCounter = 0;
  }

  drawBoard();
  drawNext();
  animFrameId = requestAnimationFrame(gameLoop);
}

function moveDown() {
  if (collides(current, 0, 1)) {
    lock(current);
    current = next;
    next = randomPiece();
    dropCounter = 0;
    if (collides(current, 0, 0)) { endGame(); return; }
  } else {
    current.y++;
  }
}

// ── Keyboard controls ──────────────────────
document.addEventListener('keydown', function(e) {
  if (!gameRunning) return;

  if (e.code === 'KeyP') {
    togglePause(); return;
  }
  if (gamePaused) return;

  switch (e.code) {
    case 'ArrowLeft':
      if (!collides(current, -1, 0)) current.x--;
      e.preventDefault(); break;
    case 'ArrowRight':
      if (!collides(current, 1, 0)) current.x++;
      e.preventDefault(); break;
    case 'ArrowDown':
      moveDown();
      score += 1;
      updateHUD();
      e.preventDefault(); break;
    case 'ArrowUp':
      var rotated = rotate(current.shape);
      if (!collides(current, 0, 0, rotated)) {
        current.shape = rotated;
      } else if (!collides(current, 1, 0, rotated)) {
        current.x++; current.shape = rotated;
      } else if (!collides(current, -1, 0, rotated)) {
        current.x--; current.shape = rotated;
      }
      e.preventDefault(); break;
    case 'Space':
      var dropped = 0;
      while (!collides(current, 0, 1)) { current.y++; dropped++; }
      score += dropped * 2;
      updateHUD();
      moveDown();
      e.preventDefault(); break;
  }
  drawBoard();
});

// ── Mobile touch controls ──────────────────
(function setupMobileControls() {
  var btnLeft = document.getElementById('mb-left');
  var btnRight = document.getElementById('mb-right');
  var btnDown = document.getElementById('mb-down');
  var btnRotate = document.getElementById('mb-rotate');
  var btnDrop = document.getElementById('mb-drop');

  function tap(el, fn) {
    el.addEventListener('touchstart', function(e) { e.preventDefault(); fn(); }, { passive: false });
    el.addEventListener('click', fn);
  }

  tap(btnLeft, function() {
    if (!gameRunning || gamePaused || !current) return;
    if (!collides(current, -1, 0)) current.x--;
    drawBoard();
  });

  tap(btnRight, function() {
    if (!gameRunning || gamePaused || !current) return;
    if (!collides(current, 1, 0)) current.x++;
    drawBoard();
  });

  tap(btnDown, function() {
    if (!gameRunning || gamePaused || !current) return;
    moveDown();
    score += 1;
    updateHUD();
    drawBoard();
  });

  tap(btnRotate, function() {
    if (!gameRunning || gamePaused || !current) return;
    var r = rotate(current.shape);
    if (!collides(current, 0, 0, r)) {
      current.shape = r;
    } else if (!collides(current, 1, 0, r)) {
      current.x++; current.shape = r;
    } else if (!collides(current, -1, 0, r)) {
      current.x--; current.shape = r;
    }
    drawBoard();
  });

  tap(btnDrop, function() {
    if (!gameRunning || gamePaused || !current) return;
    var d = 0;
    while (!collides(current, 0, 1)) { current.y++; d++; }
    score += d * 2;
    updateHUD();
    moveDown();
    drawBoard();
  });
})();

// ── Speed buttons ──────────────────────────
document.querySelectorAll('.speed-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    speedKey = btn.dataset.speed;
    dropInterval = SPEEDS[speedKey];
    document.querySelectorAll('.speed-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

// ── Start / End / Pause ────────────────────
function startGame() {
  board = createBoard();
  score = 0; lines = 0; level = 1;
  updateHUD();
  current = randomPiece();
  next = randomPiece();
  gameRunning = true;
  gamePaused = false;
  dropCounter = 0;
  overlay.classList.add('hidden');
  lastTime = performance.now();
  cancelAnimationFrame(animFrameId);
  animFrameId = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrameId);
  overlayTitle.textContent = 'Game Over';
  overlaySub.innerHTML = 'Score: <span style="color:var(--cyan)">' + score.toLocaleString() + '</span><br>Lines: ' + lines + ' \u00b7 Level: ' + level;
  startBtn.textContent = 'Play Again';
  overlay.classList.remove('hidden');
}

function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  if (!gamePaused) {
    lastTime = performance.now();
    animFrameId = requestAnimationFrame(gameLoop);
    overlay.classList.add('hidden');
  } else {
    cancelAnimationFrame(animFrameId);
    overlayTitle.textContent = 'Paused';
    overlaySub.innerHTML = 'Press P to resume';
    startBtn.textContent = 'Resume';
    overlay.classList.remove('hidden');
  }
}

startBtn.addEventListener('click', function() {
  if (gamePaused) { togglePause(); return; }
  startGame();
});

// Initial draw
drawBoard();
drawNext();
</script>
