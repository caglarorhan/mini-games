<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔴 Connect Four — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--pink);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.bg-blob:nth-child(3){width:300px;height:300px;background:var(--blue);top:50%;left:50%;transform:translate(-50%,-50%)}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--pink),var(--yellow));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:460px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;min-width:70px;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.w-val{color:var(--green)}.l-val{color:var(--pink)}.d-val{color:var(--yellow)}.t-val{color:var(--cyan)}
.board-wrap{position:relative;background:var(--blue);border-radius:14px;padding:12px;box-shadow:0 0 30px rgba(17,138,178,.2)}
.board{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{aspect-ratio:1;background:var(--bg-dark);border-radius:50%;cursor:pointer;position:relative;transition:background .2s}
.cell.p1{background:#ff4444;box-shadow:inset 0 -3px 6px rgba(0,0,0,.3)}
.cell.p2{background:#ffd166;box-shadow:inset 0 -3px 6px rgba(0,0,0,.3)}
.cell.win{animation:winPulse .5s ease-in-out infinite alternate}
@keyframes winPulse{0%{transform:scale(1)}100%{transform:scale(1.1);box-shadow:0 0 15px rgba(255,255,255,.5)}}
.col-btns{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.col-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px;text-align:center;cursor:pointer;font-weight:700;font-size:.9rem;transition:all .2s;color:var(--text-muted)}
.col-btn:hover{background:rgba(255,255,255,.12);color:var(--text-light)}
.status{text-align:center;margin-top:14px;font-size:1.1rem;font-weight:700;min-height:28px}
.status .turn-p1{color:#ff4444}.status .turn-p2{color:#ffd166}
.restart-btn{display:block;margin:14px auto 0;background:linear-gradient(135deg,var(--pink),var(--yellow));color:#000;border:none;padding:10px 30px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:transform .15s}.restart-btn:hover{transform:translateY(-2px)}
@media(max-width:500px){header h1{font-size:1.5rem}.board-wrap{padding:8px}.board{gap:4px}.col-btns{gap:4px}.col-btn{padding:6px;font-size:.8rem}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🔴 Connect Four</span></div>
<header><h1>Connect Four</h1><p>Drop your discs — connect 4 in a row to win!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Wins</div><div class="value w-val" id="hWins">0</div></div>
        <div class="hud-box"><div class="label">Losses</div><div class="value l-val" id="hLosses">0</div></div>
        <div class="hud-box"><div class="label">Draws</div><div class="value d-val" id="hDraws">0</div></div>
        <div class="hud-box"><div class="label">Turn</div><div class="value t-val" id="hTurn">You</div></div>
    </div>
    <div class="board-wrap">
        <div class="col-btns" id="colBtns"></div>
        <div class="board" id="board"></div>
    </div>
    <div class="status" id="status">Your turn — drop a disc!</div>
    <button class="restart-btn" id="restartBtn">New Game</button>
</div>
<div class="game-footer">Connect Four &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_connect4',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const ROWS=6,COLS=7;
const boardEl=document.getElementById('board'),colBtnsEl=document.getElementById('colBtns'),statusEl=document.getElementById('status');
const hWins=document.getElementById('hWins'),hLosses=document.getElementById('hLosses'),hDraws=document.getElementById('hDraws'),hTurn=document.getElementById('hTurn');
let board,currentPlayer,gameOver,wins=0,losses=0,draws=0;
const BEST_KEY='connect4_wins';
wins=+localStorage.getItem(BEST_KEY)||0;hWins.textContent=wins;

function init(){
    board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    currentPlayer=1;gameOver=false;
    render();updateStatus();
}

function render(){
    boardEl.innerHTML='';colBtnsEl.innerHTML='';
    for(let c=0;c<COLS;c++){
        const btn=document.createElement('div');
        btn.className='col-btn';btn.textContent='▼';
        btn.addEventListener('click',()=>dropDisc(c));
        colBtnsEl.appendChild(btn);
    }
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const cell=document.createElement('div');
            cell.className='cell';
            if(board[r][c]===1)cell.classList.add('p1');
            if(board[r][c]===2)cell.classList.add('p2');
            cell.addEventListener('click',()=>dropDisc(c));
            cell.dataset.row=r;cell.dataset.col=c;
            boardEl.appendChild(cell);
        }
    }
}

function dropDisc(col){
    if(gameOver||currentPlayer!==1)return;
    const row=getEmptyRow(col);
    if(row===-1)return;
    board[row][col]=1;
    render();
    if(checkWin(1)){winGame('You win! 🎉');return;}
    if(isDraw()){drawGame();return;}
    currentPlayer=2;updateStatus();
    setTimeout(aiMove,400);
}

function aiMove(){
    if(gameOver)return;
    // Simple AI: check for winning move, then block, then center preference
    let bestCol=findWinningCol(2);
    if(bestCol===-1)bestCol=findWinningCol(1); // block player
    if(bestCol===-1){
        // Prefer center columns
        const pref=[3,2,4,1,5,0,6];
        for(const c of pref){if(getEmptyRow(c)!==-1){bestCol=c;break;}}
    }
    if(bestCol===-1)return;
    const row=getEmptyRow(bestCol);
    board[row][bestCol]=2;
    render();
    if(checkWin(2)){loseGame();return;}
    if(isDraw()){drawGame();return;}
    currentPlayer=1;updateStatus();
}

function findWinningCol(player){
    for(let c=0;c<COLS;c++){
        const r=getEmptyRow(c);
        if(r===-1)continue;
        board[r][c]=player;
        const w=checkWin(player);
        board[r][c]=0;
        if(w)return c;
    }
    return-1;
}

function getEmptyRow(col){for(let r=ROWS-1;r>=0;r--)if(board[r][col]===0)return r;return-1;}

function checkWin(player){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        if(board[r][c]!==player)continue;
        // Horizontal
        if(c+3<COLS&&board[r][c+1]===player&&board[r][c+2]===player&&board[r][c+3]===player)return highlightWin([[r,c],[r,c+1],[r,c+2],[r,c+3]]);
        // Vertical
        if(r+3<ROWS&&board[r+1][c]===player&&board[r+2][c]===player&&board[r+3][c]===player)return highlightWin([[r,c],[r+1,c],[r+2,c],[r+3,c]]);
        // Diagonal
        if(r+3<ROWS&&c+3<COLS&&board[r+1][c+1]===player&&board[r+2][c+2]===player&&board[r+3][c+3]===player)return highlightWin([[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]]);
        if(r+3<ROWS&&c-3>=0&&board[r+1][c-1]===player&&board[r+2][c-2]===player&&board[r+3][c-3]===player)return highlightWin([[r,c],[r+1,c-1],[r+2,c-2],[r+3,c-3]]);
    }
    return false;
}

function highlightWin(cells){
    setTimeout(()=>{
        cells.forEach(([r,c])=>{
            const idx=r*COLS+c;
            boardEl.children[idx].classList.add('win');
        });
    },50);
    return true;
}

function isDraw(){return board[0].every(c=>c!==0);}

function winGame(msg){gameOver=true;wins++;localStorage.setItem(BEST_KEY,wins);hWins.textContent=wins;statusEl.innerHTML='<span class="turn-p1">'+msg+'</span>';}
function loseGame(){gameOver=true;losses++;hLosses.textContent=losses;statusEl.innerHTML='<span class="turn-p2">AI wins! Try again!</span>';}
function drawGame(){gameOver=true;draws++;hDraws.textContent=draws;statusEl.innerHTML='<span style="color:var(--yellow)">It\'s a draw!</span>';}

function updateStatus(){
    hTurn.textContent=currentPlayer===1?'You':'AI';
    hTurn.style.color=currentPlayer===1?'#ff4444':'#ffd166';
    statusEl.innerHTML=currentPlayer===1?'<span class="turn-p1">Your turn — drop a disc!</span>':'<span class="turn-p2">AI is thinking...</span>';
}

document.getElementById('restartBtn').addEventListener('click',init);
init();
})();
</script>
</body>
</html>
