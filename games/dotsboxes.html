<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎯 Dots & Boxes — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--cyan);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.p-val{color:var(--cyan)}.a-val{color:var(--pink)}.w-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a;padding:12px}
canvas{display:block;width:100%;height:auto;margin:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--cyan);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎯 Dots & Boxes</span></div>
<header><h1>Dots & Boxes</h1><p>Connect dots to complete boxes!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">You</div><div class="value p-val" id="hYou">0</div></div>
        <div class="hud-box"><div class="label">CPU</div><div class="value a-val" id="hCPU">0</div></div>
        <div class="hud-box"><div class="label">Wins</div><div class="value w-val" id="hWins">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="350" height="350"></canvas>
        <div class="overlay" id="overlay">
            <h2>Dots & Boxes</h2>
            <div class="sub">Click between dots to draw lines.<br>Complete a box to score!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
</div>
<div class="game-footer">Dots & Boxes &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_dotsboxes',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=350,H=350;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hYou=document.getElementById('hYou'),hCPU=document.getElementById('hCPU'),hWins=document.getElementById('hWins');
const WINS_KEY='dotsboxes_wins';
let wins=+localStorage.getItem(WINS_KEY)||0;hWins.textContent=wins;
const SIZE=5;// 5x5 dots = 4x4 boxes
const GAP=W/(SIZE+1);
const DOT_R=5;
// Lines: horizontal[row][col] and vertical[row][col]
let hLines,vLines,boxes,playerScore,cpuScore,turn,state='idle';

function dotX(c){return GAP*(c+1);}
function dotY(r){return GAP*(r+1);}

function startGame(){
    hLines=Array.from({length:SIZE},()=>Array(SIZE-1).fill(0));
    vLines=Array.from({length:SIZE-1},()=>Array(SIZE).fill(0));
    boxes=Array.from({length:SIZE-1},()=>Array(SIZE-1).fill(0));
    playerScore=0;cpuScore=0;turn='player';
    hYou.textContent=0;hCPU.textContent=0;
    state='playing';overlay.classList.add('hidden');oScore.style.display='none';
    draw();
}

function checkBoxes(who){
    let scored=0;
    for(let r=0;r<SIZE-1;r++){
        for(let c=0;c<SIZE-1;c++){
            if(boxes[r][c])continue;
            if(hLines[r][c]&&hLines[r+1][c]&&vLines[r][c]&&vLines[r][c+1]){
                boxes[r][c]=who==='player'?1:2;
                if(who==='player')playerScore++;else cpuScore++;
                scored++;
            }
        }
    }
    hYou.textContent=playerScore;hCPU.textContent=cpuScore;
    return scored;
}

function gameOver(){
    const total=(SIZE-1)*(SIZE-1);
    return playerScore+cpuScore>=total;
}

function endGame(){
    state='over';
    if(playerScore>cpuScore){wins++;localStorage.setItem(WINS_KEY,wins);hWins.textContent=wins;}
    oScore.style.display='block';
    oScore.textContent=playerScore>cpuScore?'You Win! '+playerScore+'-'+cpuScore:
        playerScore<cpuScore?'CPU Wins! '+cpuScore+'-'+playerScore:'Draw! '+playerScore+'-'+cpuScore;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

function cpuMove(){
    if(state!=='playing'||turn!=='cpu')return;
    // Strategy: complete boxes first, else random non-giving move
    let best=null;
    // Try to complete
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE-1;c++){
            if(!hLines[r][c]){
                hLines[r][c]=1;const s=checkBoxes('cpu');hLines[r][c]=0;
                // undo checkBoxes side effects
                for(let br=0;br<SIZE-1;br++)for(let bc=0;bc<SIZE-1;bc++)if(boxes[br][bc]===2&&!isComplete(br,bc))boxes[br][bc]=0;
                cpuScore=countBoxes(2);hCPU.textContent=cpuScore;
                if(s>0){best={type:'h',r,c};break;}
            }
        }
        if(best)break;
    }
    if(!best){for(let r=0;r<SIZE-1;r++){for(let c=0;c<SIZE;c++){
        if(!vLines[r][c]){
            vLines[r][c]=1;const s=checkBoxes('cpu');vLines[r][c]=0;
            for(let br=0;br<SIZE-1;br++)for(let bc=0;bc<SIZE-1;bc++)if(boxes[br][bc]===2&&!isComplete(br,bc))boxes[br][bc]=0;
            cpuScore=countBoxes(2);hCPU.textContent=cpuScore;
            if(s>0){best={type:'v',r,c};break;}
        }
    }if(best)break;}}
    // Random
    if(!best){
        const moves=[];
        for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE-1;c++)if(!hLines[r][c])moves.push({type:'h',r,c});
        for(let r=0;r<SIZE-1;r++)for(let c=0;c<SIZE;c++)if(!vLines[r][c])moves.push({type:'v',r,c});
        if(moves.length)best=moves[Math.floor(Math.random()*moves.length)];
    }
    if(best){
        if(best.type==='h')hLines[best.r][best.c]=2;else vLines[best.r][best.c]=2;
        const scored=checkBoxes('cpu');
        draw();
        if(gameOver()){endGame();return;}
        if(scored>0)setTimeout(cpuMove,400);
        else turn='player';
    }
}

function isComplete(r,c){return hLines[r][c]&&hLines[r+1][c]&&vLines[r][c]&&vLines[r][c+1];}
function countBoxes(who){let n=0;for(let r=0;r<SIZE-1;r++)for(let c=0;c<SIZE-1;c++)if(boxes[r][c]===who)n++;return n;}

function handleClick(mx,my){
    if(state!=='playing'||turn!=='player')return;
    // Find closest line
    let bestDist=Infinity,bestLine=null;
    // Horizontal lines
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE-1;c++){
            if(hLines[r][c])continue;
            const cx=(dotX(c)+dotX(c+1))/2,cy=dotY(r);
            const d=Math.sqrt((mx-cx)**2+(my-cy)**2);
            if(d<bestDist){bestDist=d;bestLine={type:'h',r,c};}
        }
    }
    for(let r=0;r<SIZE-1;r++){
        for(let c=0;c<SIZE;c++){
            if(vLines[r][c])continue;
            const cx=dotX(c),cy=(dotY(r)+dotY(r+1))/2;
            const d=Math.sqrt((mx-cx)**2+(my-cy)**2);
            if(d<bestDist){bestDist=d;bestLine={type:'v',r,c};}
        }
    }
    if(!bestLine||bestDist>GAP*0.6)return;
    if(bestLine.type==='h')hLines[bestLine.r][bestLine.c]=1;
    else vLines[bestLine.r][bestLine.c]=1;
    const scored=checkBoxes('player');
    draw();
    if(gameOver()){endGame();return;}
    if(scored>0)return;// extra turn
    turn='cpu';setTimeout(cpuMove,500);
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Boxes
    for(let r=0;r<SIZE-1;r++){
        for(let c=0;c<SIZE-1;c++){
            if(boxes[r][c]){
                ctx.fillStyle=boxes[r][c]===1?'rgba(0,229,255,0.15)':'rgba(255,107,157,0.15)';
                ctx.fillRect(dotX(c),dotY(r),GAP,GAP);
            }
        }
    }
    // H-lines
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE-1;c++){
            if(hLines[r][c]){
                ctx.strokeStyle=hLines[r][c]===1?'#00e5ff':'#ff6b9d';ctx.lineWidth=3;
                ctx.beginPath();ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c+1),dotY(r));ctx.stroke();
            }
        }
    }
    // V-lines
    for(let r=0;r<SIZE-1;r++){
        for(let c=0;c<SIZE;c++){
            if(vLines[r][c]){
                ctx.strokeStyle=vLines[r][c]===1?'#00e5ff':'#ff6b9d';ctx.lineWidth=3;
                ctx.beginPath();ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c),dotY(r+1));ctx.stroke();
            }
        }
    }
    // Dots
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){
            ctx.fillStyle='#f0e6ff';ctx.beginPath();ctx.arc(dotX(c),dotY(r),DOT_R,0,Math.PI*2);ctx.fill();
        }
    }
    // Turn indicator
    ctx.fillStyle=turn==='player'?'#00e5ff':'#ff6b9d';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(turn==='player'?'Your Turn':'CPU Thinking...',W/2,H-8);
}

function getCanvasPos(e){
    const rect=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-rect.left)*(W/rect.width),y:(t.clientY-rect.top)*(H/rect.height)};
}

canvas.addEventListener('click',e=>{const p=getCanvasPos(e);handleClick(p.x,p.y);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=getCanvasPos(e);handleClick(p.x,p.y);},{passive:false});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
