<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird - Mini Games Arcade</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
    body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
    .bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
    .bg-blob:nth-child(2){width:350px;height:350px;background:var(--green);bottom:-80px;right:-80px}
    .bg-blob:nth-child(3){width:300px;height:300px;background:var(--orange);top:50%;left:50%;transform:translate(-50%,-50%)}
    .top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
    .back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:var(--green)}
    .game-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
    header{position:relative;z-index:10;text-align:center;padding:28px 20px 10px}
    header h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{color:var(--text-muted);margin-top:6px;font-size:.95rem}
    .game-container{position:relative;z-index:10;max-width:400px;margin:20px auto;padding:0 16px}
    .hud{display:flex;justify-content:space-around;margin-bottom:14px;gap:10px}
    .hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;text-align:center;min-width:90px}
    .hud-box .label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .hud-box .value{font-size:1.3rem;font-weight:800;margin-top:2px}
    .s-val{color:var(--yellow)}.b-val{color:var(--green)}
    .canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 0 30px rgba(255,209,102,.12);background:var(--bg-card)}
    canvas{display:block;width:100%;height:auto}
    .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.82);z-index:5;transition:opacity .3s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .overlay h2{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .overlay .sub{color:var(--text-muted);margin-bottom:18px;font-size:.95rem}
    .overlay .final-score{color:var(--yellow);font-size:1.3rem;font-weight:800;margin-bottom:14px}
    .start-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s}
    .start-btn:hover{transform:translateY(-2px)}
    .game-footer{position:relative;z-index:10;text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8rem;margin-top:20px}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar">
    <a href="../index.html" class="back-link">&#8592; Back to Games</a>
    <span class="game-badge">&#128038; Flappy</span>
</div>
<header><h1>Flappy Bird</h1><p>Tap to fly &mdash; don't hit the pipes!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value b-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="540"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Flappy Bird</h2>
            <div class="sub" id="oSub">Press Space or Tap to Fly</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Start</button>
        </div>
    </div>
</div>
<div class="game-footer">Flappy Bird &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_flappy',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
    const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
    const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest');

    let best=parseInt(localStorage.getItem('flappy_best')||'0',10);
    hBest.textContent=best;

    const GRAVITY=0.4,FLAP=-7,PIPE_W=52,GAP=140,PIPE_SPEED=2.5,BIRD_X=70,BIRD_R=14;
    let state='idle',bird,pipes,score,frame;

    function flap(){
        if(state==='idle'||state==='dead'){startGame();return;}
        bird.vy=FLAP;
    }

    document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
    canvas.addEventListener('click',flap);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
    document.getElementById('startBtn').addEventListener('click',e=>{e.stopPropagation();flap();});

    function startGame(){
        bird={y:H/2,vy:0};
        pipes=[];score=0;frame=0;
        state='running';
        overlay.classList.add('hidden');
        hScore.textContent='0';
        requestAnimationFrame(loop);
    }

    function die(){
        state='dead';
        if(score>best){best=score;localStorage.setItem('flappy_best',String(best));hBest.textContent=best;}
        oTitle.textContent='Game Over!';
        oSub.textContent='Tap or Space to Retry';
        oScore.style.display='block';oScore.textContent='Score: '+score;
        document.getElementById('startBtn').textContent='Retry';
        overlay.classList.remove('hidden');
    }

    function update(){
        frame++;
        // Bird
        bird.vy+=GRAVITY;
        bird.y+=bird.vy;
        if(bird.y+BIRD_R>H||bird.y-BIRD_R<0){die();return;}

        // Spawn pipes
        if(frame%90===0){
            const minTop=60,maxTop=H-GAP-60;
            const topH=minTop+Math.random()*(maxTop-minTop);
            pipes.push({x:W,topH:topH,scored:false});
        }

        // Move pipes
        for(let i=pipes.length-1;i>=0;i--){
            const p=pipes[i];
            p.x-=PIPE_SPEED;
            if(p.x+PIPE_W<0){pipes.splice(i,1);continue;}

            // Score
            if(!p.scored&&p.x+PIPE_W<BIRD_X){p.scored=true;score++;hScore.textContent=score;}

            // Collision
            if(BIRD_X+BIRD_R>p.x&&BIRD_X-BIRD_R<p.x+PIPE_W){
                if(bird.y-BIRD_R<p.topH||bird.y+BIRD_R>p.topH+GAP){die();return;}
            }
        }
    }

    function draw(){
        // Sky gradient
        const grd=ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0,'#0f0a1e');grd.addColorStop(0.7,'#1a1333');grd.addColorStop(1,'#2a1f4e');
        ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

        // Stars
        ctx.fillStyle='rgba(169,158,196,.3)';
        for(let i=0;i<25;i++){
            const sx=(i*137+frame*0.1)%W,sy=(i*97)%( H*0.6);
            ctx.beginPath();ctx.arc(sx,sy,1,0,Math.PI*2);ctx.fill();
        }

        // Ground
        ctx.fillStyle='#2a1f4e';ctx.fillRect(0,H-20,W,20);
        ctx.strokeStyle='#3d2d6b';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(0,H-20);ctx.lineTo(W,H-20);ctx.stroke();

        // Pipes
        for(const p of pipes){
            // Top pipe
            const pgrd=ctx.createLinearGradient(p.x,0,p.x+PIPE_W,0);
            pgrd.addColorStop(0,'#15803d');pgrd.addColorStop(0.5,'#22c55e');pgrd.addColorStop(1,'#15803d');
            ctx.fillStyle=pgrd;
            ctx.fillRect(p.x,0,PIPE_W,p.topH);
            ctx.fillRect(p.x-4,p.topH-18,PIPE_W+8,18);
            // Bottom pipe
            const botY=p.topH+GAP;
            ctx.fillRect(p.x,botY,PIPE_W,H-botY);
            ctx.fillRect(p.x-4,botY,PIPE_W+8,18);
            // Pipe edges
            ctx.strokeStyle='#166534';ctx.lineWidth=1;
            ctx.strokeRect(p.x,0,PIPE_W,p.topH);
            ctx.strokeRect(p.x,botY,PIPE_W,H-botY);
        }

        // Bird
        const angle=Math.min(Math.max(bird.vy*3,-30),70)*Math.PI/180;
        ctx.save();
        ctx.translate(BIRD_X,bird.y);
        ctx.rotate(angle);
        // Body
        ctx.fillStyle='#fbbf24';
        ctx.beginPath();ctx.ellipse(0,0,BIRD_R,BIRD_R*0.8,0,0,Math.PI*2);ctx.fill();
        // Wing
        ctx.fillStyle='#f59e0b';
        ctx.beginPath();ctx.ellipse(-4,2,8,5,-.3,0,Math.PI*2);ctx.fill();
        // Eye
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(6,-3,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#1a1333';ctx.beginPath();ctx.arc(7,-3,2,0,Math.PI*2);ctx.fill();
        // Beak
        ctx.fillStyle='#f97316';
        ctx.beginPath();ctx.moveTo(BIRD_R-2,-2);ctx.lineTo(BIRD_R+7,1);ctx.lineTo(BIRD_R-2,4);ctx.closePath();ctx.fill();
        ctx.restore();
    }

    function loop(){if(state!=='running')return;update();draw();requestAnimationFrame(loop);}

    // Initial draw
    (function(){
        const grd=ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0,'#0f0a1e');grd.addColorStop(1,'#1a1333');
        ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
    })();
})();
</script>
</body>
</html>
