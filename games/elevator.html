<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏢 Elevator Action — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px;color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border)}
canvas{display:block;width:100%;height:auto;background:#0a0a18}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{display:none}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final{color:var(--green);font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--cyan));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.ctrl{display:none;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
@media(max-width:768px){.ctrl{display:flex}}
.ctrl button{min-width:54px;height:50px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.1rem;font-weight:700;cursor:pointer;padding:0 8px}
.ctrl button:active{background:var(--green);color:#000}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🏢 Elevator Action</span></div>
<header><h1>Elevator Action</h1><p>Ride elevators, shoot spies, collect docs!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Docs</div><div class="value" id="hDocs">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gc" width="380" height="500"></canvas>
        <div class="overlay" id="overlay">
            <h2>🏢 Elevator Action</h2>
            <div class="sub">Move through floors, ride elevators, shoot enemies, collect red-door documents!</div>
            <div class="final" id="oFinal" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="ctrl">
        <button id="bL">◀</button>
        <button id="bU">▲</button>
        <button id="bD">▼</button>
        <button id="bR">▶</button>
        <button id="bF">🔫</button>
    </div>
</div>
<div class="game-footer">Elevator Action &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_elevator',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oFinal=document.getElementById('oFinal');
const hScore=document.getElementById('hScore'),hDocs=document.getElementById('hDocs'),hBest=document.getElementById('hBest');
const BEST_KEY='elevator_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const FLOOR_H=55,FLOORS=20,PW=16,PH=26,SPEED=2.5,ELEV_W=30,ELEV_SPEED=1.5;
const TOTAL_H=FLOORS*FLOOR_H;

let player,camera,score,docs,state,keys,elevators,enemies,bullets,doors;

function buildLevel(){
    elevators=[];doors=[];enemies=[];
    for(let f=0;f<FLOORS;f++){
        const fy=TOTAL_H-f*FLOOR_H;
        // Elevators every 3 floors
        if(f>0&&f%3===0){
            const ex=80+Math.floor(Math.random()*(W-160));
            elevators.push({x:ex,y:fy,minY:fy-FLOOR_H*3,maxY:fy,dir:-1});
        }
        // Red doors (documents)
        if(f>0&&f%2===0&&Math.random()<0.6){
            const dx=Math.random()<0.5?20:W-50;
            doors.push({x:dx,y:fy-FLOOR_H+10,collected:false});
        }
        // Enemies
        if(f>1&&Math.random()<0.4){
            enemies.push({x:Math.random()*(W-40)+20,y:fy-PH,dir:Math.random()<0.5?-1:1,alive:true,shootCd:0});
        }
    }
}

function start(){
    buildLevel();
    player={x:W/2,y:TOTAL_H-PH,vx:0,vy:0,onElev:null,facing:1};
    camera=TOTAL_H-H;score=0;docs=0;state='playing';
    keys={left:false,right:false,up:false,down:false,fire:false};
    bullets=[];
    hScore.textContent=0;hDocs.textContent=0;
    overlay.style.display='';overlay.classList.add('hidden');oFinal.style.display='none';
    raf();
}

function raf(){if(state!=='playing')return;update();draw();requestAnimationFrame(raf);}

function update(){
    // Move
    if(keys.left){player.x-=SPEED;player.facing=-1;}
    if(keys.right){player.x+=SPEED;player.facing=1;}
    player.x=Math.max(0,Math.min(W-PW,player.x));
    
    // Gravity
    if(!player.onElev){
        player.vy+=0.3;player.y+=player.vy;
    }
    
    // Floor collision
    for(let f=0;f<=FLOORS;f++){
        const fy=TOTAL_H-f*FLOOR_H;
        if(player.vy>=0&&player.y+PH>=fy&&player.y+PH<=fy+8){
            player.y=fy-PH;player.vy=0;
        }
    }
    
    // Elevators
    player.onElev=null;
    elevators.forEach(e=>{
        e.y+=e.dir*ELEV_SPEED;
        if(e.y<=e.minY)e.dir=1;if(e.y>=e.maxY)e.dir=-1;
        // Player on elevator
        if(player.x+PW>e.x&&player.x<e.x+ELEV_W&&Math.abs(player.y+PH-e.y)<6){
            player.y=e.y-PH;player.vy=0;player.onElev=e;
        }
    });
    if(player.onElev){player.y=player.onElev.y-PH;}
    
    // Enter doors
    if(keys.up){
        doors.forEach(d=>{
            if(!d.collected&&Math.abs(player.x-d.x)<20&&Math.abs(player.y-(d.y))<20){
                d.collected=true;docs++;score+=100;hDocs.textContent=docs;hScore.textContent=score;
            }
        });
    }
    
    // Fire
    if(keys.fire){
        keys.fire=false;
        bullets.push({x:player.x+PW/2,y:player.y+PH/2,dx:player.facing*6,owner:'player'});
    }
    
    // Enemies
    enemies.forEach(e=>{
        if(!e.alive)return;
        e.x+=e.dir*0.8;
        if(e.x<10||e.x>W-26)e.dir*=-1;
        e.shootCd--;
        if(e.shootCd<=0&&Math.abs(e.y-player.y)<FLOOR_H*2){
            const dx=player.x>e.x?4:-4;
            bullets.push({x:e.x+8,y:e.y+10,dx,owner:'enemy'});
            e.shootCd=120;
        }
    });
    
    // Bullets
    bullets.forEach(b=>{b.x+=b.dx;});
    bullets=bullets.filter(b=>b.x>0&&b.x<W);
    
    // Bullet hits
    bullets=bullets.filter(b=>{
        if(b.owner==='player'){
            for(const e of enemies){
                if(e.alive&&Math.abs(b.x-e.x)<16&&Math.abs(b.y-e.y)<20){
                    e.alive=false;score+=50;hScore.textContent=score;return false;
                }
            }
        }
        if(b.owner==='enemy'){
            if(Math.abs(b.x-player.x-PW/2)<12&&Math.abs(b.y-player.y-PH/2)<14){
                endGame();return false;
            }
        }
        return true;
    });
    
    // Enemy touch
    enemies.forEach(e=>{
        if(e.alive&&Math.abs(player.x-e.x)<18&&Math.abs(player.y-e.y)<24){
            endGame();
        }
    });
    
    // Camera
    const targetCam=player.y-H/2;
    camera+=(targetCam-camera)*0.08;
    camera=Math.max(0,Math.min(TOTAL_H-H,camera));
    
    // Win - reach top
    if(player.y<FLOOR_H){
        score+=docs*100;hScore.textContent=score;endGame();
    }
}

function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0a0a18';ctx.fillRect(0,0,W,H);
    ctx.save();ctx.translate(0,-camera);
    
    // Floors
    ctx.fillStyle='#2a2a4a';
    for(let f=0;f<=FLOORS;f++){
        const fy=TOTAL_H-f*FLOOR_H;
        ctx.fillRect(0,fy,W,4);
    }
    
    // Doors
    doors.forEach(d=>{
        ctx.fillStyle=d.collected?'#333':'#ff3333';
        ctx.fillRect(d.x,d.y,24,FLOOR_H-14);
        if(!d.collected){ctx.fillStyle='#ffd166';ctx.fillRect(d.x+18,d.y+18,4,4);}
    });
    
    // Elevators
    ctx.fillStyle='#888';
    elevators.forEach(e=>{
        ctx.fillRect(e.x,e.y,ELEV_W,4);
        // Shaft
        ctx.strokeStyle='#333';ctx.lineWidth=1;
        ctx.strokeRect(e.x,e.minY,ELEV_W,e.maxY-e.minY+4);
    });
    
    // Enemies
    enemies.forEach(e=>{
        if(!e.alive)return;
        ctx.fillStyle='#ff6b9d';ctx.fillRect(e.x,e.y,14,22);
        ctx.fillStyle='#333';ctx.fillRect(e.x+2,e.y+2,4,4);ctx.fillRect(e.x+8,e.y+2,4,4);
    });
    
    // Player
    ctx.fillStyle='#00e5ff';ctx.fillRect(player.x,player.y,PW,PH);
    ctx.fillStyle='#118ab2';ctx.fillRect(player.x+2,player.y+2,PW-4,8);
    
    // Bullets
    bullets.forEach(b=>{
        ctx.fillStyle=b.owner==='player'?'#ffd166':'#ff6b6b';
        ctx.fillRect(b.x-3,b.y-1,6,3);
    });
    
    ctx.restore();
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oFinal.style.display='block';oFinal.textContent='Score: '+score+' | Docs: '+docs;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.style.display='';overlay.classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
    if(e.key==='ArrowUp'||e.key==='w')keys.up=true;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=true;
    if(e.key===' ')keys.fire=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
    if(e.key==='ArrowUp'||e.key==='w')keys.up=false;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=false;
});

const bL=document.getElementById('bL'),bR=document.getElementById('bR'),bU=document.getElementById('bU'),bD=document.getElementById('bD'),bF=document.getElementById('bF');
bL.addEventListener('touchstart',e=>{e.preventDefault();keys.left=true});bL.addEventListener('touchend',()=>keys.left=false);
bR.addEventListener('touchstart',e=>{e.preventDefault();keys.right=true});bR.addEventListener('touchend',()=>keys.right=false);
bU.addEventListener('touchstart',e=>{e.preventDefault();keys.up=true});bU.addEventListener('touchend',()=>keys.up=false);
bD.addEventListener('touchstart',e=>{e.preventDefault();keys.down=true});bD.addEventListener('touchend',()=>keys.down=false);
bF.addEventListener('touchstart',e=>{e.preventDefault();keys.fire=true});

document.getElementById('startBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
