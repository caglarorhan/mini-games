<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐛 Centipede — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.bg-blob:nth-child(3){width:300px;height:300px;background:var(--orange);top:50%;left:50%;transform:translate(-50%,-50%)}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--green),var(--yellow));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:500px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;min-width:70px;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--green)}.lv-val{color:var(--cyan)}.li-val{color:var(--pink)}.hi-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 0 30px rgba(6,214,160,.12);background:#000}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--green);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--yellow));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .15s}.start-btn:hover{transform:translateY(-2px)}
.mobile-controls{display:none;margin-top:12px;gap:10px;justify-content:center;flex-wrap:wrap;user-select:none;-webkit-user-select:none}
.mob-btn{background:linear-gradient(135deg,var(--deep-purple),var(--purple));color:#fff;border:none;padding:16px 28px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;touch-action:manipulation}.mob-btn:active{transform:scale(.93)}
@media(max-width:768px){.mobile-controls{display:flex}}
@media(max-width:500px){header h1{font-size:1.5rem}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🐛 Centipede</span></div>
<header><h1>Centipede</h1><p>Shoot the centipede before it reaches you!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Wave</div><div class="value lv-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value li-val" id="hLives">3</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="480"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Centipede</h2>
            <div class="sub" id="oSub">Move and shoot to destroy the centipede!<br>Touch/click to shoot, drag to move.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="mob-btn" id="btnL">◄</button>
        <button class="mob-btn" id="btnFire">🔥</button>
        <button class="mob-btn" id="btnR">►</button>
    </div>
</div>
<div class="game-footer">Centipede &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_centipede',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,CELL=20;
const COLS=W/CELL,ROWS=H/CELL;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hLives=document.getElementById('hLives'),hBest=document.getElementById('hBest');
const BEST_KEY='centipede_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;
let state='idle',score,lives,level,player,bullets,centipede,mushrooms,spider,animFrame;
let keys={},mobL=false,mobR=false;

function createMushrooms(lvl){
    const m=[];
    const count=15+lvl*3;
    for(let i=0;i<count;i++){
        const col=Math.floor(Math.random()*COLS);
        const row=2+Math.floor(Math.random()*(ROWS-6));
        if(!m.find(mm=>mm.col===col&&mm.row===row))m.push({col,row,hp:4});
    }
    return m;
}

function createCentipede(lvl){
    const len=8+lvl*2;
    const segs=[];
    for(let i=0;i<len;i++)segs.push({col:COLS-1-i,row:0,dir:1,dropping:false,targetRow:0});
    return segs;
}

function startGame(){
    if(state==='running')return;
    score=0;lives=3;level=1;
    player={x:W/2-CELL/2,y:H-CELL*2};
    bullets=[];mushrooms=createMushrooms(level);centipede=createCentipede(level);spider=null;
    state='running';overlay.classList.add('hidden');updateHUD();
    if(animFrame)cancelAnimationFrame(animFrame);
    tickCount=0;animFrame=requestAnimationFrame(loop);
}

function updateHUD(){
    hScore.textContent=score;hLevel.textContent=level;hLives.textContent=lives;
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
}

let tickCount=0,lastTime=0;
function loop(ts){
    if(state!=='running')return;
    tickCount++;
    update();draw();animFrame=requestAnimationFrame(loop);
}

function hasMushroom(col,row){return mushrooms.find(m=>m.col===col&&m.row===row&&m.hp>0);}

function shoot(){if(bullets.length<2)bullets.push({x:player.x+CELL/2,y:player.y});}

function update(){
    const spd=4;
    if(keys['ArrowLeft']||mobL)player.x-=spd;
    if(keys['ArrowRight']||mobR)player.x+=spd;
    if(keys['ArrowUp'])player.y-=spd;
    if(keys['ArrowDown'])player.y+=spd;
    player.x=Math.max(0,Math.min(W-CELL,player.x));
    player.y=Math.max(H-CELL*5,Math.min(H-CELL,player.y));

    // Bullets
    bullets.forEach(b=>b.y-=8);
    bullets=bullets.filter(b=>b.y>-10);

    // Auto-fire
    if(tickCount%8===0)shoot();

    // Centipede movement (every 3 frames)
    if(tickCount%3===0){
        centipede.forEach(seg=>{
            if(seg.dropping){
                seg.row++;
                if(seg.row>=seg.targetRow){seg.dropping=false;seg.dir*=-1;}
                return;
            }
            const nextCol=seg.col+seg.dir;
            if(nextCol<0||nextCol>=COLS||hasMushroom(nextCol,seg.row)){
                seg.dropping=true;seg.targetRow=seg.row+1;
            } else {
                seg.col=nextCol;
            }
        });
    }

    // Bullet-mushroom collision
    bullets.forEach(b=>{
        const bc=Math.floor(b.x/CELL),br=Math.floor(b.y/CELL);
        const m=mushrooms.find(mm=>mm.col===bc&&mm.row===br&&mm.hp>0);
        if(m){m.hp--;b.y=-999;if(m.hp<=0)score+=1;updateHUD();}
    });

    // Bullet-centipede collision
    bullets.forEach(b=>{
        for(let i=centipede.length-1;i>=0;i--){
            const s=centipede[i];
            if(Math.abs(b.x-s.col*CELL)<CELL&&Math.abs(b.y-s.row*CELL)<CELL){
                b.y=-999;
                // Add mushroom where segment died
                if(!hasMushroom(s.col,s.row))mushrooms.push({col:s.col,row:s.row,hp:4});
                centipede.splice(i,1);score+=100;updateHUD();
                break;
            }
        }
    });

    // Spider
    if(!spider&&Math.random()<0.005){
        spider={x:Math.random()>0.5?0:W-CELL,y:H-CELL*4,vx:(Math.random()>0.5?1:-1)*2,vy:0,timer:200};
    }
    if(spider){
        spider.timer--;spider.x+=spider.vx;spider.vy=Math.sin(tickCount*0.1)*3;spider.y+=spider.vy;
        if(spider.x<0||spider.x>W||spider.timer<=0)spider=null;
        else{
            // Eat nearby mushrooms
            const sc=Math.floor(spider.x/CELL),sr=Math.floor(spider.y/CELL);
            const m=mushrooms.find(mm=>mm.col===sc&&mm.row===sr&&mm.hp>0);
            if(m)m.hp=0;
            // Bullet hit spider
            bullets.forEach(b=>{
                if(spider&&Math.abs(b.x-spider.x)<CELL&&Math.abs(b.y-spider.y)<CELL){
                    score+=600;spider=null;b.y=-999;updateHUD();
                }
            });
            // Spider hits player
            if(spider&&Math.abs(player.x-spider.x)<CELL*0.8&&Math.abs(player.y-spider.y)<CELL*0.8){die();spider=null;}
        }
    }

    // Centipede reaches player
    centipede.forEach(s=>{
        if(s.row>=ROWS-1){s.row=ROWS-5;s.dir*=-1;}
        if(Math.abs(s.col*CELL-player.x)<CELL*0.8&&Math.abs(s.row*CELL-player.y)<CELL*0.8)die();
    });

    // All centipede destroyed
    if(centipede.length===0){level++;centipede=createCentipede(level);updateHUD();}
}

function die(){
    lives--;updateHUD();
    if(lives<=0){endGame();return;}
    player.x=W/2-CELL/2;player.y=H-CELL*2;
}

function draw(){
    ctx.fillStyle='#0a0618';ctx.fillRect(0,0,W,H);
    // Mushrooms
    mushrooms.forEach(m=>{
        if(m.hp<=0)return;
        const a=m.hp/4;
        ctx.fillStyle=`rgba(6,214,160,${a})`;
        ctx.beginPath();
        const mx=m.col*CELL+CELL/2,my=m.row*CELL+CELL/2;
        ctx.arc(mx,my-2,CELL/2-2,Math.PI,0);ctx.fillRect(m.col*CELL+3,m.row*CELL+CELL/2-2,CELL-6,CELL/2);ctx.fill();
    });
    // Centipede
    centipede.forEach((s,i)=>{
        const x=s.col*CELL+CELL/2,y=s.row*CELL+CELL/2;
        ctx.fillStyle=i===0?'#ff0000':'#06d6a0';
        ctx.beginPath();ctx.arc(x,y,CELL/2-1,0,Math.PI*2);ctx.fill();
        if(i===0){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-3,y-2,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+3,y-2,3,0,Math.PI*2);ctx.fill();}
        // Legs
        ctx.strokeStyle=i===0?'#cc0':'#049970';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(x-CELL/2,y);ctx.lineTo(x-CELL/2-3,y+4);ctx.moveTo(x+CELL/2,y);ctx.lineTo(x+CELL/2+3,y+4);ctx.stroke();
    });
    // Spider
    if(spider){
        ctx.fillStyle='#ff6b9d';
        ctx.beginPath();ctx.arc(spider.x+CELL/2,spider.y+CELL/2,CELL/2,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#ff6b9d';ctx.lineWidth=2;
        for(let i=0;i<4;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.moveTo(spider.x+CELL/2,spider.y+CELL/2);ctx.lineTo(spider.x+CELL/2+Math.cos(a)*14,spider.y+CELL/2+Math.sin(a)*14);ctx.stroke();}
    }
    // Player
    ctx.fillStyle='#ffd166';
    ctx.beginPath();ctx.moveTo(player.x+CELL/2,player.y);ctx.lineTo(player.x+CELL,player.y+CELL);ctx.lineTo(player.x,player.y+CELL);ctx.closePath();ctx.fill();
    // Bullets
    ctx.fillStyle='#fff';bullets.forEach(b=>{ctx.fillRect(b.x-1,b.y,3,8);});
}

function endGame(){
    state='dead';if(animFrame)cancelAnimationFrame(animFrame);
    oTitle.textContent='Game Over';oSub.textContent='Wave '+level+' reached!';oScore.textContent='Score: '+score;oScore.style.display='block';overlay.classList.remove('hidden');
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();if(e.code==='Space'){if(state==='running')shoot();else startGame();}});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('startBtn').addEventListener('click',startGame);
const bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bF=document.getElementById('btnFire');
bL.addEventListener('touchstart',e=>{e.preventDefault();mobL=true;});bL.addEventListener('touchend',()=>mobL=false);
bR.addEventListener('touchstart',e=>{e.preventDefault();mobR=true;});bR.addEventListener('touchend',()=>mobR=false);
bF.addEventListener('touchstart',e=>{e.preventDefault();shoot();});
canvas.addEventListener('touchmove',e=>{if(state==='running'&&e.touches.length){e.preventDefault();const r=canvas.getBoundingClientRect();player.x=((e.touches[0].clientX-r.left)/r.width)*W-CELL/2;player.x=Math.max(0,Math.min(W-CELL,player.x));}},{passive:false});
canvas.addEventListener('click',()=>{if(state==='running')shoot();else startGame();});
draw();
})();
</script>
</body>
</html>
