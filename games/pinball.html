<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎰 Pinball — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.hi-val{color:var(--yellow)}.b-val{color:var(--pink)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:20px;margin-top:10px}
.flip-btn{width:100px;height:56px;border-radius:14px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎰 Pinball</span></div>
<header><h1>Pinball</h1><p>Flip the flippers, keep the ball alive!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
        <div class="hud-box"><div class="label">Balls</div><div class="value b-val" id="hBalls">3</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="340" height="540"></canvas>
        <div class="overlay" id="overlay">
            <h2>Pinball</h2>
            <div class="sub">Left/Right keys or buttons to flip.<br>Keep the ball alive and hit bumpers!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Launch!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="flip-btn" id="btnLeft">◄ Left</button>
        <button class="flip-btn" id="btnRight">Right ►</button>
    </div>
</div>
<div class="game-footer">Pinball &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_pinball',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=340,H=540;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hBalls=document.getElementById('hBalls');
const BEST_KEY='pinball_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;
let score,balls,ball,leftFlip,rightFlip,state='idle',bumpers,gravity=0.15;
const keys={left:false,right:false};

const BUMPER_R=18;
function initBumpers(){
    bumpers=[
        {x:100,y:160,r:BUMPER_R,pts:100,flash:0},
        {x:240,y:160,r:BUMPER_R,pts:100,flash:0},
        {x:170,y:120,r:BUMPER_R,pts:150,flash:0},
        {x:120,y:260,r:BUMPER_R,pts:100,flash:0},
        {x:220,y:260,r:BUMPER_R,pts:100,flash:0},
        {x:170,y:220,r:BUMPER_R,pts:200,flash:0},
        {x:80,y:340,r:14,pts:50,flash:0},
        {x:260,y:340,r:14,pts:50,flash:0}
    ];
}

function launchBall(){
    ball={x:310,y:480,vx:-2-Math.random()*2,vy:-8-Math.random()*2,r:7};
}

function startGame(){
    score=0;balls=3;hScore.textContent=0;hBalls.textContent=3;
    initBumpers();
    leftFlip=0;rightFlip=0;
    launchBall();
    state='running';overlay.classList.add('hidden');oScore.style.display='none';
    requestAnimationFrame(loop);
}

function flipperGeometry(side,angle){
    const cx=side==='left'?100:240;
    const cy=475;
    const len=55;
    const a=side==='left'?(-0.3-angle*0.5):((Math.PI+0.3)+angle*0.5);
    return {cx,cy,ex:cx+Math.cos(a)*len,ey:cy+Math.sin(a)*len,a};
}

function update(){
    if(state!=='running')return;
    // Flipper animation
    leftFlip=keys.left?Math.min(leftFlip+0.15,1):Math.max(leftFlip-0.1,0);
    rightFlip=keys.right?Math.min(rightFlip+0.15,1):Math.max(rightFlip-0.1,0);
    
    ball.vy+=gravity;
    ball.x+=ball.vx;ball.y+=ball.vy;
    
    // Walls
    if(ball.x-ball.r<20){ball.x=20+ball.r;ball.vx=Math.abs(ball.vx)*0.8;}
    if(ball.x+ball.r>W-20){ball.x=W-20-ball.r;ball.vx=-Math.abs(ball.vx)*0.8;}
    if(ball.y-ball.r<10){ball.y=10+ball.r;ball.vy=Math.abs(ball.vy)*0.5;}
    
    // Bumpers
    bumpers.forEach(b=>{
        const dx=ball.x-b.x,dy=ball.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<b.r+ball.r){
            const nx=dx/dist,ny=dy/dist;
            ball.x=b.x+nx*(b.r+ball.r+1);ball.y=b.y+ny*(b.r+ball.r+1);
            const speed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
            ball.vx=nx*Math.max(speed,4);ball.vy=ny*Math.max(speed,4);
            score+=b.pts;hScore.textContent=score;b.flash=10;
        }
        if(b.flash>0)b.flash--;
    });
    
    // Flippers
    [['left',leftFlip],['right',rightFlip]].forEach(([side,flip])=>{
        const f=flipperGeometry(side,flip);
        // Line segment collision
        const lx=f.ex-f.cx,ly=f.ey-f.cy;
        const len=Math.sqrt(lx*lx+ly*ly);
        const nx=-ly/len,ny=lx/len;
        const dx=ball.x-f.cx,dy=ball.y-f.cy;
        const dot=dx*lx/len+dy*ly/len;
        if(dot>0&&dot<len){
            const dist=dx*nx+dy*ny;
            if(Math.abs(dist)<ball.r+5){
                ball.vy=-Math.abs(ball.vy)-2;
                ball.vx+=(side==='left'?2:-2)*flip;
                ball.y=f.cy+ny*(ball.r+6)+dot*ly/len;
                score+=10;hScore.textContent=score;
            }
        }
    });
    
    // Ball lost
    if(ball.y>H+20){
        balls--;hBalls.textContent=balls;
        if(balls<=0){
            if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
            state='over';oScore.style.display='block';oScore.textContent='Score: '+score;
            document.getElementById('startBtn').textContent='Play Again';
            overlay.classList.remove('hidden');
        } else launchBall();
    }
    // Speed limit
    const maxV=10;
    const sp=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    if(sp>maxV){ball.vx*=maxV/sp;ball.vy*=maxV/sp;}
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Walls
    ctx.fillStyle='#1a1333';
    ctx.fillRect(0,0,20,H);ctx.fillRect(W-20,0,20,H);ctx.fillRect(0,0,W,10);
    // Drain guide
    ctx.strokeStyle='#2a1f4e';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(20,H-60);ctx.lineTo(60,H-20);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W-20,H-60);ctx.lineTo(W-60,H-20);ctx.stroke();
    
    // Bumpers
    bumpers.forEach(b=>{
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle=b.flash>0?'#ffd166':'#a855f7';ctx.fill();
        ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    });
    
    // Flippers
    [['left',leftFlip],['right',rightFlip]].forEach(([side,flip])=>{
        const f=flipperGeometry(side,flip);
        ctx.strokeStyle=side==='left'?'#00e5ff':'#ff6b9d';ctx.lineWidth=10;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(f.cx,f.cy);ctx.lineTo(f.ex,f.ey);ctx.stroke();
        ctx.beginPath();ctx.arc(f.cx,f.cy,6,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.fill();
    });
    
    // Ball
    if(state==='running'){
        ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
        const g=ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
        g.addColorStop(0,'#fff');g.addColorStop(1,'#bbb');
        ctx.fillStyle=g;ctx.fill();
    }
}

function loop(){
    update();draw();
    if(state==='running')requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='z')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='/') keys.right=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='z')keys.left=false;
    if(e.key==='ArrowRight'||e.key==='/')keys.right=false;
});
const bL=document.getElementById('btnLeft'),bR=document.getElementById('btnRight');
bL.addEventListener('touchstart',e=>{e.preventDefault();keys.left=true;},{passive:false});
bL.addEventListener('touchend',()=>keys.left=false);
bR.addEventListener('touchstart',e=>{e.preventDefault();keys.right=true;},{passive:false});
bR.addEventListener('touchend',()=>keys.right=false);

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
