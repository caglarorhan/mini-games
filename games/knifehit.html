<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔪 Knife Hit — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--green);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--green));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.hi-val{color:var(--yellow)}.l-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--green));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🔪 Knife Hit</span></div>
<header><h1>Knife Hit</h1><p>Throw knives into the spinning log!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value l-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="520"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Knife Hit</h2>
            <div class="sub" id="oSub">Tap to throw knives into the spinning log!<br>Don't hit other knives!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Throw!</button>
        </div>
    </div>
</div>
<div class="game-footer">Knife Hit &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_knifehit',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hLevel=document.getElementById('hLevel');
const BEST_KEY='knifehit_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;

const CX=W/2,CY=180,LOG_R=60;
let state='idle',score,level,knivesLeft,stuckKnives,flyingKnife,logAngle,logSpeed,af;

function startLevel(){
    stuckKnives=[];
    // Pre-stuck knives as obstacles
    const obs=Math.min(level-1,5);
    for(let i=0;i<obs;i++){
        stuckKnives.push({angle:Math.PI*2*i/obs,isObs:true});
    }
    knivesLeft=5+level;flyingKnife=null;
    logSpeed=(0.015+level*0.003)*(Math.random()>0.5?1:-1);
}

function startGame(){
    score=0;level=1;logAngle=0;
    startLevel();
    state='running';overlay.classList.add('hidden');
    hScore.textContent=0;hLevel.textContent=1;
    if(af)cancelAnimationFrame(af);af=requestAnimationFrame(loop);
}

function loop(){if(state!=='running')return;update();draw();af=requestAnimationFrame(loop);}

function update(){
    logAngle+=logSpeed;
    if(flyingKnife){
        flyingKnife.y-=12;
        // Check if reached log
        const dx=flyingKnife.x-CX,dy=flyingKnife.y-CY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<=LOG_R+20){
            // Calculate angle relative to log
            const angle=Math.atan2(dy,dx)-logAngle;
            // Check collision with stuck knives
            let hitKnife=false;
            for(const k of stuckKnives){
                let diff=Math.abs(angle-k.angle);
                if(diff>Math.PI)diff=Math.PI*2-diff;
                if(diff<0.2){hitKnife=true;break;}
            }
            if(hitKnife){
                endGame();return;
            }
            stuckKnives.push({angle,isObs:false});
            flyingKnife=null;score++;hScore.textContent=score;
            knivesLeft--;
            if(knivesLeft<=0){
                level++;hLevel.textContent=level;
                startLevel();
            }
        }
        if(flyingKnife&&flyingKnife.y<-20){flyingKnife=null;}
    }
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Log
    ctx.save();ctx.translate(CX,CY);ctx.rotate(logAngle);
    ctx.fillStyle='#8B5A2B';ctx.beginPath();ctx.arc(0,0,LOG_R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#6B3A1B';ctx.lineWidth=3;ctx.stroke();
    // Rings
    ctx.strokeStyle='rgba(139,90,43,0.4)';ctx.lineWidth=1;
    for(let r=15;r<LOG_R;r+=15){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();}
    // Stuck knives
    stuckKnives.forEach(k=>{
        ctx.save();ctx.rotate(k.angle);
        ctx.fillStyle=k.isObs?'#a99ec4':'#f0e6ff';
        ctx.fillRect(LOG_R-5,-2.5,30,5);
        ctx.fillStyle=k.isObs?'#666':'#ff8a47';
        ctx.fillRect(LOG_R+25,-4,8,8);
        ctx.restore();
    });
    ctx.restore();
    // Flying knife
    if(flyingKnife){
        ctx.fillStyle='#f0e6ff';
        ctx.fillRect(flyingKnife.x-2.5,flyingKnife.y-15,5,30);
        ctx.fillStyle='#ff8a47';
        ctx.fillRect(flyingKnife.x-4,flyingKnife.y+15,8,8);
    }
    // Waiting knives
    for(let i=0;i<Math.min(knivesLeft-(flyingKnife?1:0),8);i++){
        const ky=H-40-i*22;
        ctx.fillStyle='#f0e6ff';ctx.fillRect(CX-2,ky-10,4,20);
        ctx.fillStyle='#ff8a47';ctx.fillRect(CX-3.5,ky+10,7,7);
    }
    // Knives left count
    ctx.fillStyle='var(--text-muted)';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(knivesLeft+' left',CX,H-10);
}

function throwKnife(){
    if(state!=='running'||flyingKnife||knivesLeft<=0)return;
    flyingKnife={x:CX,y:H-60};
}

function endGame(){
    state='dead';if(af)cancelAnimationFrame(af);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Clang!';oSub.textContent='You hit another knife!';oScore.textContent='Score: '+score+' (Level '+level+')';oScore.style.display='block';
    overlay.classList.remove('hidden');document.getElementById('startBtn').textContent='Retry';
}

canvas.addEventListener('click',()=>{if(state==='running')throwKnife();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='running'){startGame();return;}throwKnife();},{passive:false});
document.addEventListener('keydown',e=>{if(e.key===' '&&state==='running')throwKnife();});
document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
