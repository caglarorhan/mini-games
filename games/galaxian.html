<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👾 Galaxian — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--blue);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--blue),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:440px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--blue)}.hi-val{color:var(--yellow)}.w-val{color:var(--pink)}.l-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#000}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--blue);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--blue),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:16px;margin-top:10px}
.ctrl-btn{width:64px;height:54px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.4rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">👾 Galaxian</span></div>
<header><h1>Galaxian</h1><p>Destroy the alien formation!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Wave</div><div class="value w-val" id="hWave">1</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value l-val" id="hLives">3</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Galaxian</h2>
            <div class="sub" id="oSub">Move ◄► and fire to destroy aliens!<br>Aliens dive down — dodge them!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Launch!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="ctrl-btn" id="btnL">◄</button>
        <button class="ctrl-btn" id="btnFire">🔥</button>
        <button class="ctrl-btn" id="btnR">►</button>
    </div>
</div>
<div class="game-footer">Galaxian &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_galaxian',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hWave=document.getElementById('hWave'),hLives=document.getElementById('hLives');
const BEST_KEY='galaxian_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;
let state='idle',score,wave,lives,player,enemies,bullets,eBullets,divers,stars,af;
const PW=28,PH=20,EW=24,EH=18;
const COLORS=['#ff6b9d','#ff8a47','#ffd166','#06d6a0','#00e5ff','#a855f7'];
const keys={};

function initStars(){stars=[];for(let i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:0.3+Math.random()*1.2});}

function startGame(){
    score=0;wave=0;lives=3;
    player={x:W/2,y:H-40,w:PW,h:PH};
    bullets=[];eBullets=[];divers=[];
    initStars();nextWave();
    state='running';overlay.classList.add('hidden');
    hScore.textContent=0;hLives.textContent=3;
    if(af)cancelAnimationFrame(af);af=requestAnimationFrame(loop);
}

function nextWave(){
    wave++;hWave.textContent=wave;
    enemies=[];divers=[];eBullets=[];
    const rows=Math.min(3+Math.floor(wave/2),6),cols=8;
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            enemies.push({
                x:50+c*38,y:40+r*28,w:EW,h:EH,alive:true,
                baseX:50+c*38,baseY:40+r*28,
                color:COLORS[r%COLORS.length],
                row:r,col:c
            });
        }
    }
}

function loop(){if(state!=='running')return;update();draw();af=requestAnimationFrame(loop);}

let formDir=1,formOff=0,formT=0,shootCD=0,diveCD=0;

function update(){
    formT++;shootCD--;diveCD--;
    // Player movement
    let dx=0;
    if(keys.ArrowLeft||keys.a)dx=-4;
    if(keys.ArrowRight||keys.d)dx=4;
    if(mobileL)dx=-4;if(mobileR)dx=4;
    player.x=Math.max(PW/2,Math.min(W-PW/2,player.x+dx));
    // Formation movement
    formOff+=formDir*0.3;
    if(Math.abs(formOff)>30){formDir*=-1;}
    enemies.forEach(e=>{if(e.alive)e.x=e.baseX+formOff+Math.sin(formT*0.02+e.col)*5;});
    // Bullets
    bullets.forEach(b=>{b.y-=7;});
    bullets=bullets.filter(b=>b.y>-10);
    // Enemy bullets
    eBullets.forEach(b=>{b.y+=4+wave*0.3;});
    eBullets=eBullets.filter(b=>b.y<H+10);
    // Divers
    divers.forEach(d=>{
        d.t++;
        d.x+=d.vx;d.y+=d.vy;
        d.vy+=0.05;
        if(d.t>180||d.y>H+20)d.alive=false;
        // Shoot occasionally
        if(d.alive&&Math.random()<0.02)eBullets.push({x:d.x,y:d.y+d.h/2});
    });
    divers=divers.filter(d=>d.alive);
    // Collision: bullets vs enemies
    bullets.forEach(b=>{
        enemies.forEach(e=>{
            if(!e.alive)return;
            if(b.x>e.x-e.w/2&&b.x<e.x+e.w/2&&b.y>e.y-e.h/2&&b.y<e.y+e.h/2){
                e.alive=false;b.hit=true;score+=10*(e.row+1);hScore.textContent=score;
            }
        });
        divers.forEach(d=>{
            if(!d.alive)return;
            if(b.x>d.x-d.w/2&&b.x<d.x+d.w/2&&b.y>d.y-d.h/2&&b.y<d.y+d.h/2){
                d.alive=false;b.hit=true;score+=50;hScore.textContent=score;
            }
        });
    });
    bullets=bullets.filter(b=>!b.hit);
    // Collision: eBullets / divers vs player
    let hit=false;
    eBullets.forEach(b=>{
        if(Math.abs(b.x-player.x)<PW/2&&Math.abs(b.y-player.y)<PH/2){hit=true;b.y=H+20;}
    });
    divers.forEach(d=>{
        if(!d.alive)return;
        if(Math.abs(d.x-player.x)<(PW+d.w)/2&&Math.abs(d.y-player.y)<(PH+d.h)/2){hit=true;d.alive=false;}
    });
    if(hit){
        lives--;hLives.textContent=lives;
        if(lives<=0){endGame();return;}
        player.x=W/2;
    }
    // Enemy shooting
    if(shootCD<=0){
        const alive=enemies.filter(e=>e.alive);
        if(alive.length){const e=alive[Math.floor(Math.random()*alive.length)];eBullets.push({x:e.x,y:e.y+e.h/2});}
        shootCD=Math.max(20,60-wave*3);
    }
    // Diving
    if(diveCD<=0){
        const alive=enemies.filter(e=>e.alive);
        if(alive.length&&divers.length<2+wave){
            const e=alive[Math.floor(Math.random()*alive.length)];
            divers.push({x:e.x,y:e.y,w:e.w,h:e.h,vx:(player.x-e.x)*0.01,vy:2,color:e.color,alive:true,t:0});
        }
        diveCD=Math.max(30,90-wave*5);
    }
    // Wave clear
    if(enemies.every(e=>!e.alive)&&divers.length===0)nextWave();
    // Stars
    stars.forEach(s=>{s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{ctx.fillStyle='rgba(240,230,255,'+(0.3+s.s*0.4)+')';ctx.fillRect(s.x,s.y,1.5,1.5);});
    // Enemies
    enemies.forEach(e=>{
        if(!e.alive)return;
        ctx.fillStyle=e.color;
        ctx.beginPath();ctx.moveTo(e.x,e.y-e.h/2);ctx.lineTo(e.x+e.w/2,e.y);ctx.lineTo(e.x+e.w/3,e.y+e.h/2);ctx.lineTo(e.x-e.w/3,e.y+e.h/2);ctx.lineTo(e.x-e.w/2,e.y);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(e.x-4,e.y,2,0,Math.PI*2);ctx.arc(e.x+4,e.y,2,0,Math.PI*2);ctx.fill();
    });
    // Divers (same shape but glowing)
    divers.forEach(d=>{
        if(!d.alive)return;
        ctx.shadowBlur=12;ctx.shadowColor=d.color;
        ctx.fillStyle=d.color;
        ctx.beginPath();ctx.moveTo(d.x,d.y-d.h/2);ctx.lineTo(d.x+d.w/2,d.y);ctx.lineTo(d.x+d.w/3,d.y+d.h/2);ctx.lineTo(d.x-d.w/3,d.y+d.h/2);ctx.lineTo(d.x-d.w/2,d.y);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
    });
    // Player
    ctx.fillStyle='#00e5ff';
    ctx.beginPath();ctx.moveTo(player.x,player.y-PH/2);ctx.lineTo(player.x+PW/2,player.y+PH/2);ctx.lineTo(player.x-PW/2,player.y+PH/2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#06d6a0';ctx.fillRect(player.x-2,player.y-PH/2-4,4,6);
    // Bullets
    ctx.fillStyle='#ffd166';bullets.forEach(b=>{ctx.fillRect(b.x-1.5,b.y-5,3,10);});
    // Enemy bullets
    ctx.fillStyle='#ff6b9d';eBullets.forEach(b=>{ctx.fillRect(b.x-2,b.y-4,4,8);});
}

function endGame(){
    state='dead';if(af)cancelAnimationFrame(af);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Game Over';oSub.textContent='The aliens prevailed!';oScore.textContent='Score: '+score+' (Wave '+wave+')';oScore.style.display='block';overlay.classList.remove('hidden');
    document.getElementById('startBtn').textContent='Retry';
}

// Controls
let mobileL=false,mobileR=false;
document.addEventListener('keydown',e=>{
    keys[e.key]=true;
    if(state==='running'&&(e.key===' '||e.key==='ArrowUp')&&bullets.length<3){bullets.push({x:player.x,y:player.y-PH/2});}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bF=document.getElementById('btnFire');
bL.addEventListener('touchstart',e=>{e.preventDefault();mobileL=true;},{passive:false});
bL.addEventListener('touchend',()=>{mobileL=false;});
bR.addEventListener('touchstart',e=>{e.preventDefault();mobileR=true;},{passive:false});
bR.addEventListener('touchend',()=>{mobileR=false;});
bF.addEventListener('touchstart',e=>{e.preventDefault();if(state==='running'&&bullets.length<3)bullets.push({x:player.x,y:player.y-PH/2});},{passive:false});
document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
