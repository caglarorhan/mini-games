<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎯 Color Switch — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--purple));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:380px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--yellow)}.hi-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--yellow),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--yellow);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--purple));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎯 Color Switch</span></div>
<header><h1>Color Switch</h1><p>Pass through matching colors!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="340" height="520"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Color Switch</h2>
            <div class="sub" id="oSub">Tap to jump through spinning color rings!<br>Match your ball's color to pass through!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
</div>
<div class="game-footer">Color Switch &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_colorswitch',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest');
const BEST_KEY='colorswitch_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;

const COLORS=['#ff6b9d','#ffd166','#06d6a0','#00e5ff'];
const BALL_R=10;
let state='idle',score,ball,obstacles,cameraY,af;

function makeObstacle(y){
    return{
        y,type:'ring',r:55,angle:0,speed:0.02+Math.random()*0.015,
        passed:false,switcher:true
    };
}

function startGame(){
    score=0;cameraY=0;
    ball={x:W/2,y:H*0.7,vy:0,colorIdx:0};
    obstacles=[];
    for(let i=0;i<6;i++)obstacles.push(makeObstacle(H*0.7-200-i*180));
    state='running';overlay.classList.add('hidden');
    hScore.textContent=0;
    if(af)cancelAnimationFrame(af);af=requestAnimationFrame(loop);
}

function loop(){if(state!=='running')return;update();draw();af=requestAnimationFrame(loop);}

function update(){
    ball.vy+=0.35;
    ball.y+=ball.vy;
    // Camera follows ball upward
    const targetCam=ball.y-H*0.65;
    if(targetCam<cameraY)cameraY+=(targetCam-cameraY)*0.1;
    // Death: fall below screen
    if(ball.y-cameraY>H+50){endGame();return;}
    // Obstacles
    obstacles.forEach(o=>{
        o.angle+=o.speed;
        const screenY=o.y-cameraY;
        // Check if ball passes through
        const dy=ball.y-o.y;
        const dist=Math.sqrt((ball.x-W/2)**2+dy**2);
        // Near the ring
        if(Math.abs(dist-o.r)<BALL_R+6){
            // Which segment?
            const angle=Math.atan2(dy,ball.x-W/2)-o.angle;
            let seg=Math.floor(((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2)/(Math.PI/2));
            seg=seg%4;
            if(seg!==ball.colorIdx){endGame();return;}
        }
        // Passed obstacle - score
        if(!o.passed&&ball.y<o.y-o.r){
            o.passed=true;score++;hScore.textContent=score;
            // Change ball color
            ball.colorIdx=Math.floor(Math.random()*4);
        }
    });
    // Generate more obstacles above
    const topObs=obstacles.reduce((a,b)=>a.y<b.y?a:b);
    while(topObs.y>cameraY-200){
        const newY=topObs.y-180;
        obstacles.push(makeObstacle(newY));
        break;
    }
    if(obstacles.length>0){
        const minY=obstacles.reduce((a,b)=>a.y<b.y?a:b).y;
        if(minY>cameraY-200){
            obstacles.push(makeObstacle(minY-180));
        }
    }
    // Remove off-screen obstacles below
    obstacles=obstacles.filter(o=>o.y-cameraY<H+200);
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Obstacles
    obstacles.forEach(o=>{
        const sy=o.y-cameraY;
        ctx.save();ctx.translate(W/2,sy);ctx.rotate(o.angle);
        for(let i=0;i<4;i++){
            ctx.beginPath();
            ctx.arc(0,0,o.r,i*Math.PI/2,(i+1)*Math.PI/2);
            ctx.strokeStyle=COLORS[i];ctx.lineWidth=8;ctx.stroke();
        }
        ctx.restore();
    });
    // Ball
    const by=ball.y-cameraY;
    ctx.fillStyle=COLORS[ball.colorIdx];
    ctx.shadowBlur=15;ctx.shadowColor=COLORS[ball.colorIdx];
    ctx.beginPath();ctx.arc(ball.x,by,BALL_R,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
}

function tap(){
    if(state!=='running')return;
    ball.vy=-7;
}

function endGame(){
    state='dead';if(af)cancelAnimationFrame(af);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Game Over';oSub.textContent='Wrong color!';oScore.textContent='Score: '+score;oScore.style.display='block';
    overlay.classList.remove('hidden');document.getElementById('startBtn').textContent='Retry';
}

canvas.addEventListener('click',()=>{if(state==='running')tap();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='running'){startGame();return;}tap();},{passive:false});
document.addEventListener('keydown',e=>{if(e.key===' '&&state==='running')tap();});
document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
