<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 Color Match — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--green)}.t-val{color:var(--orange)}.h-val{color:var(--yellow)}
.game-area{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a;padding:30px 20px;min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.word-display{font-size:3rem;font-weight:900;margin:20px 0;text-align:center;line-height:1.2}
.question{font-size:1.1rem;color:var(--text-muted);margin-bottom:20px;text-align:center}
.match-btns{display:flex;gap:15px}
.match-btn{padding:16px 36px;border:2px solid var(--border);border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .15s}
.match-btn:active{transform:scale(0.95)}
.match-btn.yes{background:rgba(6,214,160,0.2);color:var(--green);border-color:var(--green)}
.match-btn.no{background:rgba(255,107,157,0.2);color:var(--pink);border-color:var(--pink)}
.feedback{font-size:1.5rem;font-weight:900;min-height:40px;margin-top:10px}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--green);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎨 Color Match</span></div>
<header><h1>Color Match</h1><p>Does the word match its color?</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Time</div><div class="value t-val" id="hTime">30</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value h-val" id="hBest">0</div></div>
    </div>
    <div class="game-area">
        <div class="question" id="question">Does the WORD match its COLOR?</div>
        <div class="word-display" id="wordDisplay">RED</div>
        <div class="match-btns">
            <button class="match-btn yes" id="yesBtn">YES</button>
            <button class="match-btn no" id="noBtn">NO</button>
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="overlay" id="overlay">
            <h2>🎨 Color Match</h2>
            <div class="sub">The word says a color, but is it displayed in that color? Answer YES or NO!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
</div>
<div class="game-footer">Color Match &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_colormatch',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hTime=document.getElementById('hTime'),hBest=document.getElementById('hBest');
const wordDisplay=document.getElementById('wordDisplay'),feedback=document.getElementById('feedback');
const BEST_KEY='colormatch_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const COLORS=[
    {name:'RED',hex:'#ff6b6b'},{name:'BLUE',hex:'#4dabf7'},{name:'GREEN',hex:'#51cf66'},
    {name:'YELLOW',hex:'#ffd43b'},{name:'PURPLE',hex:'#cc5de8'},{name:'ORANGE',hex:'#ff922b'},
    {name:'PINK',hex:'#f06595'},{name:'CYAN',hex:'#22b8cf'}
];

let score,timeLeft,isMatch,state,timer;

function startGame(){
    score=0;timeLeft=30;state='playing';
    hScore.textContent=0;hTime.textContent=30;feedback.textContent='';
    overlay.classList.add('hidden');oScore.style.display='none';
    nextRound();
    timer=setInterval(()=>{
        timeLeft--;hTime.textContent=Math.max(0,timeLeft);
        if(timeLeft<=0){clearInterval(timer);endGame();}
    },1000);
}

function nextRound(){
    const wordColor=COLORS[Math.floor(Math.random()*COLORS.length)];
    const displayColor=Math.random()<0.4?wordColor:COLORS[Math.floor(Math.random()*COLORS.length)];
    isMatch=wordColor.name===displayColor.name;
    wordDisplay.textContent=wordColor.name;
    wordDisplay.style.color=displayColor.hex;
}

function answer(userSaysMatch){
    if(state!=='playing')return;
    if(userSaysMatch===isMatch){
        score+=10;feedback.textContent='✓';feedback.style.color='#06d6a0';
    }else{
        score=Math.max(0,score-5);feedback.textContent='✗';feedback.style.color='#ff6b9d';
    }
    hScore.textContent=score;
    setTimeout(()=>{feedback.textContent='';nextRound();},300);
}

function endGame(){
    state='over';if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

document.getElementById('yesBtn').addEventListener('click',()=>answer(true));
document.getElementById('noBtn').addEventListener('click',()=>answer(false));
document.addEventListener('keydown',e=>{
    if(state!=='playing')return;
    if(e.key==='y'||e.key==='ArrowLeft')answer(true);
    if(e.key==='n'||e.key==='ArrowRight')answer(false);
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
