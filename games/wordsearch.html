<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔤 Word Search — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--cyan);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--cyan),var(--yellow));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:440px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--cyan)}.hi-val{color:var(--yellow)}
.board{display:grid;gap:2px;margin:0 auto 12px;max-width:360px;user-select:none;-webkit-user-select:none}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background .15s,color .15s;text-transform:uppercase}
.cell.selected{background:rgba(0,229,255,.3);color:#fff}
.cell.found{background:rgba(6,214,160,.25);color:var(--green)}
.word-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
.word-tag{padding:4px 12px;border-radius:8px;font-size:.8rem;font-weight:600;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted)}
.word-tag.found{background:rgba(6,214,160,.2);color:var(--green);text-decoration:line-through}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:50}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--cyan),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--cyan);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--cyan),var(--yellow));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🔤 Word Search</span></div>
<header><h1>Word Search</h1><p>Find all the hidden words!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Found</div><div class="value s-val" id="hFound">0</div></div>
        <div class="hud-box"><div class="label">Total</div><div class="value hi-val" id="hTotal">0</div></div>
    </div>
    <div id="wordList" class="word-list"></div>
    <div id="board" class="board"></div>
</div>
<div class="overlay" id="overlay">
    <h2 id="oTitle">Word Search</h2>
    <div class="sub" id="oSub">Swipe or click letters to find hidden words!<br>Words go horizontal, vertical &amp; diagonal.</div>
    <div class="final-score" id="oScore" style="display:none"></div>
    <button class="start-btn" id="startBtn">Play!</button>
</div>
<div class="game-footer">Word Search &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_wordsearch',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const SIZE=10;
const WORD_POOLS=[
    ['SNAKE','TETRIS','PONG','ARCADE','PIXEL','SCORE','LEVEL','BLOCK','GAME','TIMER'],
    ['APPLE','GRAPE','MANGO','PEACH','LEMON','BERRY','MELON','PLUM','KIWI','LIME'],
    ['EARTH','MOON','STAR','COMET','ORBIT','SOLAR','MARS','VENUS','PLUTO','RING'],
    ['OCEAN','RIVER','LAKE','STORM','CLOUD','RAIN','SNOW','FROST','WIND','TIDE']
];
const DIRS=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];

const boardEl=document.getElementById('board');
const wordListEl=document.getElementById('wordList');
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hFound=document.getElementById('hFound'),hTotal=document.getElementById('hTotal');
const BEST_KEY='wordsearch_best';

let grid,words,placed,foundWords,selecting,selCells;

boardEl.style.gridTemplateColumns=`repeat(${SIZE},1fr)`;

function tryPlace(word,grid){
    for(let attempts=0;attempts<100;attempts++){
        const dir=DIRS[Math.floor(Math.random()*DIRS.length)];
        const r=Math.floor(Math.random()*SIZE),c=Math.floor(Math.random()*SIZE);
        let ok=true;
        for(let i=0;i<word.length;i++){
            const nr=r+dir[0]*i,nc=c+dir[1]*i;
            if(nr<0||nr>=SIZE||nc<0||nc>=SIZE){ok=false;break;}
            if(grid[nr][nc]!==''&&grid[nr][nc]!==word[i]){ok=false;break;}
        }
        if(ok){
            const cells=[];
            for(let i=0;i<word.length;i++){
                const nr=r+dir[0]*i,nc=c+dir[1]*i;
                grid[nr][nc]=word[i];cells.push([nr,nc]);
            }
            return cells;
        }
    }
    return null;
}

function generate(){
    grid=Array.from({length:SIZE},()=>Array(SIZE).fill(''));
    const pool=WORD_POOLS[Math.floor(Math.random()*WORD_POOLS.length)].slice();
    // Shuffle
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    placed=[];words=[];
    for(const w of pool){
        const cells=tryPlace(w,grid);
        if(cells){placed.push({word:w,cells});words.push(w);}
        if(words.length>=7)break;
    }
    // Fill empty
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
        if(grid[r][c]==='')grid[r][c]=String.fromCharCode(65+Math.floor(Math.random()*26));
    }
}

function render(){
    boardEl.innerHTML='';
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){
            const el=document.createElement('div');
            el.className='cell';el.textContent=grid[r][c];
            el.dataset.r=r;el.dataset.c=c;
            boardEl.appendChild(el);
        }
    }
    wordListEl.innerHTML='';
    words.forEach(w=>{
        const tag=document.createElement('span');
        tag.className='word-tag';tag.textContent=w;tag.id='wt_'+w;
        wordListEl.appendChild(tag);
    });
}

function startGame(){
    generate();render();
    foundWords=new Set();selecting=false;selCells=[];
    hFound.textContent=0;hTotal.textContent=words.length;
    overlay.classList.add('hidden');
    oScore.style.display='none';
}

function getCellAt(r,c){return boardEl.children[r*SIZE+c];}

function clearSel(){
    selCells.forEach(([r,c])=>{
        const el=getCellAt(r,c);
        if(!el.classList.contains('found'))el.classList.remove('selected');
    });
    selCells=[];
}

function checkWord(){
    const str=selCells.map(([r,c])=>grid[r][c]).join('');
    const rev=str.split('').reverse().join('');
    let match=null;
    for(const p of placed){
        if(foundWords.has(p.word))continue;
        if(p.word===str||p.word===rev){match=p;break;}
    }
    if(match){
        foundWords.add(match.word);
        match.cells.forEach(([r,c])=>getCellAt(r,c).classList.add('found'));
        const tag=document.getElementById('wt_'+match.word);if(tag)tag.classList.add('found');
        hFound.textContent=foundWords.size;
        if(foundWords.size===words.length){
            setTimeout(()=>{
                oTitle.textContent='You Win!';oSub.textContent='All words found!';oScore.textContent='Found all '+words.length+' words!';oScore.style.display='block';
                overlay.classList.remove('hidden');
                document.getElementById('startBtn').textContent='New Puzzle';
            },400);
        }
    }
}

// Interaction
function cellRC(el){return[+el.dataset.r,+el.dataset.c];}
function isInLine(cells){
    if(cells.length<2)return true;
    const dr=cells[1][0]-cells[0][0],dc=cells[1][1]-cells[0][1];
    for(let i=2;i<cells.length;i++){
        if(cells[i][0]-cells[i-1][0]!==dr||cells[i][1]-cells[i-1][1]!==dc)return false;
    }
    return true;
}

boardEl.addEventListener('pointerdown',e=>{
    const t=e.target;if(!t.classList.contains('cell'))return;
    selecting=true;clearSel();
    const rc=cellRC(t);selCells=[rc];t.classList.add('selected');
    boardEl.setPointerCapture(e.pointerId);
});
boardEl.addEventListener('pointermove',e=>{
    if(!selecting)return;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(!el||!el.classList.contains('cell'))return;
    const rc=cellRC(el);
    // Already in selection?
    if(selCells.some(s=>s[0]===rc[0]&&s[1]===rc[1]))return;
    const test=[...selCells,rc];
    if(isInLine(test)){
        selCells.push(rc);el.classList.add('selected');
    }
});
boardEl.addEventListener('pointerup',()=>{
    if(!selecting)return;selecting=false;
    if(selCells.length>=2)checkWord();
    clearSel();
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
