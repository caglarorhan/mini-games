<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧠 Memory Sequence — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--purple);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--cyan);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px;color:var(--purple)}
.game-area{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a;padding:20px;min-height:400px}
.msg{text-align:center;font-size:1rem;color:var(--text-muted);min-height:30px;margin-bottom:16px;font-weight:600}
.grid-9{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:300px;margin:0 auto}
.seq-tile{aspect-ratio:1;border-radius:16px;border:3px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:2rem}
.seq-tile:active{transform:scale(.93)}
.seq-tile.flash{border-color:#fff;transform:scale(1.05)}
.seq-tile.t0{background:#ff6b9d22}.seq-tile.t0.flash{background:#ff6b9d;border-color:#ff6b9d}
.seq-tile.t1{background:#ffd16622}.seq-tile.t1.flash{background:#ffd166;border-color:#ffd166}
.seq-tile.t2{background:#06d6a022}.seq-tile.t2.flash{background:#06d6a0;border-color:#06d6a0}
.seq-tile.t3{background:#00e5ff22}.seq-tile.t3.flash{background:#00e5ff;border-color:#00e5ff}
.seq-tile.t4{background:#a855f722}.seq-tile.t4.flash{background:#a855f7;border-color:#a855f7}
.seq-tile.t5{background:#ff8a4722}.seq-tile.t5.flash{background:#ff8a47;border-color:#ff8a47}
.seq-tile.t6{background:#118ab222}.seq-tile.t6.flash{background:#118ab2;border-color:#118ab2}
.seq-tile.t7{background:#f0e6ff22}.seq-tile.t7.flash{background:#f0e6ff;border-color:#f0e6ff}
.seq-tile.t8{background:#a99ec422}.seq-tile.t8.flash{background:#a99ec4;border-color:#a99ec4}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final{color:var(--purple);font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🧠 Memory Sequence</span></div>
<header><h1>Memory Sequence</h1><p>Remember and repeat the pattern!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Level</div><div class="value" id="hLevel">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value" id="hBest">0</div></div>
    </div>
    <div class="game-area">
        <div class="msg" id="msg">Watch the sequence!</div>
        <div class="grid-9" id="grid"></div>
        <div class="overlay" id="overlay">
            <h2>🧠 Memory Sequence</h2>
            <div class="sub">Watch the tiles flash in order, then repeat the sequence. Goes longer each round!</div>
            <div class="final" id="oFinal" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
</div>
<div class="game-footer">Memory Sequence &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_memorysequence',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const overlay=document.getElementById('overlay'),oFinal=document.getElementById('oFinal');
const hLevel=document.getElementById('hLevel'),hBest=document.getElementById('hBest');
const msgEl=document.getElementById('msg'),gridEl=document.getElementById('grid');
const BEST_KEY='memorysequence_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const EMOJIS=['🔴','🟡','🟢','🔵','🟣','🟠','💙','⬜','⚫'];
const TILES=9;
let tiles=[],sequence=[],playerPos,level,state,playing;

function buildGrid(){
    gridEl.innerHTML='';tiles=[];
    for(let i=0;i<TILES;i++){
        const el=document.createElement('div');
        el.className='seq-tile t'+i;
        el.textContent=EMOJIS[i];
        el.addEventListener('click',()=>onTap(i));
        gridEl.appendChild(el);tiles.push(el);
    }
}

function start(){
    buildGrid();sequence=[];level=0;state='idle';playing=true;
    overlay.classList.add('hidden');oFinal.style.display='none';
    nextLevel();
}

function nextLevel(){
    level++;hLevel.textContent=level;
    sequence.push(Math.floor(Math.random()*TILES));
    state='showing';
    msgEl.textContent='Watch carefully...';
    showSequence();
}

function showSequence(){
    let i=0;
    const interval=setInterval(()=>{
        if(i>0)tiles[sequence[i-1]].classList.remove('flash');
        if(i<sequence.length){
            tiles[sequence[i]].classList.add('flash');
            i++;
        }else{
            clearInterval(interval);
            state='input';playerPos=0;
            msgEl.textContent='Your turn! Repeat the sequence.';
        }
    },Math.max(300,600-level*20));
}

function onTap(idx){
    if(state!=='input')return;
    // Flash feedback
    tiles[idx].classList.add('flash');
    setTimeout(()=>tiles[idx].classList.remove('flash'),200);
    
    if(idx===sequence[playerPos]){
        playerPos++;
        if(playerPos===sequence.length){
            state='idle';
            msgEl.textContent='Correct! Level '+level+' done!';
            setTimeout(nextLevel,800);
        }
    }else{
        endGame();
    }
}

function endGame(){
    state='over';playing=false;
    const finalLevel=level-1;
    if(finalLevel>best){best=finalLevel;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    msgEl.textContent='Wrong!';
    oFinal.style.display='block';oFinal.textContent='Reached Level: '+finalLevel;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
