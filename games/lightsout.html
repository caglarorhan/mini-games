<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💡 Lights Out — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--blue));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:360px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--yellow)}.hi-val{color:var(--green)}.l-val{color:var(--cyan)}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:0 auto;max-width:320px}
.cell{aspect-ratio:1;border-radius:12px;cursor:pointer;transition:all .2s;border:2px solid var(--border)}
.cell.on{background:var(--yellow);box-shadow:0 0 20px rgba(255,209,102,.4);border-color:var(--yellow)}
.cell.off{background:var(--bg-card);border-color:var(--border)}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:50}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--yellow),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--yellow);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--blue));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">💡 Lights Out</span></div>
<header><h1>Lights Out</h1><p>Turn off all the lights!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Moves</div><div class="value s-val" id="hMoves">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value l-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">-</div></div>
    </div>
    <div id="board" class="board"></div>
</div>
<div class="overlay" id="overlay">
    <h2 id="oTitle">Lights Out</h2>
    <div class="sub" id="oSub">Click a light to toggle it and its neighbors.<br>Turn ALL lights off to win!</div>
    <div class="final-score" id="oScore" style="display:none"></div>
    <button class="start-btn" id="startBtn">Play!</button>
</div>
<div class="game-footer">Lights Out &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_lightsout',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const SIZE=5;
const boardEl=document.getElementById('board');
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hMoves=document.getElementById('hMoves'),hLevel=document.getElementById('hLevel'),hBest=document.getElementById('hBest');
const BEST_KEY='lightsout_best';
let bestMoves=localStorage.getItem(BEST_KEY);hBest.textContent=bestMoves||'-';
let grid,moves,level,state;

function toggle(r,c){
    if(r>=0&&r<SIZE&&c>=0&&c<SIZE)grid[r][c]=!grid[r][c];
}

function generate(lvl){
    grid=Array.from({length:SIZE},()=>Array(SIZE).fill(false));
    const presses=3+Math.min(lvl,10);
    for(let i=0;i<presses;i++){
        const r=Math.floor(Math.random()*SIZE),c=Math.floor(Math.random()*SIZE);
        toggle(r,c);toggle(r-1,c);toggle(r+1,c);toggle(r,c-1);toggle(r,c+1);
    }
    // Ensure at least 3 lights on
    let onCount=grid.flat().filter(Boolean).length;
    while(onCount<3){
        const r=Math.floor(Math.random()*SIZE),c=Math.floor(Math.random()*SIZE);
        toggle(r,c);toggle(r-1,c);toggle(r+1,c);toggle(r,c-1);toggle(r,c+1);
        onCount=grid.flat().filter(Boolean).length;
    }
}

function render(){
    boardEl.innerHTML='';
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){
            const el=document.createElement('div');
            el.className='cell '+(grid[r][c]?'on':'off');
            el.dataset.r=r;el.dataset.c=c;
            boardEl.appendChild(el);
        }
    }
}

function startGame(){
    level=1;moves=0;state='playing';
    generate(level);render();
    hMoves.textContent=0;hLevel.textContent=1;
    overlay.classList.add('hidden');oScore.style.display='none';
}

function checkWin(){
    return grid.flat().every(v=>!v);
}

boardEl.addEventListener('click',e=>{
    if(state!=='playing')return;
    const t=e.target;if(!t.classList.contains('cell'))return;
    const r=+t.dataset.r,c=+t.dataset.c;
    toggle(r,c);toggle(r-1,c);toggle(r+1,c);toggle(r,c-1);toggle(r,c+1);
    moves++;hMoves.textContent=moves;
    render();
    if(checkWin()){
        if(!bestMoves||moves<+bestMoves){bestMoves=moves;localStorage.setItem(BEST_KEY,bestMoves);hBest.textContent=bestMoves;}
        level++;hLevel.textContent=level;
        setTimeout(()=>{
            generate(level);render();
        },600);
    }
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
