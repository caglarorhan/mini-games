<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍺 Tapper — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--orange);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:440px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--yellow)}.l-val{color:var(--green)}.h-val{color:var(--orange)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--yellow);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.controls{display:none;gap:10px;margin-top:12px;justify-content:center;flex-wrap:wrap}
@media(max-width:768px){.controls{display:flex}}
.ctrl-btn{width:64px;height:56px;border:none;border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;background:var(--bg-card);color:var(--text-light);border:1px solid var(--border)}
.ctrl-btn.serve{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;width:80px}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🍺 Tapper</span></div>
<header><h1>Tapper</h1><p>Serve drinks before customers reach you!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value l-val" id="hLives">3</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value h-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="420" height="340"></canvas>
        <div class="overlay" id="overlay">
            <h2>🍺 Tapper</h2>
            <div class="sub">Move between bars with ▲▼.<br>Press SERVE to slide a drink!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="controls">
        <button class="ctrl-btn" data-act="up">▲</button>
        <button class="ctrl-btn" data-act="down">▼</button>
        <button class="ctrl-btn serve" data-act="serve">SERVE</button>
    </div>
</div>
<div class="game-footer">Tapper &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_tapper',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=420,H=340;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hLives=document.getElementById('hLives'),hBest=document.getElementById('hBest');
const BEST_KEY='tapper_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const BARS=4,BAR_Y=[60,130,200,270],BAR_LEFT=60,BAR_RIGHT=380,BAR_W=BAR_RIGHT-BAR_LEFT;
let playerBar,score,lives,customers,drinks,spawnTimer,spawnRate,state,raf;

function startGame(){
    playerBar=0;score=0;lives=3;
    customers=[];drinks=[];spawnTimer=0;spawnRate=90;
    state='playing';
    hScore.textContent=0;hLives.textContent=3;
    overlay.classList.add('hidden');oScore.style.display='none';
    if(raf)cancelAnimationFrame(raf);
    loop();
}

function spawnCustomer(){
    const bar=Math.floor(Math.random()*BARS);
    customers.push({bar,x:BAR_RIGHT,speed:0.5+score*0.005+Math.random()*0.3});
}

function serveDrink(){
    if(state!=='playing')return;
    // Check if there's a customer on this bar to serve
    const hasCustomer=customers.some(c=>c.bar===playerBar);
    if(!hasCustomer)return;
    drinks.push({bar:playerBar,x:BAR_LEFT+10});
    score+=10;hScore.textContent=score;
}

function update(){
    spawnTimer++;
    if(spawnTimer>=spawnRate){spawnTimer=0;spawnCustomer();spawnRate=Math.max(30,90-score*0.3);}

    // Move customers toward bar
    for(const c of customers){c.x-=c.speed;}
    // Move drinks toward customers
    for(const d of drinks){d.x+=4;}

    // Drink hits customer
    for(let di=drinks.length-1;di>=0;di--){
        const d=drinks[di];
        for(let ci=customers.length-1;ci>=0;ci--){
            const c=customers[ci];
            if(c.bar===d.bar&&Math.abs(c.x-d.x)<20){
                // Customer served, walks back
                customers.splice(ci,1);drinks.splice(di,1);
                score+=25;hScore.textContent=score;
                break;
            }
        }
    }
    // Drink falls off end
    for(let di=drinks.length-1;di>=0;di--){
        if(drinks[di].x>BAR_RIGHT){drinks.splice(di,1);}
    }
    // Customer reaches bar
    for(let ci=customers.length-1;ci>=0;ci--){
        if(customers[ci].x<=BAR_LEFT){
            customers.splice(ci,1);
            lives--;hLives.textContent=lives;
            if(lives<=0){endGame();return;}
        }
    }
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Draw bars
    for(let i=0;i<BARS;i++){
        ctx.fillStyle=i===playerBar?'#3a2f5e':'#1a1333';
        ctx.fillRect(BAR_LEFT,BAR_Y[i]-15,BAR_W,30);
        ctx.strokeStyle='#4a3f6e';ctx.lineWidth=2;
        ctx.strokeRect(BAR_LEFT,BAR_Y[i]-15,BAR_W,30);
        // Bar counter
        ctx.fillStyle='#8B4513';ctx.fillRect(BAR_LEFT,BAR_Y[i]+8,BAR_W,6);
    }
    // Player (bartender)
    const py=BAR_Y[playerBar];
    ctx.fillStyle='#fff';ctx.fillRect(BAR_LEFT-20,py-12,18,24);
    ctx.fillStyle='#ff8a47';ctx.fillRect(BAR_LEFT-18,py-16,14,6);// hat
    // Customers
    for(const c of customers){
        const y=BAR_Y[c.bar];
        ctx.fillStyle='#ff6b9d';
        ctx.beginPath();ctx.arc(c.x,y,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillRect(c.x-3,y-4,3,3);ctx.fillRect(c.x+1,y-4,3,3);
    }
    // Drinks
    ctx.fillStyle='#ffd166';
    for(const d of drinks){
        const y=BAR_Y[d.bar];
        ctx.fillRect(d.x-4,y-6,8,12);
        ctx.fillStyle='#fff';ctx.fillRect(d.x-3,y-8,6,3);ctx.fillStyle='#ffd166';
    }
    // Labels
    ctx.fillStyle='var(--text-muted)';ctx.font='11px sans-serif';ctx.textAlign='left';
    for(let i=0;i<BARS;i++){
        ctx.fillStyle='#a99ec4';ctx.fillText('Bar '+(i+1),BAR_LEFT-5,BAR_Y[i]-20);
    }
}

function loop(){
    if(state!=='playing')return;
    update();draw();raf=requestAnimationFrame(loop);
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
    if(state!=='playing')return;
    if(e.key==='ArrowUp'||e.key==='w'){playerBar=Math.max(0,playerBar-1);}
    if(e.key==='ArrowDown'||e.key==='s'){playerBar=Math.min(BARS-1,playerBar+1);}
    if(e.key===' '||e.key==='Enter'){e.preventDefault();serveDrink();}
});
document.querySelectorAll('[data-act]').forEach(btn=>{
    const act=btn.dataset.act;
    btn.addEventListener('click',()=>{
        if(act==='up')playerBar=Math.max(0,playerBar-1);
        else if(act==='down')playerBar=Math.min(BARS-1,playerBar+1);
        else if(act==='serve')serveDrink();
    });
    btn.addEventListener('touchstart',e=>{e.preventDefault();
        if(act==='up')playerBar=Math.max(0,playerBar-1);
        else if(act==='down')playerBar=Math.min(BARS-1,playerBar+1);
        else if(act==='serve')serveDrink();
    },{passive:false});
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
