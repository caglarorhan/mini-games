<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎹 Piano Tiles — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--purple);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--cyan);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:380px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--purple)}.hi-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#000}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--purple);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎹 Piano Tiles</span></div>
<header><h1>Piano Tiles</h1><p>Tap the black tiles — don't miss!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="540"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Piano Tiles</h2>
            <div class="sub" id="oSub">Tap the dark tiles as they scroll!<br>Don't tap white tiles or miss any!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
</div>
<div class="game-footer">Piano Tiles &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_piano',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height,COLS=4,TW=W/COLS,TH=H/4;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest');
const BEST_KEY='piano_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;
let state='idle',rows,scrollY,speed,score,animFrame;

function makeRow(){
    const col=Math.floor(Math.random()*COLS);
    return{col,tapped:false};
}

function startGame(){
    rows=[];scrollY=0;speed=3;score=0;
    for(let i=0;i<8;i++)rows.push(makeRow());
    state='running';overlay.classList.add('hidden');hScore.textContent=0;
    if(animFrame)cancelAnimationFrame(animFrame);animFrame=requestAnimationFrame(loop);
}

function loop(){if(state!=='running')return;update();draw();animFrame=requestAnimationFrame(loop);}

function update(){
    scrollY+=speed;
    speed=3+score*0.05;
    // Add rows as needed
    while(rows.length*TH-scrollY<H+TH){rows.push(makeRow());}
    // Check if bottom untapped row went off screen
    for(let i=0;i<rows.length;i++){
        const ry=i*TH-scrollY;
        if(ry>H&&!rows[i].tapped){endGame();return;}
    }
}

function draw(){
    ctx.fillStyle='#f0e6ff';ctx.fillRect(0,0,W,H);
    for(let i=0;i<rows.length;i++){
        const ry=i*TH-scrollY;
        if(ry+TH<0||ry>H)continue;
        for(let c=0;c<COLS;c++){
            const x=c*TW;
            if(c===rows[i].col){
                ctx.fillStyle=rows[i].tapped?'#2a1f4e':'#1a1333';
            } else {
                ctx.fillStyle='#f0e6ff';
            }
            ctx.fillRect(x,ry,TW,TH);
            ctx.strokeStyle='#2a1f4e';ctx.lineWidth=0.5;ctx.strokeRect(x,ry,TW,TH);
        }
    }
    // Line
    ctx.strokeStyle='rgba(168,85,247,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,H*0.75);ctx.lineTo(W,H*0.75);ctx.stroke();
}

function handleTap(clientX,clientY){
    if(state!=='running')return;
    const rect=canvas.getBoundingClientRect();
    const mx=(clientX-rect.left)/rect.width*W;
    const my=(clientY-rect.top)/rect.height*H;
    const tapCol=Math.floor(mx/TW);
    // Find the lowest untapped row that's visible
    let targetIdx=-1;
    for(let i=rows.length-1;i>=0;i--){
        const ry=i*TH-scrollY;
        if(my>=ry&&my<ry+TH&&!rows[i].tapped){targetIdx=i;break;}
    }
    if(targetIdx===-1)return;
    if(rows[targetIdx].col===tapCol){
        rows[targetIdx].tapped=true;score++;hScore.textContent=score;
    } else {
        endGame();
    }
}

function endGame(){
    state='dead';if(animFrame)cancelAnimationFrame(animFrame);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Game Over';oSub.textContent='';oScore.textContent='Score: '+score;oScore.style.display='block';overlay.classList.remove('hidden');
}

canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='running'){startGame();return;}handleTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
