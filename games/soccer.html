<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ Soccer Kick — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--green)}.hi-val{color:var(--yellow)}.k-val{color:var(--cyan)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--green);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--blue));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">⚽ Soccer Kick</span></div>
<header><h1>Soccer Kick</h1><p>Score past the goalkeeper!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Goals</div><div class="value s-val" id="hGoals">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
        <div class="hud-box"><div class="label">Kicks</div><div class="value k-val" id="hKicks">10</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="380" height="440"></canvas>
        <div class="overlay" id="overlay">
            <h2>⚽ Soccer Kick</h2>
            <div class="sub">Swipe to kick the ball!<br>Aim for the corners past the keeper.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Kick!</button>
        </div>
    </div>
</div>
<div class="game-footer">Soccer Kick &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_soccer',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=380,H=440;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hGoals=document.getElementById('hGoals'),hBest=document.getElementById('hBest'),hKicks=document.getElementById('hKicks');
const BEST_KEY='soccer_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;
let ball,keeper,goals,kicks,state='idle',anim;
const GOAL_TOP=60,GOAL_W=200,GOAL_H=100,GOAL_L=(W-GOAL_W)/2;

function startGame(){
    goals=0;kicks=10;ball={x:W/2,y:H-80,r:14,vx:0,vy:0,z:0,vz:0};
    keeper={x:W/2,y:GOAL_TOP+GOAL_H/2,w:40,h:50,vx:0,targetX:W/2};
    hGoals.textContent=0;hKicks.textContent=10;
    state='aiming';overlay.classList.add('hidden');oScore.style.display='none';
    requestAnimationFrame(loop);
}

function kick(dx,dy){
    if(state!=='aiming')return;
    const power=Math.min(Math.sqrt(dx*dx+dy*dy),200)/200;
    ball.vx=dx*0.04;ball.vy=-power*12;ball.vz=power*3;
    state='flying';kicks--;hKicks.textContent=kicks;
    // Keeper decides
    keeper.targetX=GOAL_L+20+Math.random()*(GOAL_W-40);
    keeper.vx=(keeper.targetX-keeper.x)*0.08;
}

function update(){
    if(state==='flying'){
        ball.x+=ball.vx;ball.y+=ball.vy;ball.z+=ball.vz;ball.vz-=0.15;ball.vy*=0.99;
        // Keeper moves
        keeper.x+=keeper.vx;keeper.vx*=0.95;
        
        if(ball.y<=GOAL_TOP+GOAL_H&&ball.z>0){
            // Check if goal
            const inGoal=ball.x>GOAL_L&&ball.x<GOAL_L+GOAL_W&&ball.y>GOAL_TOP&&ball.y<GOAL_TOP+GOAL_H;
            const blocked=Math.abs(ball.x-keeper.x)<keeper.w/2&&Math.abs(ball.y-keeper.y)<keeper.h/2;
            if(inGoal&&!blocked){
                goals++;hGoals.textContent=goals;
                anim={type:'goal',t:40};
            } else if(blocked){
                anim={type:'save',t:40};
            } else {
                anim={type:'miss',t:40};
            }
            state='result';
        }
        if(ball.z<0&&ball.y<GOAL_TOP){
            anim={type:'miss',t:40};state='result';
        }
    }
    if(state==='result'){
        anim.t--;
        if(anim.t<=0){
            if(kicks<=0){
                if(goals>best){best=goals;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
                state='over';oScore.style.display='block';oScore.textContent='Goals: '+goals+'/10';
                document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
            } else {
                ball={x:W/2,y:H-80,r:14,vx:0,vy:0,z:0,vz:0};
                keeper.x=W/2;state='aiming';
            }
        }
    }
}

function draw(){
    // Field
    ctx.fillStyle='#1a5c3a';ctx.fillRect(0,0,W,H);
    // Goal
    ctx.strokeStyle='#fff';ctx.lineWidth=4;
    ctx.strokeRect(GOAL_L,GOAL_TOP,GOAL_W,GOAL_H);
    // Net pattern
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    for(let x=GOAL_L;x<=GOAL_L+GOAL_W;x+=15){ctx.beginPath();ctx.moveTo(x,GOAL_TOP);ctx.lineTo(x,GOAL_TOP+GOAL_H);ctx.stroke();}
    for(let y=GOAL_TOP;y<=GOAL_TOP+GOAL_H;y+=15){ctx.beginPath();ctx.moveTo(GOAL_L,y);ctx.lineTo(GOAL_L+GOAL_W,y);ctx.stroke();}
    // Keeper
    ctx.fillStyle='#ffd166';
    ctx.fillRect(keeper.x-keeper.w/2,keeper.y-keeper.h/2,keeper.w,keeper.h);
    ctx.fillStyle='#0a0a1a';
    ctx.fillRect(keeper.x-4,keeper.y-keeper.h/2+5,8,12);
    // Ball
    const scale=1+ball.z*0.03;
    const shadowY=ball.y+ball.z*2;
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(ball.x,shadowY,ball.r*0.8,ball.r*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y-ball.z*3,ball.r*scale,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();
    // Pentagon pattern
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(ball.x-2,ball.y-ball.z*3-2,4*scale,0,Math.PI*2);ctx.fill();
    
    // Result text
    if(state==='result'&&anim){
        ctx.font='bold 28px sans-serif';ctx.textAlign='center';
        if(anim.type==='goal'){ctx.fillStyle='#06d6a0';ctx.fillText('GOAL! ⚽',W/2,H/2);}
        else if(anim.type==='save'){ctx.fillStyle='#ffd166';ctx.fillText('SAVED!',W/2,H/2);}
        else{ctx.fillStyle='#ff6b9d';ctx.fillText('MISS!',W/2,H/2);}
    }
}

function loop(){update();draw();if(state!=='over')requestAnimationFrame(loop);}

function getCanvasPos(e){
    const rect=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]||e.changedTouches[0]:e;
    return{x:(t.clientX-rect.left)*(W/rect.width),y:(t.clientY-rect.top)*(H/rect.height)};
}

let startPos;
canvas.addEventListener('mousedown',e=>{startPos=getCanvasPos(e);});
canvas.addEventListener('mouseup',e=>{
    if(!startPos)return;const p=getCanvasPos(e);
    kick(p.x-startPos.x,p.y-startPos.y);startPos=null;
});
canvas.addEventListener('touchstart',e=>{e.preventDefault();startPos=getCanvasPos(e);},{passive:false});
canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    if(!startPos)return;const p=getCanvasPos(e);
    kick(p.x-startPos.x,p.y-startPos.y);startPos=null;
},{passive:false});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
