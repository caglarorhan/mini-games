<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏓 Maze Runner — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--purple));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.l-val{color:var(--green)}.hi-val{color:var(--yellow)}.t-val{color:var(--cyan)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--green),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--green);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--purple));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:6px;margin-top:10px}
.ctrl-row{display:flex;justify-content:center;gap:6px}
.ctrl-pad{display:flex;flex-direction:column;gap:4px;align-items:center}
.ctrl-btn{width:56px;height:48px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.3rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🏓 Maze Runner</span></div>
<header><h1>Maze Runner</h1><p>Navigate the maze to the exit!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Level</div><div class="value l-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Time</div><div class="value t-val" id="hTime">0s</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">-</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="380" height="380"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Maze Runner</h2>
            <div class="sub" id="oSub">Navigate from green to red!<br>Use arrow keys or D-pad.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Run!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="ctrl-pad">
            <div class="ctrl-row"><button class="ctrl-btn" id="btnU">▲</button></div>
            <div class="ctrl-row"><button class="ctrl-btn" id="btnL">◄</button><button class="ctrl-btn" id="btnD">▼</button><button class="ctrl-btn" id="btnR">►</button></div>
        </div>
    </div>
</div>
<div class="game-footer">Maze Runner &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_maze',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hLevel=document.getElementById('hLevel'),hTime=document.getElementById('hTime'),hBest=document.getElementById('hBest');
const BEST_KEY='maze_best';
let bestTime=localStorage.getItem(BEST_KEY);hBest.textContent=bestTime?bestTime+'s':'-';
let SIZE,cellW,cellH,maze,player,exitR,exitC,level,startTime,state='idle',timerInterval;

function generateMaze(rows,cols){
    const grid=Array.from({length:rows},()=>Array.from({length:cols},()=>({top:true,right:true,bottom:true,left:true,visited:false})));
    const stack=[];
    let r=0,c=0;grid[r][c].visited=true;stack.push([r,c]);
    while(stack.length){
        const neighbors=[];
        if(r>0&&!grid[r-1][c].visited)neighbors.push([r-1,c,'top','bottom']);
        if(r<rows-1&&!grid[r+1][c].visited)neighbors.push([r+1,c,'bottom','top']);
        if(c>0&&!grid[r][c-1].visited)neighbors.push([r,c-1,'left','right']);
        if(c<cols-1&&!grid[r][c+1].visited)neighbors.push([r,c+1,'right','left']);
        if(neighbors.length){
            const[nr,nc,wall,opp]=neighbors[Math.floor(Math.random()*neighbors.length)];
            grid[r][c][wall]=false;grid[nr][nc][opp]=false;
            grid[nr][nc].visited=true;stack.push([nr,nc]);r=nr;c=nc;
        } else {
            [r,c]=stack.pop();
        }
    }
    return grid;
}

function startGame(){
    level=1;newLevel();state='running';overlay.classList.add('hidden');oScore.style.display='none';
}

function newLevel(){
    SIZE=8+Math.min(level*2,12);
    cellW=W/SIZE;cellH=H/SIZE;
    maze=generateMaze(SIZE,SIZE);
    player={r:0,c:0};exitR=SIZE-1;exitC=SIZE-1;
    hLevel.textContent=level;
    startTime=Date.now();
    if(timerInterval)clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        if(state==='running')hTime.textContent=((Date.now()-startTime)/1000).toFixed(1)+'s';
    },100);
    draw();
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Cells
    for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){
            const x=c*cellW,y=r*cellH;
            const cell=maze[r][c];
            ctx.strokeStyle='#4a4a8a';ctx.lineWidth=2;
            if(cell.top){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cellW,y);ctx.stroke();}
            if(cell.right){ctx.beginPath();ctx.moveTo(x+cellW,y);ctx.lineTo(x+cellW,y+cellH);ctx.stroke();}
            if(cell.bottom){ctx.beginPath();ctx.moveTo(x,y+cellH);ctx.lineTo(x+cellW,y+cellH);ctx.stroke();}
            if(cell.left){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+cellH);ctx.stroke();}
        }
    }
    // Exit
    ctx.fillStyle='rgba(255,107,157,0.3)';ctx.fillRect(exitC*cellW+2,exitR*cellH+2,cellW-4,cellH-4);
    ctx.fillStyle='#ff6b9d';ctx.font='bold '+Math.max(10,cellW*0.4)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🏁',exitC*cellW+cellW/2,exitR*cellH+cellH/2);
    // Player
    ctx.fillStyle='#06d6a0';
    ctx.beginPath();ctx.arc(player.c*cellW+cellW/2,player.r*cellH+cellH/2,Math.min(cellW,cellH)*0.3,0,Math.PI*2);ctx.fill();
}

function move(dr,dc){
    if(state!=='running')return;
    const r=player.r,c=player.c;
    const cell=maze[r][c];
    if(dr===-1&&cell.top)return;if(dr===1&&cell.bottom)return;
    if(dc===-1&&cell.left)return;if(dc===1&&cell.right)return;
    player.r+=dr;player.c+=dc;
    draw();
    if(player.r===exitR&&player.c===exitC){
        const t=((Date.now()-startTime)/1000).toFixed(1);
        if(!bestTime||+t<+bestTime){bestTime=t;localStorage.setItem(BEST_KEY,bestTime);hBest.textContent=t+'s';}
        level++;
        setTimeout(newLevel,500);
    }
}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp')move(-1,0);else if(e.key==='ArrowDown')move(1,0);
    else if(e.key==='ArrowLeft')move(0,-1);else if(e.key==='ArrowRight')move(0,1);
});
const btnU=document.getElementById('btnU'),btnD=document.getElementById('btnD'),btnL=document.getElementById('btnL'),btnR=document.getElementById('btnR');
btnU.addEventListener('touchstart',e=>{e.preventDefault();move(-1,0);},{passive:false});
btnD.addEventListener('touchstart',e=>{e.preventDefault();move(1,0);},{passive:false});
btnL.addEventListener('touchstart',e=>{e.preventDefault();move(0,-1);},{passive:false});
btnR.addEventListener('touchstart',e=>{e.preventDefault();move(0,1);},{passive:false});

// Swipe on canvas
let tx,ty;
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='running'){startGame();return;}tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>Math.abs(dy)){dx>20?move(0,1):dx<-20?move(0,-1):0;}
    else{dy>20?move(1,0):dy<-20?move(-1,0):0;}
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
