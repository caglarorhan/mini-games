<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ Reaction Time — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--cyan);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--cyan));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:440px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--green)}.hi-val{color:var(--yellow)}.r-val{color:var(--cyan)}
.zone{width:100%;height:300px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .3s;user-select:none;-webkit-user-select:none}
.zone.wait{background:var(--bg-card);border:2px solid var(--border)}
.zone.ready{background:rgba(255,107,157,.15);border:2px solid var(--pink)}
.zone.go{background:rgba(6,214,160,.2);border:2px solid var(--green)}
.zone.result{background:var(--bg-card);border:2px solid var(--border)}
.zone.early{background:rgba(255,107,157,.2);border:2px solid var(--pink)}
.zone-text{font-size:1.5rem;font-weight:900;margin-bottom:8px}
.zone-sub{color:var(--text-muted);font-size:.9rem}
.zone-time{font-size:3rem;font-weight:900;margin:10px 0}
.history{margin-top:14px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.hist-tag{padding:4px 10px;border-radius:8px;font-size:.75rem;font-weight:600;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted)}
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:50}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--cyan));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">⚡ Reaction Time</span></div>
<header><h1>Reaction Time</h1><p>How fast can you react?</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Round</div><div class="value r-val" id="hRound">0/5</div></div>
        <div class="hud-box"><div class="label">Average</div><div class="value s-val" id="hAvg">-</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">-</div></div>
    </div>
    <div class="zone wait" id="zone">
        <div class="zone-text" id="zText">Tap to Start</div>
        <div class="zone-sub" id="zSub">Test your reaction speed!</div>
        <div class="zone-time" id="zTime" style="display:none"></div>
    </div>
    <div class="history" id="history"></div>
</div>
<div class="game-footer">Reaction Time &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_reaction',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const zone=document.getElementById('zone'),zText=document.getElementById('zText'),zSub=document.getElementById('zSub'),zTime=document.getElementById('zTime');
const hRound=document.getElementById('hRound'),hAvg=document.getElementById('hAvg'),hBest=document.getElementById('hBest'),histEl=document.getElementById('history');
const BEST_KEY='reaction_best';
let bestAvg=localStorage.getItem(BEST_KEY);
hBest.textContent=bestAvg?bestAvg+'ms':'-';
const ROUNDS=5;
let state='idle',round,times,timeout,startTime;

function startRound(){
    round++;hRound.textContent=round+'/'+ROUNDS;
    zone.className='zone ready';zText.textContent='Wait for green...';zSub.textContent="Don't tap yet!";zTime.style.display='none';
    state='waiting';
    const delay=1500+Math.random()*3000;
    timeout=setTimeout(()=>{
        zone.className='zone go';zText.textContent='TAP NOW!';zSub.textContent='';
        startTime=performance.now();state='go';
    },delay);
}

function handleTap(){
    if(state==='idle'){
        round=0;times=[];histEl.innerHTML='';startRound();return;
    }
    if(state==='waiting'){
        clearTimeout(timeout);state='early';
        zone.className='zone early';zText.textContent='Too early!';zSub.textContent='Tap to try again';zTime.style.display='none';
        state='idle';round--;return;
    }
    if(state==='go'){
        const ms=Math.round(performance.now()-startTime);
        times.push(ms);state='result';
        zone.className='zone result';zText.textContent=ms+'ms';zSub.textContent=ms<200?'Amazing!':ms<300?'Great!':ms<400?'Good':'Keep trying!';
        const tag=document.createElement('span');tag.className='hist-tag';tag.textContent=ms+'ms';histEl.appendChild(tag);
        if(round>=ROUNDS){
            const avg=Math.round(times.reduce((a,b)=>a+b,0)/times.length);
            hAvg.textContent=avg+'ms';
            if(!bestAvg||avg<+bestAvg){bestAvg=avg;localStorage.setItem(BEST_KEY,bestAvg);hBest.textContent=avg+'ms';}
            zSub.textContent='Average: '+avg+'ms — Tap to play again';
            state='idle';
        } else {
            setTimeout(startRound,1000);
        }
        return;
    }
    if(state==='result')return;
}

zone.addEventListener('click',handleTap);
zone.addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});
})();
</script>
</body>
</html>
