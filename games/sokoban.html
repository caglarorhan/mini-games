<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📦 Sokoban — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--yellow)}.lv-val{color:var(--cyan)}.m-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0618}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--yellow);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;margin-top:10px;gap:4px}
.ctrl-row{display:flex;justify-content:center;gap:4px}
.ctrl-grid{display:flex;flex-direction:column;gap:4px;align-items:center}
.ctrl-btn{width:56px;height:56px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-light);font-size:1.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:var(--deep-purple)}
.undo-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--cyan);padding:10px 20px;border-radius:10px;font-size:.9rem;cursor:pointer;margin-top:8px;display:block;margin-left:auto;margin-right:auto}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">📦 Sokoban</span></div>
<header><h1>Sokoban</h1><p>Push all boxes onto the targets!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Level</div><div class="value lv-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Moves</div><div class="value s-val" id="hMoves">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value m-val" id="hBest">-</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Sokoban</h2>
            <div class="sub" id="oSub">Push boxes onto targets.<br>Use arrow keys or swipe!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="ctrl-grid">
            <div class="ctrl-row"><button class="ctrl-btn" data-dir="up">▲</button></div>
            <div class="ctrl-row"><button class="ctrl-btn" data-dir="left">◄</button><button class="ctrl-btn" data-dir="down">▼</button><button class="ctrl-btn" data-dir="right">►</button></div>
        </div>
    </div>
    <button class="undo-btn" id="undoBtn">↩ Undo</button>
</div>
<div class="game-footer">Sokoban &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_sokoban',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hLevel=document.getElementById('hLevel'),hMoves=document.getElementById('hMoves'),hBest=document.getElementById('hBest');
const BEST_PREFIX='sokoban_best_';

// Classic Sokoban levels (W=wall, .=floor, @=player, $=box, O=target, *=box on target, +=player on target)
const LEVELS=[
// Level 1 - simple
[
"########",
"#......#",
"#.@.$O.#",
"#......#",
"########"
],
// Level 2
[
"#######",
"#.....#",
"#.$.$.#",
"#.@...#",
"#.O.O.#",
"#.....#",
"#######"
],
// Level 3
[
"########",
"#......#",
"#.#.$$O#",
"#.@..O.#",
"#......#",
"########"
],
// Level 4
[
"########",
"#..#...#",
"#.$@$..#",
"#..$.#.#",
"#.OOO..#",
"#......#",
"########"
],
// Level 5
[
"#########",
"#.......#",
"#.$.#.$.#",
"#.$.@.$.#",
"#..O#O..#",
"#..OOO..#",
"#.......#",
"#########"
],
// Level 6
[
"#########",
"#.......#",
"#.#.#.#.#",
"#.$.$.$.#",
"#..@....#",
"#.O.O.O.#",
"#.......#",
"#########"
],
// Level 7
[
"##########",
"#........#",
"#.##.$$..#",
"#.@..$$..#",
"#....##..#",
"#..OOOO..#",
"#........#",
"##########"
],
// Level 8
[
"##########",
"#........#",
"#.####.#.#",
"#.$.$....#",
"#.$.$.@..#",
"#........#",
"#.O.O.O.O#",
"#........#",
"##########"
]
];
let levelIdx=0,grid,player,moves,history,state='idle';

function parseLevel(lv){
    const g=[],targets=[];let px=0,py=0;
    lv.forEach((row,r)=>{
        g[r]=[];
        for(let c=0;c<row.length;c++){
            const ch=row[c];
            if(ch==='#')g[r][c]='W';
            else if(ch==='.')g[r][c]=' ';
            else if(ch==='@'){g[r][c]=' ';px=c;py=r;}
            else if(ch==='$'){g[r][c]='B';}
            else if(ch==='O'){g[r][c]=' ';targets.push({r,c});}
            else if(ch==='*'){g[r][c]='B';targets.push({r,c});}
            else if(ch==='+'){g[r][c]=' ';px=c;py=r;targets.push({r,c});}
            else g[r][c]=' ';
        }
    });
    return{grid:g,player:{x:px,y:py},targets};
}

let targets=[];
function loadLevel(){
    const lv=parseLevel(LEVELS[levelIdx]);
    grid=lv.grid;player={...lv.player};targets=lv.targets;moves=0;history=[];
    hLevel.textContent=levelIdx+1;hMoves.textContent=0;
    const b=localStorage.getItem(BEST_PREFIX+levelIdx);hBest.textContent=b||'-';
    draw();
}

function cloneGrid(){return grid.map(r=>[...r]);}

function move(dx,dy){
    if(state!=='running')return;
    const nx=player.x+dx,ny=player.y+dy;
    if(grid[ny][nx]==='W')return;
    if(grid[ny][nx]==='B'){
        const bx=nx+dx,by=ny+dy;
        if(!grid[by]||grid[by][bx]==='W'||grid[by][bx]==='B')return;
        history.push({grid:cloneGrid(),player:{...player},moves});
        grid[by][bx]='B';grid[ny][nx]=' ';
    } else {
        history.push({grid:cloneGrid(),player:{...player},moves});
    }
    player.x=nx;player.y=ny;moves++;hMoves.textContent=moves;
    draw();checkWin();
}

function undo(){
    if(!history.length)return;
    const s=history.pop();grid=s.grid;player=s.player;moves=s.moves;hMoves.textContent=moves;draw();
}

function checkWin(){
    const allOnTarget=targets.every(t=>grid[t.r][t.c]==='B');
    if(allOnTarget){
        const b=localStorage.getItem(BEST_PREFIX+levelIdx);
        if(!b||moves<+b)localStorage.setItem(BEST_PREFIX+levelIdx,moves);
        hBest.textContent=localStorage.getItem(BEST_PREFIX+levelIdx);
        if(levelIdx<LEVELS.length-1){
            levelIdx++;setTimeout(()=>{loadLevel();},600);
        } else {
            state='done';oTitle.textContent='You Win!';oSub.textContent='All levels completed!';oScore.textContent='Total moves: '+moves;oScore.style.display='block';overlay.classList.remove('hidden');
        }
    }
}

function draw(){
    const rows=grid.length,cols=grid[0].length;
    const cellW=W/cols,cellH=H/rows,cell=Math.min(cellW,cellH);
    const offX=(W-cols*cell)/2,offY=(H-rows*cell)/2;
    ctx.fillStyle='#0a0618';ctx.fillRect(0,0,W,H);
    // Draw targets first
    targets.forEach(t=>{
        ctx.fillStyle='rgba(255,209,102,0.25)';
        ctx.fillRect(offX+t.c*cell+2,offY+t.r*cell+2,cell-4,cell-4);
        ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(offX+t.c*cell+cell/2,offY+t.r*cell+cell/2,cell*0.15,0,Math.PI*2);ctx.fill();
    });
    for(let r=0;r<rows;r++){
        for(let c=0;c<grid[r].length;c++){
            const x=offX+c*cell,y=offY+r*cell;
            if(grid[r][c]==='W'){
                ctx.fillStyle='#2a1f4e';ctx.fillRect(x,y,cell,cell);
                ctx.strokeStyle='#3d2d6b';ctx.lineWidth=1;ctx.strokeRect(x+0.5,y+0.5,cell-1,cell-1);
            } else if(grid[r][c]==='B'){
                const onTarget=targets.some(t=>t.r===r&&t.c===c);
                ctx.fillStyle=onTarget?'#06d6a0':'#ff8a47';
                ctx.fillRect(x+4,y+4,cell-8,cell-8);
                ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.strokeRect(x+4,y+4,cell-8,cell-8);
            }
        }
    }
    // Player
    const px=offX+player.x*cell+cell/2,py=offY+player.y*cell+cell/2;
    ctx.fillStyle='#00e5ff';ctx.beginPath();ctx.arc(px,py,cell*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(px-cell*0.1,py-cell*0.1,cell*0.1,0,Math.PI*2);ctx.fill();
}

function startGame(){state='running';levelIdx=0;loadLevel();overlay.classList.add('hidden');}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('undoBtn').addEventListener('click',undo);

document.addEventListener('keydown',e=>{
    if(state!=='running'){if(e.key==='Enter'||e.code==='Space'){e.preventDefault();startGame();}return;}
    if(e.key==='ArrowUp'||e.key==='w')move(0,-1);
    else if(e.key==='ArrowDown'||e.key==='s')move(0,1);
    else if(e.key==='ArrowLeft'||e.key==='a')move(-1,0);
    else if(e.key==='ArrowRight'||e.key==='d')move(1,0);
    else if(e.key==='z')undo();
});

document.querySelectorAll('.ctrl-btn').forEach(btn=>{
    btn.addEventListener('touchstart',e=>{
        e.preventDefault();
        const d=btn.dataset.dir;
        if(d==='up')move(0,-1);else if(d==='down')move(0,1);
        else if(d==='left')move(-1,0);else if(d==='right')move(1,0);
    },{passive:false});
    btn.addEventListener('click',()=>{
        const d=btn.dataset.dir;
        if(d==='up')move(0,-1);else if(d==='down')move(0,1);
        else if(d==='left')move(-1,0);else if(d==='right')move(1,0);
    });
});

// Swipe
let sx,sy;
canvas.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
    if(Math.abs(dx)>Math.abs(dy)){move(dx>0?1:-1,0);}else{move(0,dy>0?1:-1);}
});
draw();
})();
</script>
</body>
</html>
