<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏎️ Rally-X — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--green);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--green),var(--yellow));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--green)}.f-val{color:var(--orange)}.h-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--green);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--green),var(--yellow));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.d-pad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px;gap:4px;justify-content:center;margin-top:12px}
.ctrl-btn{width:56px;height:56px;border:none;border-radius:14px;font-size:1.3rem;font-weight:700;cursor:pointer;background:var(--bg-card);color:var(--text-light);border:1px solid var(--border)}
.d-pad .ctrl-btn:nth-child(1){grid-column:2}
.d-pad .ctrl-btn:nth-child(2){grid-column:1;grid-row:2}
.d-pad .ctrl-btn:nth-child(3){grid-column:3;grid-row:2}
.d-pad .ctrl-btn:nth-child(4){grid-column:2;grid-row:2}
@media(max-width:768px){.d-pad{display:grid}}
@media(min-width:769px){.d-pad{display:none}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🏎️ Rally-X</span></div>
<header><h1>Rally-X</h1><p>Collect all flags, avoid red cars!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Flags</div><div class="value f-val" id="hFlags">0/10</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value h-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="380" height="380"></canvas>
        <div class="overlay" id="overlay">
            <h2>🏎️ Rally-X</h2>
            <div class="sub">Navigate the maze to collect flags.<br>Avoid the red enemy cars!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="d-pad">
        <button class="ctrl-btn" data-dir="up">▲</button>
        <button class="ctrl-btn" data-dir="left">◄</button>
        <button class="ctrl-btn" data-dir="right">►</button>
        <button class="ctrl-btn" data-dir="down">▼</button>
    </div>
</div>
<div class="game-footer">Rally-X &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_rallyx',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=380,H=380;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hFlags=document.getElementById('hFlags'),hBest=document.getElementById('hBest');
const BEST_KEY='rallyx_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const TILE=20,COLS=19,ROWS=19;
let maze,player,enemies,flags,score,flagsCollected,totalFlags,state,raf;
let keys={};

function generateMaze(){
    maze=Array.from({length:ROWS},()=>Array(COLS).fill(1));
    // Simple maze: roads at odd rows/cols with random connections
    for(let r=1;r<ROWS;r+=2)for(let c=1;c<COLS;c+=2)maze[r][c]=0;
    // Horizontal connections
    for(let r=1;r<ROWS;r+=2)for(let c=2;c<COLS-1;c+=2)if(Math.random()<0.6)maze[r][c]=0;
    // Vertical connections
    for(let r=2;r<ROWS-1;r+=2)for(let c=1;c<COLS;c+=2)if(Math.random()<0.6)maze[r][c]=0;
    // Ensure start clear
    maze[1][1]=0;maze[1][2]=0;maze[2][1]=0;
}

function placeFlags(){
    flags=[];totalFlags=10;
    let attempts=0;
    while(flags.length<totalFlags&&attempts<500){
        const r=1+Math.floor(Math.random()*(ROWS-2));
        const c=1+Math.floor(Math.random()*(COLS-2));
        if(maze[r][c]===0&&!(r<3&&c<3)&&!flags.some(f=>f.r===r&&f.c===c)){
            flags.push({r,c,collected:false});
        }
        attempts++;
    }
    totalFlags=flags.length;
}

function placeEnemies(){
    enemies=[];
    for(let i=0;i<3;i++){
        let er,ec;
        do{er=1+Math.floor(Math.random()*(ROWS-2));ec=1+Math.floor(Math.random()*(COLS-2));}
        while(maze[er][ec]===1||(er<4&&ec<4));
        enemies.push({x:ec*TILE,y:er*TILE,dir:['up','down','left','right'][Math.floor(Math.random()*4)],speed:1.2+i*0.3});
    }
}

function startGame(){
    score=0;flagsCollected=0;
    generateMaze();placeFlags();placeEnemies();
    player={x:TILE,y:TILE,dir:'right'};
    state='playing';
    hScore.textContent=0;hFlags.textContent='0/'+totalFlags;
    overlay.classList.add('hidden');oScore.style.display='none';
    if(raf)cancelAnimationFrame(raf);
    loop();
}

function canMove(x,y){
    const c1=Math.floor(x/TILE),r1=Math.floor(y/TILE);
    const c2=Math.floor((x+TILE-2)/TILE),r2=Math.floor((y+TILE-2)/TILE);
    if(r1<0||r2>=ROWS||c1<0||c2>=COLS)return false;
    return maze[r1][c1]===0&&maze[r1][c2]===0&&maze[r2][c1]===0&&maze[r2][c2]===0;
}

function update(){
    const spd=2;
    let nx=player.x,ny=player.y;
    if(keys.up){ny-=spd;player.dir='up';}
    if(keys.down){ny+=spd;player.dir='down';}
    if(keys.left){nx-=spd;player.dir='left';}
    if(keys.right){nx+=spd;player.dir='right';}
    if(canMove(nx,ny)){player.x=nx;player.y=ny;}
    else if(canMove(nx,player.y)){player.x=nx;}
    else if(canMove(player.x,ny)){player.y=ny;}

    // Collect flags
    const pr=Math.round(player.y/TILE),pc=Math.round(player.x/TILE);
    for(const f of flags){
        if(!f.collected&&f.r===pr&&f.c===pc){
            f.collected=true;flagsCollected++;score+=100;
            hScore.textContent=score;hFlags.textContent=flagsCollected+'/'+totalFlags;
        }
    }
    if(flagsCollected>=totalFlags){
        score+=500;hScore.textContent=score;
        // Next round
        generateMaze();placeFlags();placeEnemies();
        player.x=TILE;player.y=TILE;flagsCollected=0;
        hFlags.textContent='0/'+totalFlags;
    }

    // Move enemies
    for(const e of enemies){
        const dirs=['up','down','left','right'];
        const dx={up:0,down:0,left:-e.speed,right:e.speed};
        const dy={up:-e.speed,down:e.speed,left:0,right:0};
        let nx2=e.x+dx[e.dir],ny2=e.y+dy[e.dir];
        if(canMove(nx2,ny2)){e.x=nx2;e.y=ny2;}
        else{
            // Change direction
            const valid=dirs.filter(d=>{
                const tx=e.x+dx[d]*2,ty=e.y+dy[d]*2;
                return canMove(tx,ty);
            });
            if(valid.length)e.dir=valid[Math.floor(Math.random()*valid.length)];
        }
        // Collision with player
        if(Math.abs(e.x-player.x)<TILE*0.7&&Math.abs(e.y-player.y)<TILE*0.7){
            endGame();return;
        }
    }
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Maze
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(maze[r][c]===1){
                ctx.fillStyle='#1a2a4a';ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
            }
        }
    }
    // Flags
    for(const f of flags){
        if(f.collected)continue;
        ctx.fillStyle='#ffd166';
        ctx.fillRect(f.c*TILE+6,f.r*TILE+2,3,12);
        ctx.fillRect(f.c*TILE+6,f.r*TILE+2,8,6);
    }
    // Player (blue car)
    ctx.fillStyle='#00e5ff';
    ctx.fillRect(player.x+2,player.y+2,TILE-4,TILE-4);
    ctx.fillStyle='#fff';
    const arrs={up:[player.x+8,player.y+3],down:[player.x+8,player.y+13],left:[player.x+3,player.y+8],right:[player.x+13,player.y+8]};
    const a=arrs[player.dir];ctx.fillRect(a[0],a[1],4,4);
    // Enemies (red cars)
    for(const e of enemies){
        ctx.fillStyle='#ff6b9d';ctx.fillRect(e.x+2,e.y+2,TILE-4,TILE-4);
    }
    // Minimap (top-right)
    const ms=2;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-COLS*ms-4,2,COLS*ms+4,ROWS*ms+4);
    for(const f of flags){if(!f.collected){ctx.fillStyle='#ffd166';ctx.fillRect(W-COLS*ms-2+f.c*ms,4+f.r*ms,ms,ms);}}
    ctx.fillStyle='#00e5ff';ctx.fillRect(W-COLS*ms-2+Math.round(player.x/TILE)*ms,4+Math.round(player.y/TILE)*ms,ms,ms);
    for(const e of enemies){ctx.fillStyle='#ff6b9d';ctx.fillRect(W-COLS*ms-2+Math.round(e.x/TILE)*ms,4+Math.round(e.y/TILE)*ms,ms,ms);}
}

function loop(){
    if(state!=='playing')return;
    update();draw();raf=requestAnimationFrame(loop);
}

function endGame(){
    state='over';if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='w')keys.up=true;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=true;
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=true;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp'||e.key==='w')keys.up=false;
    if(e.key==='ArrowDown'||e.key==='s')keys.down=false;
    if(e.key==='ArrowLeft'||e.key==='a')keys.left=false;
    if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
});
document.querySelectorAll('[data-dir]').forEach(btn=>{
    const d=btn.dataset.dir;
    const on=()=>keys[d]=true,off=()=>keys[d]=false;
    btn.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
    btn.addEventListener('touchend',off);btn.addEventListener('touchcancel',off);
    btn.addEventListener('mousedown',on);btn.addEventListener('mouseup',off);btn.addEventListener('mouseleave',off);
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
