<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 Quick Draw — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.r-val{color:var(--green)}.h-val{color:var(--yellow)}
.game-area{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a;padding:20px;min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prompt-text{font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:15px;min-height:40px}
.shape-area{width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.opt-btn{padding:14px;border:2px solid var(--border);border-radius:12px;background:var(--bg-card);color:var(--text-light);font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.opt-btn:active{transform:scale(0.95)}
.opt-btn.correct{border-color:var(--green);background:rgba(6,214,160,0.2)}
.opt-btn.wrong{border-color:var(--pink);background:rgba(255,107,157,0.2)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎨 Quick Draw</span></div>
<header><h1>Quick Draw</h1><p>Identify the shape before time runs out!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Round</div><div class="value r-val" id="hRound">0/10</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value h-val" id="hBest">0</div></div>
    </div>
    <div class="game-area" id="gameArea">
        <div class="prompt-text" id="prompt"></div>
        <div class="shape-area"><canvas id="shapeCanvas" width="180" height="180"></canvas></div>
        <div class="options" id="options"></div>
        <div class="overlay" id="overlay">
            <h2>🎨 Quick Draw</h2>
            <div class="sub">Identify shapes and colors quickly!<br>10 rounds — be fast for bonus points!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
</div>
<div class="game-footer">Quick Draw &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_quickdraw',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const sCanvas=document.getElementById('shapeCanvas'),sCtx=sCanvas.getContext('2d');
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hRound=document.getElementById('hRound'),hBest=document.getElementById('hBest');
const prompt=document.getElementById('prompt'),optionsEl=document.getElementById('options');
const BEST_KEY='quickdraw_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const SHAPES=['Circle','Square','Triangle','Diamond','Star','Pentagon','Hexagon'];
const COLORS=[{name:'Red',hex:'#ff6b9d'},{name:'Blue',hex:'#00e5ff'},{name:'Green',hex:'#06d6a0'},{name:'Yellow',hex:'#ffd166'},{name:'Purple',hex:'#a855f7'},{name:'Orange',hex:'#ff8a47'}];
const TOTAL_ROUNDS=10;
let score,round,roundStart,correctAnswer,state,timer;

function drawShape(shape,color){
    sCtx.clearRect(0,0,180,180);
    sCtx.fillStyle=color;sCtx.strokeStyle=color;sCtx.lineWidth=3;
    const cx=90,cy=90,r=60;
    switch(shape){
        case'Circle':sCtx.beginPath();sCtx.arc(cx,cy,r,0,Math.PI*2);sCtx.fill();break;
        case'Square':sCtx.fillRect(cx-r,cy-r,r*2,r*2);break;
        case'Triangle':sCtx.beginPath();sCtx.moveTo(cx,cy-r);sCtx.lineTo(cx-r,cy+r);sCtx.lineTo(cx+r,cy+r);sCtx.closePath();sCtx.fill();break;
        case'Diamond':sCtx.beginPath();sCtx.moveTo(cx,cy-r);sCtx.lineTo(cx+r*0.7,cy);sCtx.lineTo(cx,cy+r);sCtx.lineTo(cx-r*0.7,cy);sCtx.closePath();sCtx.fill();break;
        case'Star':drawStar(cx,cy,5,r,r*0.4,color);break;
        case'Pentagon':drawPoly(cx,cy,5,r,color);break;
        case'Hexagon':drawPoly(cx,cy,6,r,color);break;
    }
}
function drawStar(cx,cy,pts,oR,iR,color){
    sCtx.beginPath();
    for(let i=0;i<pts*2;i++){
        const r=i%2===0?oR:iR;
        const a=Math.PI*i/pts-Math.PI/2;
        if(i===0)sCtx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        else sCtx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    sCtx.closePath();sCtx.fill();
}
function drawPoly(cx,cy,sides,r,color){
    sCtx.beginPath();
    for(let i=0;i<sides;i++){
        const a=Math.PI*2*i/sides-Math.PI/2;
        if(i===0)sCtx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
        else sCtx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    sCtx.closePath();sCtx.fill();
}

function startGame(){
    score=0;round=0;state='playing';
    hScore.textContent=0;
    overlay.classList.add('hidden');oScore.style.display='none';
    nextRound();
}

function nextRound(){
    round++;
    if(round>TOTAL_ROUNDS){endGame();return;}
    hRound.textContent=round+'/'+TOTAL_ROUNDS;

    const shape=SHAPES[Math.floor(Math.random()*SHAPES.length)];
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    drawShape(shape,color.hex);

    // Question type: ask about shape or color
    const askShape=Math.random()<0.5;
    if(askShape){
        prompt.textContent='What shape is this?';
        correctAnswer=shape;
        const opts=new Set([shape]);
        while(opts.size<4)opts.add(SHAPES[Math.floor(Math.random()*SHAPES.length)]);
        showOptions([...opts].sort(()=>Math.random()-0.5));
    }else{
        prompt.textContent='What color is this?';
        correctAnswer=color.name;
        const opts=new Set([color.name]);
        while(opts.size<4)opts.add(COLORS[Math.floor(Math.random()*COLORS.length)].name);
        showOptions([...opts].sort(()=>Math.random()-0.5));
    }
    roundStart=Date.now();
    if(timer)clearTimeout(timer);
    timer=setTimeout(()=>{if(state==='playing'){score-=10;hScore.textContent=score;nextRound();}},5000);
}

function showOptions(opts){
    optionsEl.innerHTML='';
    opts.forEach(o=>{
        const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=o;
        btn.addEventListener('click',()=>answer(o,btn));
        optionsEl.appendChild(btn);
    });
}

function answer(val,btn){
    if(state!=='playing')return;
    clearTimeout(timer);
    const elapsed=(Date.now()-roundStart)/1000;
    if(val===correctAnswer){
        btn.classList.add('correct');
        const bonus=Math.max(0,Math.floor((5-elapsed)*20));
        score+=50+bonus;
    }else{
        btn.classList.add('wrong');
        // Highlight correct
        optionsEl.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent===correctAnswer)b.classList.add('correct');});
        score-=25;
    }
    hScore.textContent=score;
    setTimeout(nextRound,600);
}

function endGame(){
    state='over';if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    sCtx.clearRect(0,0,180,180);prompt.textContent='';optionsEl.innerHTML='';
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
