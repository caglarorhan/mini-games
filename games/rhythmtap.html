<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎵 Rhythm Tap — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--pink);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--purple);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px;color:var(--pink)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border)}
canvas{display:block;width:100%;height:auto;background:#0a0a1a}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{display:none}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final{color:var(--pink);font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.lanes{display:flex;justify-content:center;gap:6px;margin-top:10px}
.lane-btn{width:70px;height:60px;border-radius:14px;border:2px solid var(--border);background:var(--bg-card);font-size:1.6rem;cursor:pointer;-webkit-user-select:none}
.lane-btn:active{transform:scale(.9)}
.lane-btn.l0{color:#ff6b9d;border-color:#ff6b9d33}.lane-btn.l0:active{background:#ff6b9d33}
.lane-btn.l1{color:#ffd166;border-color:#ffd16633}.lane-btn.l1:active{background:#ffd16633}
.lane-btn.l2{color:#06d6a0;border-color:#06d6a033}.lane-btn.l2:active{background:#06d6a033}
.lane-btn.l3{color:#a855f7;border-color:#a855f733}.lane-btn.l3:active{background:#a855f733}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎵 Rhythm Tap</span></div>
<header><h1>Rhythm Tap</h1><p>Hit the notes as they reach the line!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Combo</div><div class="value" id="hCombo" style="color:var(--orange)">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gc" width="340" height="480"></canvas>
        <div class="overlay" id="overlay">
            <h2>🎵 Rhythm Tap</h2>
            <div class="sub">Notes fall in 4 lanes. Tap the matching button when they hit the line!</div>
            <div class="final" id="oFinal" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="lanes">
        <button class="lane-btn l0" id="b0">♪</button>
        <button class="lane-btn l1" id="b1">♫</button>
        <button class="lane-btn l2" id="b2">♩</button>
        <button class="lane-btn l3" id="b3">♬</button>
    </div>
</div>
<div class="game-footer">Rhythm Tap &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_rhythmtap',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oFinal=document.getElementById('oFinal');
const hScore=document.getElementById('hScore'),hCombo=document.getElementById('hCombo'),hBest=document.getElementById('hBest');
const BEST_KEY='rhythmtap_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const LANES=4,LANE_W=W/LANES,HIT_Y=H-60,NOTE_R=18;
const COLORS=['#ff6b9d','#ffd166','#06d6a0','#a855f7'];
const KEYS=['d','f','j','k'];
const NOTE_SPEED_BASE=3;

let notes,score,combo,maxCombo,misses,state,spawnTimer,noteSpeed,totalNotes,hitEffects;

function start(){
    notes=[];score=0;combo=0;maxCombo=0;misses=0;state='playing';spawnTimer=0;noteSpeed=NOTE_SPEED_BASE;totalNotes=0;hitEffects=[];
    hScore.textContent=0;hCombo.textContent=0;
    overlay.style.display='';overlay.classList.add('hidden');oFinal.style.display='none';
    raf();
}

function raf(){if(state!=='playing')return;update();draw();requestAnimationFrame(raf);}

function update(){
    spawnTimer--;
    if(spawnTimer<=0){
        const lane=Math.floor(Math.random()*LANES);
        notes.push({lane,y:-NOTE_R,hit:false,missed:false});
        totalNotes++;
        spawnTimer=Math.max(15,40-totalNotes*0.1);
        noteSpeed=NOTE_SPEED_BASE+totalNotes*0.01;
    }
    
    notes.forEach(n=>{
        if(!n.hit)n.y+=noteSpeed;
        if(n.y>HIT_Y+40&&!n.hit&&!n.missed){
            n.missed=true;misses++;combo=0;hCombo.textContent=combo;
        }
    });
    notes=notes.filter(n=>n.y<H+30||n.hit);
    
    // End after 60 notes
    if(totalNotes>60&&notes.filter(n=>!n.hit&&!n.missed).length===0){
        endGame();
    }
    if(misses>=10)endGame();
    
    // Hit effects
    hitEffects=hitEffects.filter(e=>{e.t--;return e.t>0;});
}

function hitLane(lane){
    if(state!=='playing')return;
    let closest=null,closestDist=999;
    notes.forEach(n=>{
        if(n.lane===lane&&!n.hit&&!n.missed){
            const d=Math.abs(n.y-HIT_Y);
            if(d<closestDist){closestDist=d;closest=n;}
        }
    });
    if(closest&&closestDist<35){
        closest.hit=true;
        let pts=10;
        if(closestDist<10)pts=30; // Perfect
        else if(closestDist<20)pts=20; // Great
        combo++;if(combo>maxCombo)maxCombo=combo;
        pts+=Math.floor(combo/5)*5;
        score+=pts;hScore.textContent=score;hCombo.textContent=combo;
        hitEffects.push({lane,y:HIT_Y,t:15,perfect:closestDist<10});
    }
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    
    // Lane lines
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    for(let i=1;i<LANES;i++){ctx.beginPath();ctx.moveTo(i*LANE_W,0);ctx.lineTo(i*LANE_W,H);ctx.stroke();}
    
    // Hit line
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,HIT_Y);ctx.lineTo(W,HIT_Y);ctx.stroke();
    
    // Lane labels
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
    for(let i=0;i<LANES;i++){ctx.fillText(['♪','♫','♩','♬'][i],i*LANE_W+LANE_W/2,HIT_Y+30);}
    
    // Notes
    notes.forEach(n=>{
        if(n.hit||n.missed)return;
        const cx=n.lane*LANE_W+LANE_W/2;
        ctx.fillStyle=COLORS[n.lane];
        ctx.beginPath();ctx.arc(cx,n.y,NOTE_R,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.arc(cx,n.y,NOTE_R-5,0,Math.PI*2);ctx.fill();
    });
    
    // Hit effects
    hitEffects.forEach(e=>{
        const cx=e.lane*LANE_W+LANE_W/2;
        ctx.globalAlpha=e.t/15;
        ctx.strokeStyle=e.perfect?'#ffd166':COLORS[e.lane];
        ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,e.y,NOTE_R+15-e.t,0,Math.PI*2);ctx.stroke();
        ctx.globalAlpha=1;
    });
    
    // Combo display
    if(combo>=5){
        ctx.fillStyle='var(--orange)';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
        ctx.fillStyle='#ff8a47';ctx.fillText(combo+'x COMBO!',W/2,30);
    }
    
    // Misses
    ctx.fillStyle='#ff6b6b';ctx.font='12px sans-serif';ctx.textAlign='right';
    ctx.fillText('Misses: '+misses+'/10',W-10,20);
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oFinal.style.display='block';oFinal.textContent='Score: '+score+' | Max Combo: '+maxCombo;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.style.display='';overlay.classList.remove('hidden');
}

// Controls
document.addEventListener('keydown',e=>{
    const i=KEYS.indexOf(e.key.toLowerCase());
    if(i>=0)hitLane(i);
});
for(let i=0;i<4;i++){
    document.getElementById('b'+i).addEventListener('touchstart',function(e){e.preventDefault();hitLane(i);});
    document.getElementById('b'+i).addEventListener('click',function(){hitLane(i);});
}

document.getElementById('startBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
