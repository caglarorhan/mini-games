<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧱 Falling Blocks — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px;color:var(--orange)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border)}
canvas{display:block;width:100%;height:auto;background:#0a0a14}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{display:none}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final{color:var(--orange);font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.ctrl{display:none;justify-content:center;gap:10px;margin-top:12px}
@media(max-width:768px){.ctrl{display:flex}}
.ctrl button{width:70px;height:52px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.3rem;font-weight:700;cursor:pointer}
.ctrl button:active{background:var(--orange);color:#000}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🧱 Falling Blocks</span></div>
<header><h1>Falling Blocks</h1><p>Match 3+ same-color blocks in a row!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gc" width="300" height="480"></canvas>
        <div class="overlay" id="overlay">
            <h2>🧱 Falling Blocks</h2>
            <div class="sub">Move colored blocks left/right. Match 3+ same color in a row or column to clear!</div>
            <div class="final" id="oFinal" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="ctrl">
        <button id="bL">◀</button>
        <button id="bD">▼</button>
        <button id="bR">▶</button>
    </div>
</div>
<div class="game-footer">Falling Blocks &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_fallingblocks',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oFinal=document.getElementById('oFinal');
const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hBest=document.getElementById('hBest');
const BEST_KEY='fallingblocks_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const COLS=6,ROWS=12,BS=W/COLS;
const COLORS=['#ff6b9d','#ffd166','#06d6a0','#00e5ff','#a855f7','#ff8a47'];

let grid,current,score,level,state,dropTimer,dropInterval;

function newBlock(){
    return{col:Math.floor(COLS/2),row:0,color:Math.floor(Math.random()*5)};
}

function start(){
    grid=Array.from({length:ROWS},()=>Array(COLS).fill(-1));
    current=newBlock();score=0;level=1;state='playing';dropInterval=40;dropTimer=0;
    hScore.textContent=0;hLevel.textContent=1;
    overlay.style.display='';overlay.classList.add('hidden');oFinal.style.display='none';
    raf();
}

function raf(){if(state!=='playing')return;update();draw();requestAnimationFrame(raf);}

function update(){
    dropTimer++;
    if(dropTimer>=dropInterval){
        dropTimer=0;
        if(canPlace(current.col,current.row+1)){
            current.row++;
        }else{
            place();
        }
    }
}

function canPlace(col,row){
    return col>=0&&col<COLS&&row>=0&&row<ROWS&&grid[row][col]===-1;
}

function place(){
    if(current.row<0){endGame();return;}
    grid[current.row][current.col]=current.color;
    clearMatches();
    current=newBlock();
    if(grid[0][current.col]!==-1)endGame();
}

function clearMatches(){
    let cleared=true;
    while(cleared){
        cleared=false;
        const toRemove=new Set();
        // Check horizontal
        for(let r=0;r<ROWS;r++){
            for(let c=0;c<=COLS-3;c++){
                if(grid[r][c]>=0&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){
                    toRemove.add(r+','+c);toRemove.add(r+','+(c+1));toRemove.add(r+','+(c+2));
                }
            }
        }
        // Check vertical
        for(let c=0;c<COLS;c++){
            for(let r=0;r<=ROWS-3;r++){
                if(grid[r][c]>=0&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){
                    toRemove.add(r+','+c);toRemove.add((r+1)+','+c);toRemove.add((r+2)+','+c);
                }
            }
        }
        if(toRemove.size>0){
            cleared=true;
            toRemove.forEach(k=>{const[r,c]=k.split(',').map(Number);grid[r][c]=-1;});
            score+=toRemove.size*10;hScore.textContent=score;
            level=Math.floor(score/200)+1;hLevel.textContent=level;
            dropInterval=Math.max(8,40-level*3);
            // Gravity
            for(let c=0;c<COLS;c++){
                let writeRow=ROWS-1;
                for(let r=ROWS-1;r>=0;r--){
                    if(grid[r][c]>=0){
                        if(r!==writeRow){grid[writeRow][c]=grid[r][c];grid[r][c]=-1;}
                        writeRow--;
                    }
                }
            }
        }
    }
}

function moveLeft(){
    if(state!=='playing')return;
    if(canPlace(current.col-1,current.row))current.col--;
}
function moveRight(){
    if(state!=='playing')return;
    if(canPlace(current.col+1,current.row))current.col++;
}
function dropDown(){
    if(state!=='playing')return;
    while(canPlace(current.col,current.row+1))current.row++;
    place();
}

function draw(){
    ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
    // Grid
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.strokeRect(c*BS,r*BS,BS,BS);
            if(grid[r][c]>=0){
                ctx.fillStyle=COLORS[grid[r][c]];
                ctx.fillRect(c*BS+1,r*BS+1,BS-2,BS-2);
                ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(c*BS+1,r*BS+1,BS-2,4);
            }
        }
    }
    // Current block
    if(current){
        ctx.fillStyle=COLORS[current.color];
        ctx.fillRect(current.col*BS+1,current.row*BS+1,BS-2,BS-2);
        ctx.strokeStyle='#fff';ctx.lineWidth=2;
        ctx.strokeRect(current.col*BS+1,current.row*BS+1,BS-2,BS-2);
    }
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oFinal.style.display='block';oFinal.textContent='Score: '+score+' | Level: '+level;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.style.display='';overlay.classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')moveLeft();
    if(e.key==='ArrowRight')moveRight();
    if(e.key==='ArrowDown'||e.key===' ')dropDown();
});

document.getElementById('bL').addEventListener('touchstart',e=>{e.preventDefault();moveLeft()});
document.getElementById('bR').addEventListener('touchstart',e=>{e.preventDefault();moveRight()});
document.getElementById('bD').addEventListener('touchstart',e=>{e.preventDefault();dropDown()});

document.getElementById('startBtn').addEventListener('click',start);
})();
</script>
</body>
</html>
