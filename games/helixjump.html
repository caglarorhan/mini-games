<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌀 Helix Jump — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--purple);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:380px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--purple)}.l-val{color:var(--pink)}.h-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;border-radius:14px}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.5rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.85rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--purple);font-size:1.1rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🌀 Helix Jump</span></div>
<header><h1>Helix Jump</h1><p>Tap to rotate, fall through gaps!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value l-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value h-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="340" height="520"></canvas>
        <div class="overlay" id="overlay">
            <h2>🌀 Helix Jump</h2>
            <div class="sub">Tap left/right to rotate the helix.<br>Guide the ball down through gaps!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
</div>
<div class="game-footer">Helix Jump &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_helixjump',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=340,H=520;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hBest=document.getElementById('hBest');
const BEST_KEY='helixjump_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;

const CX=W/2,TOWER_R=80,BALL_R=8;
const RING_GAP=70;
let rings,rotation,ballY,ballVY,onRing,score,level,state,raf;

function makeRings(){
    rings=[];
    const numRings=8;
    for(let i=0;i<numRings;i++){
        const segments=[];
        const numSeg=6;
        const gapCount=2+Math.min(level-1,2);
        const gaps=new Set();
        while(gaps.size<gapCount)gaps.add(Math.floor(Math.random()*numSeg));
        for(let s=0;s<numSeg;s++){
            segments.push({start:s*(Math.PI*2/numSeg),end:(s+1)*(Math.PI*2/numSeg),isGap:gaps.has(s)});
        }
        rings.push({y:120+i*RING_GAP,segments});
    }
}

function startGame(){
    score=0;level=1;rotation=0;
    ballY=40;ballVY=0;onRing=-1;
    makeRings();
    state='playing';
    hScore.textContent=0;hLevel.textContent=1;
    overlay.classList.add('hidden');oScore.style.display='none';
    if(raf)cancelAnimationFrame(raf);
    loop();
}

function rotate(dir){
    if(state!=='playing')return;
    rotation+=dir*0.15;
}

function update(){
    ballVY+=0.3;// gravity
    ballY+=ballVY;
    // Check ring collisions
    let landed=false;
    for(let i=0;i<rings.length;i++){
        const r=rings[i];
        if(ballY+BALL_R>=r.y&&ballY+BALL_R<=r.y+8&&ballVY>0){
            // Check if ball angle is in a gap
            const ballAngle=((Math.atan2(0,1)+rotation)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
            let inGap=false;
            for(const seg of r.segments){
                const sa=((seg.start+rotation)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
                const ea=((seg.end+rotation)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
                if(seg.isGap){
                    // Check if ball is in this gap segment (simplified: ball at angle 0, check segments)
                    inGap=true;break;
                }
            }
            // Simpler approach: ball is at fixed x position (center-right), check if segment at that angle is gap
            const checkAngle=((rotation)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
            let onSolid=false;
            for(const seg of r.segments){
                if(seg.isGap)continue;
                let sa=seg.start,ea=seg.end;
                // Normalize
                if(checkAngle>=sa&&checkAngle<ea){onSolid=true;break;}
                // Check +PI too (ball could be on either side)
                const check2=(checkAngle+Math.PI)%(Math.PI*2);
                if(check2>=sa&&check2<ea){onSolid=true;break;}
            }
            if(onSolid){
                ballY=r.y-BALL_R;ballVY=-ballVY*0.3;
                if(Math.abs(ballVY)<1)ballVY=0;
                landed=true;onRing=i;
            }else{
                // Fall through gap
                score+=10;hScore.textContent=score;
            }
        }
    }
    // Ball falls below all rings
    if(ballY>rings[rings.length-1].y+60){
        score+=50;level++;hLevel.textContent=level;
        makeRings();ballY=40;ballVY=0;
    }
    // Ball goes too high (hit ring from below with bounce)
    if(ballY<-50){ballY=40;ballVY=2;}
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Tower pole
    ctx.fillStyle='#1a1333';ctx.fillRect(CX-4,20,8,H-40);
    // Rings
    const colors=['#ff6b9d','#a855f7','#00e5ff','#06d6a0','#ffd166','#ff8a47','#118ab2','#ff6b9d'];
    for(let i=0;i<rings.length;i++){
        const r=rings[i];
        for(const seg of r.segments){
            if(seg.isGap)continue;
            const sa=seg.start+rotation,ea=seg.end+rotation;
            ctx.beginPath();ctx.arc(CX,r.y,TOWER_R,sa,ea);
            ctx.lineWidth=8;ctx.strokeStyle=colors[i%colors.length];ctx.stroke();
            // Inner ring
            ctx.beginPath();ctx.arc(CX,r.y,TOWER_R-20,sa,ea);
            ctx.lineWidth=8;ctx.strokeStyle=colors[i%colors.length];ctx.globalAlpha=0.5;ctx.stroke();
            ctx.globalAlpha=1;
        }
    }
    // Ball
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(CX,ballY,BALL_R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b9d';
    ctx.beginPath();ctx.arc(CX,ballY,BALL_R-2,0,Math.PI*2);ctx.fill();
}

function loop(){
    if(state!=='playing')return;
    update();draw();raf=requestAnimationFrame(loop);
}

function endGame(){
    state='over';if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';overlay.classList.remove('hidden');
}

// Touch/click to rotate
let touchStartX=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();touchStartX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('touchmove',e=>{
    if(touchStartX===null)return;
    const dx=e.touches[0].clientX-touchStartX;
    rotate(dx>0?1:-1);
    touchStartX=e.touches[0].clientX;
},{passive:true});
canvas.addEventListener('touchend',()=>{touchStartX=null;});
canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const x=e.clientX-rect.left;
    rotate(x<rect.width/2?-1:1);
});
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='a')rotate(-1);
    if(e.key==='ArrowRight'||e.key==='d')rotate(1);
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
