<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💣 Bomberman — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.lv-val{color:var(--cyan)}.hi-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0618}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;align-items:center;margin-top:10px;gap:20px}
.ctrl-grid{display:flex;flex-direction:column;gap:4px;align-items:center}
.ctrl-row{display:flex;gap:4px;justify-content:center}
.ctrl-btn{width:52px;height:52px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-light);font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:var(--orange)}
.bomb-btn{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--pink));border:none;color:#fff;font-size:1.6rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">💣 Bomberman</span></div>
<header><h1>Bomberman</h1><p>Place bombs to blast walls and enemies!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value lv-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="390" height="390"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Bomberman</h2>
            <div class="sub" id="oSub">Move with arrows, Space to place bombs.<br>Destroy all enemies to advance!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="ctrl-grid">
            <div class="ctrl-row"><button class="ctrl-btn" data-dir="up">▲</button></div>
            <div class="ctrl-row"><button class="ctrl-btn" data-dir="left">◄</button><button class="ctrl-btn" data-dir="down">▼</button><button class="ctrl-btn" data-dir="right">►</button></div>
        </div>
        <button class="bomb-btn" id="bombBtn">💣</button>
    </div>
</div>
<div class="game-footer">Bomberman &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_bomberman',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,COLS=13,ROWS=13,CS=W/COLS;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hBest=document.getElementById('hBest');
const BEST_KEY='bomberman_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;
let state='idle',grid,player,enemies,bombs,explosions,score,level,animFrame;

function initLevel(){
    grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    bombs=[];explosions=[];
    // Steel walls (indestructible grid pattern)
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        if(r===0||r===ROWS-1||c===0||c===COLS-1)grid[r][c]=1;
        else if(r%2===0&&c%2===0)grid[r][c]=1;
    }
    // Brick walls (destructible)
    for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++){
        if(grid[r][c])continue;
        if((r<=2&&c<=2))continue; // Keep spawn area clear
        if(Math.random()<0.4)grid[r][c]=2;
    }
    player={r:1,c:1};
    // Enemies
    enemies=[];
    const numEnemies=2+level;
    for(let i=0;i<numEnemies;i++){
        let er,ec;
        do{er=1+Math.floor(Math.random()*(ROWS-2));ec=1+Math.floor(Math.random()*(COLS-2));}
        while(grid[er][ec]||(er<3&&ec<3));
        enemies.push({r:er,c:ec,dir:Math.floor(Math.random()*4),timer:0});
    }
}

function startGame(){
    score=0;level=1;hScore.textContent=0;hLevel.textContent=1;
    initLevel();state='running';overlay.classList.add('hidden');
    if(animFrame)cancelAnimationFrame(animFrame);tick();
}

function tick(){
    if(state!=='running')return;
    updateEnemies();updateBombs();draw();
    animFrame=requestAnimationFrame(tick);
}

function movePlayer(dr,dc){
    if(state!=='running')return;
    const nr=player.r+dr,nc=player.c+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
    if(grid[nr][nc])return;
    if(bombs.some(b=>b.r===nr&&b.c===nc))return;
    player.r=nr;player.c=nc;
    // Check enemy collision
    if(enemies.some(e=>e.r===player.r&&e.c===player.c))endGame();
}

function placeBomb(){
    if(state!=='running')return;
    if(bombs.some(b=>b.r===player.r&&b.c===player.c))return;
    if(bombs.length>=1+Math.floor(level/3))return;
    bombs.push({r:player.r,c:player.c,timer:90,range:2+Math.floor(level/4)});
}

function updateBombs(){
    bombs.forEach(b=>{
        b.timer--;
        if(b.timer<=0)explode(b);
    });
    bombs=bombs.filter(b=>b.timer>0);
    explosions.forEach(e=>e.timer--);
    explosions=explosions.filter(e=>e.timer>0);
    // Check player in explosion
    if(explosions.some(e=>e.r===player.r&&e.c===player.c))endGame();
}

function explode(bomb){
    bomb.timer=0;
    const dirs=[[0,0],[-1,0],[1,0],[0,-1],[0,1]];
    dirs.forEach(([dr,dc])=>{
        for(let i=0;i<=bomb.range;i++){
            const r=bomb.r+dr*i,c=bomb.c+dc*i;
            if(r<0||r>=ROWS||c<0||c>=COLS)break;
            if(grid[r][c]===1)break;
            if(grid[r][c]===2){grid[r][c]=0;explosions.push({r,c,timer:15});score+=10;hScore.textContent=score;break;}
            explosions.push({r,c,timer:15});
            // Kill enemies
            enemies=enemies.filter(e=>{if(e.r===r&&e.c===c){score+=50;hScore.textContent=score;return false;}return true;});
            if(i===0)continue; // center always explodes
        }
    });
    // Chain bombs
    bombs.forEach(b2=>{if(b2!==bomb&&explosions.some(e=>e.r===b2.r&&e.c===b2.c))explode(b2);});
    // Check win
    if(enemies.length===0){
        level++;hLevel.textContent=level;
        setTimeout(()=>{if(state==='running')initLevel();},500);
    }
}

function updateEnemies(){
    const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
    enemies.forEach(e=>{
        e.timer++;
        if(e.timer%20!==0)return;
        // Try current direction, or pick random
        let d=DIRS[e.dir];
        let nr=e.r+d[0],nc=e.c+d[1];
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!grid[nr][nc]&&!bombs.some(b=>b.r===nr&&b.c===nc)){
            e.r=nr;e.c=nc;
        } else {
            e.dir=Math.floor(Math.random()*4);
        }
        if(e.r===player.r&&e.c===player.c)endGame();
    });
}

function draw(){
    ctx.fillStyle='#0a0618';ctx.fillRect(0,0,W,W);
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const x=c*CS,y=r*CS;
            if(grid[r][c]===1){ctx.fillStyle='#2a1f4e';ctx.fillRect(x,y,CS,CS);}
            else if(grid[r][c]===2){ctx.fillStyle='#5a3a2e';ctx.fillRect(x+1,y+1,CS-2,CS-2);}
            else{ctx.fillStyle='#0f0a1e';ctx.fillRect(x,y,CS,CS);}
        }
    }
    // Explosions
    explosions.forEach(e=>{
        ctx.fillStyle=`rgba(255,${100+e.timer*10},50,${e.timer/15})`;
        ctx.fillRect(e.c*CS,e.r*CS,CS,CS);
    });
    // Bombs
    bombs.forEach(b=>{
        const x=b.c*CS+CS/2,y=b.r*CS+CS/2;
        const pulse=1+Math.sin(b.timer*0.3)*0.15;
        ctx.fillStyle='#333';ctx.beginPath();ctx.arc(x,y,CS*0.35*pulse,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff8a47';ctx.beginPath();ctx.arc(x,y-CS*0.3,3,0,Math.PI*2);ctx.fill();
    });
    // Enemies
    enemies.forEach(e=>{
        ctx.fillStyle='#ff6b9d';ctx.beginPath();ctx.arc(e.c*CS+CS/2,e.r*CS+CS/2,CS*0.35,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillRect(e.c*CS+CS*0.3,e.r*CS+CS*0.3,4,4);ctx.fillRect(e.c*CS+CS*0.55,e.r*CS+CS*0.3,4,4);
    });
    // Player
    ctx.fillStyle='#00e5ff';ctx.beginPath();ctx.arc(player.c*CS+CS/2,player.r*CS+CS/2,CS*0.38,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(player.c*CS+CS*0.35,player.r*CS+CS*0.35,CS*0.1,0,Math.PI*2);ctx.fill();
}

function endGame(){
    state='dead';if(animFrame)cancelAnimationFrame(animFrame);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Game Over';oSub.textContent='';oScore.textContent='Score: '+score;oScore.style.display='block';overlay.classList.remove('hidden');
}

document.addEventListener('keydown',e=>{
    if(state!=='running'){if(e.code==='Space'){e.preventDefault();startGame();}return;}
    if(e.key==='ArrowUp')movePlayer(-1,0);else if(e.key==='ArrowDown')movePlayer(1,0);
    else if(e.key==='ArrowLeft')movePlayer(0,-1);else if(e.key==='ArrowRight')movePlayer(0,1);
    else if(e.code==='Space'){e.preventDefault();placeBomb();}
});
document.querySelectorAll('.ctrl-btn').forEach(btn=>{
    const handler=()=>{const d=btn.dataset.dir;if(d==='up')movePlayer(-1,0);else if(d==='down')movePlayer(1,0);else if(d==='left')movePlayer(0,-1);else if(d==='right')movePlayer(0,1);};
    btn.addEventListener('click',handler);btn.addEventListener('touchstart',e=>{e.preventDefault();handler();},{passive:false});
});
document.getElementById('bombBtn').addEventListener('click',placeBomb);
document.getElementById('bombBtn').addEventListener('touchstart',e=>{e.preventDefault();placeBomb();},{passive:false});
document.getElementById('startBtn').addEventListener('click',startGame);
draw();
})();
</script>
</body>
</html>
