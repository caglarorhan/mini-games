<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎯 Missile Command — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--cyan);bottom:-80px;right:-80px}
.bg-blob:nth-child(3){width:300px;height:300px;background:var(--pink);top:50%;left:50%;transform:translate(-50%,-50%)}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}.back-link:hover{color:var(--green)}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:520px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;min-width:70px;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.lv-val{color:var(--cyan)}.a-val{color:var(--green)}.hi-val{color:var(--yellow)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 0 30px rgba(255,138,71,.12);background:#000;cursor:crosshair}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5;transition:opacity .3s}
.overlay.hidden{opacity:0;pointer-events:none}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform .15s}.start-btn:hover{transform:translateY(-2px)}
@media(max-width:500px){header h1{font-size:1.5rem}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🎯 Missile Command</span></div>
<header><h1>Missile Command</h1><p>Defend your cities from incoming missiles!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Wave</div><div class="value lv-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Ammo</div><div class="value a-val" id="hAmmo">30</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="480" height="360"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Missile Command</h2>
            <div class="sub" id="oSub">Click/tap to launch counter-missiles!<br>Protect your cities from destruction!</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play!</button>
        </div>
    </div>
</div>
<div class="game-footer">Missile Command &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_missile',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hAmmo=document.getElementById('hAmmo'),hBest=document.getElementById('hBest');
const BEST_KEY='missile_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;
let state='idle',score,level,ammo,cities,missiles,counterMissiles,explosions,animFrame,waveTimer,missilesLeft;

function startGame(){
    if(state==='running')return;
    score=0;level=1;ammo=30;
    cities=[true,true,true,true,true,true];
    missiles=[];counterMissiles=[];explosions=[];
    waveTimer=0;missilesLeft=10;
    state='running';overlay.classList.add('hidden');updateHUD();
    if(animFrame)cancelAnimationFrame(animFrame);
    animFrame=requestAnimationFrame(loop);
}

function updateHUD(){
    hScore.textContent=score;hLevel.textContent=level;hAmmo.textContent=ammo;
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
}

function getCityX(i){return(i+1)*(W/7);}
const GROUND_Y=H-30;

function fireMissile(tx,ty){
    if(ammo<=0)return;
    ammo--;updateHUD();
    const sx=W/2,sy=GROUND_Y;
    const dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy);
    const speed=6;
    counterMissiles.push({x:sx,y:sy,tx,ty,vx:dx/len*speed,vy:dy/len*speed,trail:[]});
}

function loop(){
    if(state!=='running')return;
    update();draw();animFrame=requestAnimationFrame(loop);
}

function update(){
    // Spawn enemy missiles
    waveTimer++;
    if(missilesLeft>0&&waveTimer%(Math.max(15,60-level*5))===0){
        missilesLeft--;
        const target=Math.floor(Math.random()*6);
        const tx=getCityX(target);
        const sx=Math.random()*W;
        const speed=0.5+level*0.15;
        const dx=tx-sx,dy=GROUND_Y-0,len=Math.sqrt(dx*dx+dy*dy);
        missiles.push({x:sx,y:0,vx:dx/len*speed,vy:dy/len*speed,target,trail:[]});
    }

    // Move enemy missiles
    missiles.forEach(m=>{
        m.trail.push({x:m.x,y:m.y});if(m.trail.length>20)m.trail.shift();
        m.x+=m.vx;m.y+=m.vy;
        if(m.y>=GROUND_Y){
            // Hit city
            if(cities[m.target]){cities[m.target]=false;explosions.push({x:m.x,y:GROUND_Y,r:0,maxR:30,growing:true});}
            m.dead=true;
        }
    });

    // Move counter missiles
    counterMissiles.forEach(cm=>{
        cm.trail.push({x:cm.x,y:cm.y});if(cm.trail.length>15)cm.trail.shift();
        cm.x+=cm.vx;cm.y+=cm.vy;
        const dx=cm.tx-cm.x,dy=cm.ty-cm.y;
        if(Math.sqrt(dx*dx+dy*dy)<8){
            explosions.push({x:cm.tx,y:cm.ty,r:0,maxR:40,growing:true});
            cm.dead=true;
        }
    });

    // Explosions
    explosions.forEach(e=>{
        if(e.growing){e.r+=2;if(e.r>=e.maxR)e.growing=false;}
        else{e.r-=1;if(e.r<=0)e.dead=true;}
    });

    // Check explosion-missile intersection
    explosions.forEach(e=>{
        missiles.forEach(m=>{
            if(m.dead)return;
            const dx=m.x-e.x,dy=m.y-e.y;
            if(Math.sqrt(dx*dx+dy*dy)<e.r){m.dead=true;score+=25;updateHUD();}
        });
    });

    missiles=missiles.filter(m=>!m.dead);
    counterMissiles=counterMissiles.filter(cm=>!cm.dead);
    explosions=explosions.filter(e=>!e.dead);

    // Check wave complete
    if(missilesLeft<=0&&missiles.length===0){
        // Bonus for surviving cities
        const surviving=cities.filter(Boolean).length;
        score+=surviving*100;level++;
        ammo=Math.min(ammo+20,50);
        missilesLeft=10+level*3;waveTimer=0;
        updateHUD();
    }

    // Check game over
    if(!cities.some(Boolean)){endGame();}
}

function draw(){
    // Sky gradient
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#0a0618');grad.addColorStop(1,'#1a0a2e');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let i=0;i<30;i++){const x=(i*137+7)%W,y=(i*97+3)%H*0.6;ctx.fillRect(x,y,1.5,1.5);}
    // Ground
    ctx.fillStyle='#2a1f3e';ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
    // Cities
    cities.forEach((alive,i)=>{
        const cx=getCityX(i);
        if(alive){
            ctx.fillStyle='#00e5ff';
            ctx.fillRect(cx-12,GROUND_Y-16,8,16);ctx.fillRect(cx-2,GROUND_Y-22,8,22);ctx.fillRect(cx+8,GROUND_Y-12,8,12);
            ctx.fillStyle='rgba(0,229,255,0.1)';ctx.beginPath();ctx.arc(cx,GROUND_Y-10,25,0,Math.PI*2);ctx.fill();
        } else {
            ctx.fillStyle='#444';ctx.fillRect(cx-10,GROUND_Y-4,24,4);
        }
    });
    // Launcher (center)
    ctx.fillStyle='#06d6a0';ctx.fillRect(W/2-10,GROUND_Y-14,20,14);ctx.fillRect(W/2-4,GROUND_Y-20,8,8);
    // Enemy missiles + trails
    missiles.forEach(m=>{
        ctx.strokeStyle='rgba(255,68,68,0.4)';ctx.lineWidth=1;ctx.beginPath();
        m.trail.forEach((t,i)=>{i===0?ctx.moveTo(t.x,t.y):ctx.lineTo(t.x,t.y);});ctx.lineTo(m.x,m.y);ctx.stroke();
        ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(m.x,m.y,3,0,Math.PI*2);ctx.fill();
    });
    // Counter missiles + trails
    counterMissiles.forEach(cm=>{
        ctx.strokeStyle='rgba(6,214,160,0.4)';ctx.lineWidth=1;ctx.beginPath();
        cm.trail.forEach((t,i)=>{i===0?ctx.moveTo(t.x,t.y):ctx.lineTo(t.x,t.y);});ctx.lineTo(cm.x,cm.y);ctx.stroke();
        ctx.fillStyle='#06d6a0';ctx.beginPath();ctx.arc(cm.x,cm.y,2.5,0,Math.PI*2);ctx.fill();
    });
    // Explosions
    explosions.forEach(e=>{
        const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
        g.addColorStop(0,'rgba(255,200,50,0.9)');g.addColorStop(0.5,'rgba(255,100,50,0.5)');g.addColorStop(1,'rgba(255,50,50,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
    });
    // Ammo display
    ctx.fillStyle='rgba(6,214,160,0.6)';
    for(let i=0;i<Math.min(ammo,30);i++)ctx.fillRect(8+i*6,H-10,4,6);
}

function endGame(){
    state='dead';if(animFrame)cancelAnimationFrame(animFrame);
    oTitle.textContent='Game Over';oSub.textContent='All cities destroyed!';oScore.textContent='Score: '+score;oScore.style.display='block';overlay.classList.remove('hidden');
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
}

// Click/tap to fire
function handleFire(clientX,clientY){
    if(state!=='running')return;
    const r=canvas.getBoundingClientRect();
    const x=(clientX-r.left)/r.width*W;
    const y=(clientY-r.top)/r.height*H;
    fireMissile(x,y);
}
canvas.addEventListener('click',e=>{if(state!=='running'){startGame();return;}handleFire(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='running'){startGame();return;}handleFire(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.getElementById('startBtn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(state!=='running')startGame();}});
draw();
})();
</script>
</body>
</html>
