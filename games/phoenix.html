<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦅 Phoenix — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--orange);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--yellow);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.hi-val{color:var(--yellow)}.l-val{color:var(--pink)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--orange),var(--yellow));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:8px;margin-top:10px}
.ctrl-btn{width:70px;height:48px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.1rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🦅 Phoenix</span></div>
<header><h1>Phoenix</h1><p>Destroy the alien birds!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value l-val" id="hLives">3</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div class="overlay" id="overlay">
            <h2>Phoenix</h2>
            <div class="sub">Shoot the flying alien birds!<br>Left/Fire/Right or touch controls.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Play</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="ctrl-btn" id="btnL">◄</button>
        <button class="ctrl-btn" id="btnF" style="background:var(--orange);color:#fff">FIRE</button>
        <button class="ctrl-btn" id="btnR">►</button>
    </div>
</div>
<div class="game-footer">Phoenix &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_phoenix',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=400,H=500;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hLives=document.getElementById('hLives');
const BEST_KEY='phoenix_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;
let score,lives,player,bullets,enemies,enemyBullets,wave,state='idle',frame;
const keys={left:false,right:false,fire:false};
let lastFire=0;

function spawnWave(){
    enemies=[];wave++;
    const rows=Math.min(2+Math.floor(wave/2),5);
    const cols=Math.min(5+wave,8);
    for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
            enemies.push({
                x:50+c*42,y:40+r*38,w:28,h:22,hp:r===0?2:1,
                baseX:50+c*42,phase:Math.random()*Math.PI*2,
                type:r===0?'big':'small'
            });
        }
    }
}

function startGame(){
    score=0;lives=3;wave=0;frame=0;
    hScore.textContent=0;hLives.textContent=3;
    player={x:W/2,y:H-40,w:24,h:20};
    bullets=[];enemyBullets=[];
    spawnWave();state='running';overlay.classList.add('hidden');oScore.style.display='none';
    requestAnimationFrame(loop);
}

function update(){
    if(state!=='running')return;
    frame++;
    // Player movement
    if(keys.left)player.x=Math.max(14,player.x-4);
    if(keys.right)player.x=Math.min(W-14,player.x+4);
    if(keys.fire&&frame-lastFire>12){
        bullets.push({x:player.x,y:player.y-12,vy:-7});lastFire=frame;
    }
    
    // Bullets
    bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>-10;});
    enemyBullets=enemyBullets.filter(b=>{b.y+=b.vy;b.x+=b.vx||0;return b.y<H+10;});
    
    // Enemies movement
    enemies.forEach(e=>{
        e.x=e.baseX+Math.sin(frame*0.02+e.phase)*30;
        e.y+=Math.sin(frame*0.015+e.phase)*0.3;
    });
    
    // Bullet-enemy collision
    bullets.forEach(b=>{
        enemies.forEach(e=>{
            if(e.hp<=0)return;
            if(b.x>e.x-e.w/2&&b.x<e.x+e.w/2&&b.y>e.y-e.h/2&&b.y<e.y+e.h/2){
                e.hp--;b.y=-999;
                if(e.hp<=0){score+=e.type==='big'?200:100;hScore.textContent=score;}
            }
        });
    });
    enemies=enemies.filter(e=>e.hp>0);
    
    // Enemy fire
    if(enemies.length&&Math.random()<0.02+wave*0.005){
        const e=enemies[Math.floor(Math.random()*enemies.length)];
        const angle=Math.atan2(player.y-e.y,player.x-e.x);
        enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(angle)*3,vy:Math.sin(angle)*3});
    }
    
    // Player hit
    enemyBullets.forEach(b=>{
        if(Math.abs(b.x-player.x)<14&&Math.abs(b.y-player.y)<12){
            b.y=999;lives--;hLives.textContent=lives;
            if(lives<=0)endGame();
        }
    });
    
    // Enemy reached bottom
    enemies.forEach(e=>{
        if(e.y>H-60){lives--;hLives.textContent=lives;e.hp=0;if(lives<=0)endGame();}
    });
    
    // Next wave
    if(enemies.length===0)spawnWave();
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.classList.remove('hidden');
}

function drawBird(x,y,type,t){
    const s=type==='big'?1.3:1;
    ctx.save();ctx.translate(x,y);
    // Body
    ctx.fillStyle=type==='big'?'#ff6b9d':'#ff8a47';
    ctx.beginPath();ctx.ellipse(0,0,12*s,8*s,0,0,Math.PI*2);ctx.fill();
    // Wings
    const wingAngle=Math.sin(t*0.1)*0.4;
    ctx.fillStyle=type==='big'?'#a855f7':'#ffd166';
    ctx.beginPath();ctx.ellipse(-14*s,-2,8*s,4*s,wingAngle,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(14*s,-2,8*s,4*s,-wingAngle,0,Math.PI*2);ctx.fill();
    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-2,2*s,0,Math.PI*2);ctx.fill();
    ctx.restore();
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Stars
    ctx.fillStyle='#ffffff15';
    for(let i=0;i<40;i++){
        const sx=(i*97+frame*0.2)%W,sy=(i*53+frame*0.5)%H;
        ctx.fillRect(sx,sy,1.5,1.5);
    }
    // Enemies
    enemies.forEach(e=>drawBird(e.x,e.y,e.type,frame));
    // Player
    ctx.fillStyle='#00e5ff';
    ctx.beginPath();ctx.moveTo(player.x,player.y-12);ctx.lineTo(player.x-12,player.y+10);ctx.lineTo(player.x+12,player.y+10);ctx.closePath();ctx.fill();
    ctx.fillStyle='#06d6a0';ctx.fillRect(player.x-3,player.y-4,6,8);
    // Bullets
    ctx.fillStyle='#ffd166';
    bullets.forEach(b=>{ctx.fillRect(b.x-1.5,b.y,3,8);});
    ctx.fillStyle='#ff6b9d';
    enemyBullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});
}

function loop(){update();draw();if(state==='running')requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;
    if(e.key===' '||e.key==='ArrowUp')keys.fire=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;
    if(e.key===' '||e.key==='ArrowUp')keys.fire=false;
});
['btnL','btnF','btnR'].forEach((id,i)=>{
    const el=document.getElementById(id);
    const k=['left','fire','right'][i];
    el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
    el.addEventListener('touchend',()=>keys[k]=false);
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
