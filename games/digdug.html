<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⛏️ Dig Dug — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--orange);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:400px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--orange)}.hi-val{color:var(--yellow)}.l-val{color:var(--pink)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--orange);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:6px;margin-top:10px}
.ctrl-pad{display:flex;flex-direction:column;gap:4px;align-items:center}
.ctrl-row{display:flex;gap:6px}
.ctrl-btn{width:56px;height:48px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.3rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">⛏️ Dig Dug</span></div>
<header><h1>Dig Dug</h1><p>Dig tunnels and inflate enemies!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value l-val" id="hLives">3</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="400"></canvas>
        <div class="overlay" id="overlay">
            <h2>⛏️ Dig Dug</h2>
            <div class="sub">Dig through dirt and pump enemies!<br>Arrow keys/D-pad to move, Space to pump.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Dig!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="ctrl-pad">
            <div class="ctrl-row"><button class="ctrl-btn" id="btnU">▲</button></div>
            <div class="ctrl-row"><button class="ctrl-btn" id="btnL">◄</button><button class="ctrl-btn" id="btnD">▼</button><button class="ctrl-btn" id="btnR">►</button></div>
        </div>
        <button class="ctrl-btn" id="btnP" style="background:var(--orange);color:#fff;width:70px;height:48px;align-self:center;margin-left:12px">PUMP</button>
    </div>
</div>
<div class="game-footer">Dig Dug &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_digdug',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=360,H=400;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hLives=document.getElementById('hLives');
const BEST_KEY='digdug_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;
const COLS=18,ROWS=20,CELL=W/COLS;
let grid,player,enemies,score,lives,state='idle',level,frame;
const keys={up:false,down:false,left:false,right:false,pump:false};
let moveTimer=0;
const DIRT_COLORS=['#8B6914','#A0782C','#6B4F10','#9E7B2F'];

function startGame(){
    score=0;lives=3;level=1;frame=0;
    hScore.textContent=0;hLives.textContent=3;
    initLevel();state='running';overlay.classList.add('hidden');oScore.style.display='none';
    requestAnimationFrame(loop);
}

function initLevel(){
    grid=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},()=>r>=2?1:0));
    // Starting tunnel
    for(let c=0;c<COLS;c++)grid[2][c]=0;
    player={col:COLS/2|0,row:2,dir:0,pumping:false,pumpTarget:null};
    grid[player.row][player.col]=0;
    enemies=[];
    const numE=3+level;
    for(let i=0;i<numE;i++){
        let er,ec;
        do{er=4+Math.floor(Math.random()*(ROWS-5));ec=1+Math.floor(Math.random()*(COLS-2));}
        while(Math.abs(er-player.row)<3&&Math.abs(ec-player.col)<3);
        enemies.push({col:ec,row:er,inflate:0,dir:Math.random()<0.5?1:-1,moveCD:0,alive:true});
        grid[er][ec]=0;
    }
}

function movePlayer(dr,dc){
    if(state!=='running')return;
    const nr=player.row+dr,nc=player.col+dc;
    if(nr<0||nr>=ROWS||nc<0||nc>=COLS)return;
    player.row=nr;player.col=nc;player.dir=dc>0?0:dc<0?2:dr>0?1:3;
    if(grid[nr][nc]===1){grid[nr][nc]=0;score+=10;hScore.textContent=score;}
    // Check enemy collision
    enemies.forEach(e=>{
        if(e.alive&&e.row===player.row&&e.col===player.col){
            lives--;hLives.textContent=lives;
            if(lives<=0)endGame();
            else{player.row=2;player.col=COLS/2|0;}
        }
    });
}

function pumpAction(){
    if(state!=='running')return;
    // Find adjacent enemy in facing direction
    const dirs=[[0,1],[1,0],[0,-1],[-1,0]];
    const[dr,dc]=dirs[player.dir];
    for(let d=1;d<=3;d++){
        const tr=player.row+dr*d,tc=player.col+dc*d;
        if(tr<0||tr>=ROWS||tc<0||tc>=COLS)break;
        if(grid[tr][tc]===1)break;
        const e=enemies.find(en=>en.alive&&en.row===tr&&en.col===tc);
        if(e){
            e.inflate+=1;
            if(e.inflate>=4){
                e.alive=false;score+=200;hScore.textContent=score;
                if(enemies.every(en=>!en.alive)){level++;initLevel();}
            }
            return;
        }
    }
}

function update(){
    if(state!=='running')return;
    frame++;moveTimer++;
    if(moveTimer>=8){
        moveTimer=0;
        if(keys.up)movePlayer(-1,0);
        else if(keys.down)movePlayer(1,0);
        else if(keys.left)movePlayer(0,-1);
        else if(keys.right)movePlayer(0,1);
    }
    if(keys.pump&&frame%12===0)pumpAction();
    
    // Enemy AI
    enemies.forEach(e=>{
        if(!e.alive)return;
        e.moveCD--;
        if(e.inflate>0&&!keys.pump)e.inflate=Math.max(0,e.inflate-0.02);
        if(e.moveCD<=0){
            e.moveCD=12+Math.floor(Math.random()*8);
            // Move toward player through tunnels
            const dr=player.row>e.row?1:player.row<e.row?-1:0;
            const dc=player.col>e.col?1:player.col<e.col?-1:0;
            const moves=[];
            if(dr&&e.row+dr>=0&&e.row+dr<ROWS&&grid[e.row+dr][e.col]===0)moves.push([dr,0]);
            if(dc&&e.col+dc>=0&&e.col+dc<COLS&&grid[e.row][e.col+dc]===0)moves.push([0,dc]);
            if(moves.length){
                const[mr,mc]=moves[Math.floor(Math.random()*moves.length)];
                e.row+=mr;e.col+=mc;
            }
            // Check collision
            if(e.row===player.row&&e.col===player.col){
                lives--;hLives.textContent=lives;
                if(lives<=0)endGame();
                else{player.row=2;player.col=COLS/2|0;}
            }
        }
    });
}

function endGame(){
    state='over';
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.classList.remove('hidden');
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    // Sky
    ctx.fillStyle='#1a3a6a';ctx.fillRect(0,0,W,CELL*2);
    // Dirt and tunnels
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            if(grid[r][c]===1){
                ctx.fillStyle=DIRT_COLORS[(r+c)%DIRT_COLORS.length];
                ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
            } else if(r>=2){
                ctx.fillStyle='#0d0d20';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
            }
        }
    }
    // Player
    const px=player.col*CELL+CELL/2,py=player.row*CELL+CELL/2;
    ctx.fillStyle='#00e5ff';
    ctx.beginPath();ctx.arc(px,py,CELL*0.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py-2,3,0,Math.PI*2);ctx.fill();
    // Pump line
    if(keys.pump){
        const dirs=[[0,1],[1,0],[0,-1],[-1,0]];
        const[dr,dc]=dirs[player.dir];
        ctx.strokeStyle='#ffd166';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+dc*CELL*2,py+dr*CELL*2);ctx.stroke();
    }
    // Enemies
    enemies.forEach(e=>{
        if(!e.alive)return;
        const ex=e.col*CELL+CELL/2,ey=e.row*CELL+CELL/2;
        const r=CELL*0.35*(1+e.inflate*0.2);
        ctx.fillStyle=e.inflate>2?'#ff0000':'#ff6b9d';
        ctx.beginPath();ctx.arc(ex,ey,r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex-2,ey-2,2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex+2,ey-2,2,0,Math.PI*2);ctx.fill();
    });
    // Level
    ctx.fillStyle='#a99ec4';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('Level '+level,W/2,16);
}

function loop(){update();draw();if(state==='running')requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp')keys.up=true;if(e.key==='ArrowDown')keys.down=true;
    if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;
    if(e.key===' ')keys.pump=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp')keys.up=false;if(e.key==='ArrowDown')keys.down=false;
    if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;
    if(e.key===' ')keys.pump=false;
});
const bMap={btnU:'up',btnD:'down',btnL:'left',btnR:'right',btnP:'pump'};
Object.entries(bMap).forEach(([id,k])=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
    el.addEventListener('touchend',()=>keys[k]=false);
});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
