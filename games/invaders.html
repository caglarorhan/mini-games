<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders - Mini Games Arcade</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
    body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
    .bg-blob:nth-child(1){width:400px;height:400px;background:var(--purple);top:-100px;left:-100px}
    .bg-blob:nth-child(2){width:350px;height:350px;background:var(--cyan);bottom:-80px;right:-80px}
    .bg-blob:nth-child(3){width:300px;height:300px;background:var(--green);top:50%;left:50%;transform:translate(-50%,-50%)}
    .top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
    .back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:var(--green)}
    .game-badge{background:linear-gradient(135deg,var(--deep-purple),var(--purple));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
    header{position:relative;z-index:10;text-align:center;padding:28px 20px 10px}
    header h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{color:var(--text-muted);margin-top:6px;font-size:.95rem}
    .game-container{position:relative;z-index:10;max-width:660px;margin:20px auto;padding:0 16px}
    .hud{display:flex;justify-content:space-around;margin-bottom:14px;gap:10px;flex-wrap:wrap}
    .hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;text-align:center;min-width:80px}
    .hud-box .label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .hud-box .value{font-size:1.3rem;font-weight:800;margin-top:2px}
    .sc-val{color:var(--green)}.lv-val{color:var(--yellow)}.li-val{color:var(--pink)}
    .canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 0 30px rgba(168,85,247,.12);background:#000}
    canvas{display:block;width:100%;height:auto}
    .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:5;transition:opacity .3s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .overlay h2{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .overlay .sub{color:var(--text-muted);margin-bottom:18px;font-size:.95rem}
    .overlay .final-score{color:var(--yellow);font-size:1.3rem;font-weight:800;margin-bottom:14px}
    .start-btn{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s}
    .start-btn:hover{transform:translateY(-2px)}
    .mobile-controls{display:none;margin-top:14px;text-align:center;gap:10px;justify-content:center}
    .mob-btn{background:linear-gradient(135deg,var(--deep-purple),var(--purple));color:#fff;border:none;padding:14px 24px;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
    @media(max-width:768px){.mobile-controls{display:flex}}
    @media(max-width:500px){header h1{font-size:1.6rem}}
    .game-footer{position:relative;z-index:10;text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8rem;margin-top:20px}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar">
    <a href="../index.html" class="back-link">&#8592; Back to Games</a>
    <span class="game-badge">&#128640; Invaders</span>
</div>
<header><h1>Space Invaders</h1><p>Defend Earth from the alien invasion!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value sc-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Wave</div><div class="value lv-val" id="hWave">1</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value li-val" id="hLives">3</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Space Invaders</h2>
            <div class="sub" id="oSub">Arrow keys to move, Space to shoot</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Start</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="mob-btn" id="btnL">&#9664;</button>
        <button class="mob-btn" id="btnFire">FIRE</button>
        <button class="mob-btn" id="btnR">&#9654;</button>
    </div>
</div>
<div class="game-footer">Space Invaders &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_invaders',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
    const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
    const hScore=document.getElementById('hScore'),hWave=document.getElementById('hWave'),hLives=document.getElementById('hLives');

    const SHIP_W=30,SHIP_H=16,BULLET_W=3,BULLET_H=10;
    const ALIEN_W=24,ALIEN_H=18,ALIEN_COLS=8,ALIEN_ROWS=4,ALIEN_GAP_X=10,ALIEN_GAP_Y=10;
    const ALIEN_COLORS=['#00e5ff','#06d6a0','#ff6b9d','#ff8a47'];

    let state='idle',score,lives,wave,ship,bullets,aliens,alienBullets,alienDir,alienDropTimer,particles;
    let keys={},frame;

    document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();if(state!=='running')startGame();else shoot();}});
    document.addEventListener('keyup',e=>{keys[e.code]=false;});
    document.getElementById('startBtn').addEventListener('click',()=>{if(state!=='running')startGame();});

    // Mobile
    let mobL=false,mobR=false;
    const bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bF=document.getElementById('btnFire');
    bL.addEventListener('touchstart',e=>{e.preventDefault();mobL=true;});bL.addEventListener('touchend',()=>{mobL=false;});
    bR.addEventListener('touchstart',e=>{e.preventDefault();mobR=true;});bR.addEventListener('touchend',()=>{mobR=false;});
    bF.addEventListener('touchstart',e=>{e.preventDefault();if(state==='running')shoot();else startGame();});

    function buildAliens(){
        aliens=[];
        const totalW=ALIEN_COLS*(ALIEN_W+ALIEN_GAP_X)-ALIEN_GAP_X;
        const startX=(W-totalW)/2;
        for(let r=0;r<ALIEN_ROWS;r++)for(let c=0;c<ALIEN_COLS;c++){
            aliens.push({x:startX+c*(ALIEN_W+ALIEN_GAP_X),y:40+r*(ALIEN_H+ALIEN_GAP_Y),w:ALIEN_W,h:ALIEN_H,alive:true,color:ALIEN_COLORS[r%ALIEN_COLORS.length],row:r});
        }
        alienDir=1;alienDropTimer=0;
    }

    function startGame(){
        if(state==='idle'||state==='dead'){score=0;lives=3;wave=1;}
        ship={x:W/2-SHIP_W/2,y:H-30};
        bullets=[];alienBullets=[];particles=[];frame=0;
        buildAliens();
        state='running';overlay.classList.add('hidden');
        updateHUD();requestAnimationFrame(loop);
    }

    function updateHUD(){hScore.textContent=score;hWave.textContent=wave;hLives.textContent=lives;}

    let lastShot=0;
    function shoot(){
        if(frame-lastShot<15)return;
        bullets.push({x:ship.x+SHIP_W/2-BULLET_W/2,y:ship.y-BULLET_H});
        lastShot=frame;
    }

    function addParticles(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,color:col,r:Math.random()*2+1});}

    function update(){
        frame++;
        const spd=5;
        if(keys['ArrowLeft']||mobL)ship.x-=spd;
        if(keys['ArrowRight']||mobR)ship.x+=spd;
        ship.x=Math.max(0,Math.min(W-SHIP_W,ship.x));

        // Bullets
        for(let i=bullets.length-1;i>=0;i--){
            bullets[i].y-=7;
            if(bullets[i].y<0){bullets.splice(i,1);continue;}
            // Hit aliens
            for(const a of aliens){
                if(!a.alive)continue;
                if(bullets[i]&&bullets[i].x<a.x+a.w&&bullets[i].x+BULLET_W>a.x&&bullets[i].y<a.y+a.h&&bullets[i].y+BULLET_H>a.y){
                    a.alive=false;score+=10*(a.row+1);
                    addParticles(a.x+a.w/2,a.y+a.h/2,a.color,6);
                    bullets.splice(i,1);updateHUD();break;
                }
            }
        }

        // Alien movement
        alienDropTimer++;
        const moveInterval=Math.max(10,40-wave*4);
        if(alienDropTimer>=moveInterval){
            alienDropTimer=0;
            let edgeHit=false;
            for(const a of aliens){
                if(!a.alive)continue;
                if((alienDir>0&&a.x+a.w+6>=W)||(alienDir<0&&a.x-6<=0)){edgeHit=true;break;}
            }
            if(edgeHit){
                alienDir*=-1;
                for(const a of aliens)if(a.alive)a.y+=12;
            } else {
                for(const a of aliens)if(a.alive)a.x+=6*alienDir;
            }
        }

        // Alien shooting
        if(frame%60===0){
            const alive=aliens.filter(a=>a.alive);
            if(alive.length){
                const shooter=alive[Math.floor(Math.random()*alive.length)];
                alienBullets.push({x:shooter.x+shooter.w/2-1.5,y:shooter.y+shooter.h,color:shooter.color});
            }
        }

        // Alien bullets
        for(let i=alienBullets.length-1;i>=0;i--){
            alienBullets[i].y+=4;
            if(alienBullets[i].y>H){alienBullets.splice(i,1);continue;}
            // Hit ship
            const b=alienBullets[i];
            if(b.x<ship.x+SHIP_W&&b.x+3>ship.x&&b.y<ship.y+SHIP_H&&b.y+8>ship.y){
                lives--;updateHUD();addParticles(ship.x+SHIP_W/2,ship.y,ALIEN_COLORS[0],8);
                alienBullets.splice(i,1);
                if(lives<=0){endGame();return;}
            }
        }

        // Aliens reach bottom
        for(const a of aliens){
            if(a.alive&&a.y+a.h>=ship.y){endGame();return;}
        }

        // Check wave clear
        if(aliens.every(a=>!a.alive)){
            wave++;buildAliens();updateHUD();
        }

        // Particles
        for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.03;if(p.life<=0)particles.splice(i,1);}
    }

    function draw(){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        // Stars
        ctx.fillStyle='rgba(169,158,196,.2)';
        for(let i=0;i<30;i++){ctx.beginPath();ctx.arc((i*197+frame*.2)%W,(i*131)%H,1,0,Math.PI*2);ctx.fill();}

        // Aliens
        for(const a of aliens){
            if(!a.alive)continue;
            ctx.fillStyle=a.color;
            // Body
            ctx.fillRect(a.x+3,a.y,a.w-6,a.h);
            ctx.fillRect(a.x,a.y+4,a.w,a.h-8);
            // Eyes
            ctx.fillStyle='#0f0a1e';
            ctx.fillRect(a.x+6,a.y+5,4,4);
            ctx.fillRect(a.x+a.w-10,a.y+5,4,4);
            // Legs
            ctx.fillStyle=a.color;
            const legOff=frame%20<10?0:2;
            ctx.fillRect(a.x+2,a.y+a.h,3,3+legOff);
            ctx.fillRect(a.x+a.w-5,a.y+a.h,3,3-legOff+2);
        }

        // Ship
        ctx.fillStyle='#ffd166';
        ctx.beginPath();
        ctx.moveTo(ship.x+SHIP_W/2,ship.y);
        ctx.lineTo(ship.x,ship.y+SHIP_H);
        ctx.lineTo(ship.x+SHIP_W,ship.y+SHIP_H);
        ctx.closePath();ctx.fill();
        ctx.shadowColor='#ffd166';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
        // Ship body
        ctx.fillStyle='#f59e0b';
        ctx.fillRect(ship.x+SHIP_W/2-5,ship.y+6,10,SHIP_H-6);

        // Player bullets
        ctx.fillStyle='#00e5ff';
        for(const b of bullets){ctx.fillRect(b.x,b.y,BULLET_W,BULLET_H);ctx.shadowColor='#00e5ff';ctx.shadowBlur=6;ctx.fillRect(b.x,b.y,BULLET_W,BULLET_H);ctx.shadowBlur=0;}

        // Alien bullets
        for(const b of alienBullets){ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,3,8);}

        // Particles
        for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
        ctx.globalAlpha=1;
    }

    function endGame(){
        state='dead';
        var _b=+localStorage.getItem('mg_best_invaders')||0;if(score>_b)localStorage.setItem('mg_best_invaders',String(score));
        oTitle.textContent='Game Over!';oSub.textContent='Press Space or Tap Fire to Retry';
        oScore.style.display='block';oScore.textContent='Score: '+score+' | Wave: '+wave;
        document.getElementById('startBtn').textContent='Retry';
        overlay.classList.remove('hidden');
    }

    function loop(){if(state!=='running')return;update();draw();requestAnimationFrame(loop);}
    (function(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);})();
})();
</script>
</body>
</html>
