<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏃 Lode Runner — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--blue);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--yellow),var(--blue));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:420px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.15rem;font-weight:800;margin-top:2px}
.s-val{color:var(--yellow)}.hi-val{color:var(--orange)}.g-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#0a0a1a}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--yellow);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--yellow),var(--blue));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:6px;margin-top:10px}
.ctrl-pad{display:flex;flex-direction:column;gap:4px;align-items:center}
.ctrl-row{display:flex;gap:6px}
.ctrl-btn{width:56px;height:48px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.1rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🏃 Lode Runner</span></div>
<header><h1>Lode Runner</h1><p>Collect all gold and escape!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
        <div class="hud-box"><div class="label">Gold</div><div class="value g-val" id="hGold">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="400" height="360"></canvas>
        <div class="overlay" id="overlay">
            <h2>🏃 Lode Runner</h2>
            <div class="sub">Collect all gold! Dig holes to trap enemies.<br>Arrows to move, Z/X to dig left/right.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Run!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <div class="ctrl-pad">
            <div class="ctrl-row"><button class="ctrl-btn" id="btnU">▲</button></div>
            <div class="ctrl-row"><button class="ctrl-btn" id="btnDl" style="font-size:.7rem">DIG◄</button><button class="ctrl-btn" id="btnL">◄</button><button class="ctrl-btn" id="btnD">▼</button><button class="ctrl-btn" id="btnR">►</button><button class="ctrl-btn" id="btnDr" style="font-size:.7rem">DIG►</button></div>
        </div>
    </div>
</div>
<div class="game-footer">Lode Runner &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_loderunner',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=400,H=360;
const overlay=document.getElementById('overlay'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hGold=document.getElementById('hGold');
const BEST_KEY='loderunner_best';
let best=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=best;
const COLS=20,ROWS=18,CW=W/COLS,CH=H/ROWS;
const keys={up:false,down:false,left:false,right:false,digL:false,digR:false};
let grid,player,enemies,goldTotal,goldLeft,score,level,state='idle',frame,moveCD;
// 0=empty,1=brick,2=ladder,3=bar,4=gold,5=dug(timer)

const LEVELS=[ // simple procedural
    ()=>{
        const g=Array.from({length:ROWS},()=>Array(COLS).fill(0));
        // Floor
        for(let c=0;c<COLS;c++)g[ROWS-1][c]=1;
        // Platforms
        for(let r=4;r<ROWS-1;r+=3){
            const gap=2+Math.floor(Math.random()*3);
            for(let c=0;c<COLS;c++){
                if(Math.abs(c-gap)>1&&Math.abs(c-(COLS-1-gap))>1)g[r][c]=1;
            }
            // Ladders
            g[r][gap]=2;g[r-1][gap]=2;g[r-2][gap]=2;
            const gap2=COLS-1-gap;
            g[r][gap2]=2;g[r-1][gap2]=2;g[r-2][gap2]=2;
            // Bars
            const bStart=6+Math.floor(Math.random()*3);
            for(let c=bStart;c<bStart+4&&c<COLS;c++)if(g[r-1][c]===0)g[r-1][c]=3;
        }
        // Gold
        let gCount=0;
        for(let i=0;i<6;i++){
            const r=3+Math.floor(Math.random()*(ROWS-5));
            const c=1+Math.floor(Math.random()*(COLS-2));
            if(g[r][c]===0&&g[r+1]&&(g[r+1][c]===1||g[r+1][c]===2)){g[r][c]=4;gCount++;}
        }
        return {grid:g,gold:gCount,px:1,py:ROWS-2,enemies:[[COLS-2,1],[Math.floor(COLS/2),4]]};
    }
];

function initLevel(){
    const lv=LEVELS[0]();
    grid=lv.grid;goldTotal=lv.gold;goldLeft=lv.gold;
    hGold.textContent=goldLeft;
    player={x:lv.px,y:lv.py};
    enemies=lv.enemies.map(([x,y])=>({x,y,dir:1,moveCD:0}));
    moveCD=0;
}

function startGame(){
    score=0;level=1;frame=0;hScore.textContent=0;
    initLevel();state='running';overlay.classList.add('hidden');oScore.style.display='none';
    requestAnimationFrame(loop);
}

function isSupported(x,y){
    if(y>=ROWS-1)return true;
    const below=grid[y+1]?grid[y+1][x]:1;
    return below===1||below===2||grid[y][x]===2||grid[y][x]===3;
}

function dig(dx){
    if(state!=='running')return;
    const dc=dx;const r=player.y+1,c=player.x+dc;
    if(r<0||r>=ROWS||c<0||c>=COLS)return;
    if(grid[r][c]===1){grid[r][c]=5;setTimeout(()=>{if(grid[r][c]===5)grid[r][c]=1;},3000);}
}

function update(){
    if(state!=='running')return;
    frame++;moveCD++;
    if(moveCD>=6){
        moveCD=0;
        let moved=false;
        if(keys.left&&player.x>0&&grid[player.y][player.x-1]!==1){player.x--;moved=true;}
        else if(keys.right&&player.x<COLS-1&&grid[player.y][player.x+1]!==1){player.x++;moved=true;}
        else if(keys.up&&grid[player.y][player.x]===2&&player.y>0){player.y--;moved=true;}
        else if(keys.down&&player.y<ROWS-1&&(grid[player.y+1][player.x]!==1||grid[player.y][player.x]===2)){player.y++;moved=true;}
        // Gravity
        if(!isSupported(player.x,player.y)&&grid[player.y][player.x]!==2&&grid[player.y][player.x]!==3){
            player.y++;
        }
        // Collect gold
        if(grid[player.y][player.x]===4){grid[player.y][player.x]=0;goldLeft--;hGold.textContent=goldLeft;score+=100;hScore.textContent=score;}
        if(keys.digL)dig(-1);if(keys.digR)dig(1);keys.digL=false;keys.digR=false;
    }
    // Enemies
    enemies.forEach(e=>{
        e.moveCD--;
        if(e.moveCD<=0){
            e.moveCD=10;
            // Fall
            if(!isSupported(e.x,e.y)&&grid[e.y][e.x]!==2&&grid[e.y][e.x]!==3){
                if(grid[e.y+1]&&grid[e.y+1][e.x]===5){/* stuck */return;}
                e.y++;return;
            }
            // Chase
            const dx=player.x-e.x,dy=player.y-e.y;
            if(Math.abs(dx)>Math.abs(dy)){
                const nc=e.x+(dx>0?1:-1);
                if(nc>=0&&nc<COLS&&grid[e.y][nc]!==1)e.x=nc;
                else if(grid[e.y][e.x]===2&&dy!==0)e.y+=dy>0?1:-1;
            } else {
                if(grid[e.y][e.x]===2&&dy!==0){const nr=e.y+(dy>0?1:-1);if(nr>=0&&nr<ROWS)e.y=nr;}
                else{const nc=e.x+(dx>0?1:-1);if(nc>=0&&nc<COLS&&grid[e.y][nc]!==1)e.x=nc;}
            }
        }
        if(e.x===player.x&&e.y===player.y){
            state='over';endGame();
        }
    });
    
    // Win check
    if(goldLeft<=0){score+=500;hScore.textContent=score;level++;initLevel();}
}

function endGame(){
    if(score>best){best=score;localStorage.setItem(BEST_KEY,best);hBest.textContent=best;}
    oScore.style.display='block';oScore.textContent='Score: '+score;
    document.getElementById('startBtn').textContent='Play Again';
    overlay.classList.remove('hidden');
}

function draw(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            const x=c*CW,y=r*CH,v=grid[r][c];
            if(v===1){ctx.fillStyle='#6B4F10';ctx.fillRect(x,y,CW,CH);ctx.fillStyle='#8B6914';ctx.fillRect(x+1,y+1,CW-2,CH-2);}
            else if(v===2){ctx.fillStyle='#06d6a0';ctx.fillRect(x+CW/2-2,y,4,CH);ctx.fillRect(x+2,y+CH/2-1,CW-4,2);}
            else if(v===3){ctx.fillStyle='#a855f7';ctx.fillRect(x,y+CH/2-1,CW,3);}
            else if(v===4){ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(x+CW/2,y+CH/2,CW*0.3,0,Math.PI*2);ctx.fill();}
            else if(v===5){ctx.fillStyle='#1a0a00';ctx.fillRect(x,y,CW,CH);}
        }
    }
    // Player
    ctx.fillStyle='#00e5ff';ctx.fillRect(player.x*CW+2,player.y*CH+2,CW-4,CH-4);
    // Enemies
    enemies.forEach(e=>{ctx.fillStyle='#ff6b9d';ctx.fillRect(e.x*CW+2,e.y*CH+2,CW-4,CH-4);});
}

function loop(){update();draw();if(state==='running')requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp')keys.up=true;if(e.key==='ArrowDown')keys.down=true;
    if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;
    if(e.key==='z'||e.key==='Z')keys.digL=true;if(e.key==='x'||e.key==='X')keys.digR=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='ArrowUp')keys.up=false;if(e.key==='ArrowDown')keys.down=false;
    if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;
});
const bMap={btnU:'up',btnD:'down',btnL:'left',btnR:'right'};
Object.entries(bMap).forEach(([id,k])=>{
    document.getElementById(id).addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true;},{passive:false});
    document.getElementById(id).addEventListener('touchend',()=>keys[k]=false);
});
document.getElementById('btnDl').addEventListener('touchstart',e=>{e.preventDefault();dig(-1);},{passive:false});
document.getElementById('btnDr').addEventListener('touchstart',e=>{e.preventDefault();dig(1);},{passive:false});

document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
