<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 Lunar Lander — Mini Games Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--text-light:#f0e6ff;--text-muted:#a99ec4}
body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--blue);top:-100px;left:-100px}
.bg-blob:nth-child(2){width:350px;height:350px;background:var(--orange);bottom:-80px;right:-80px}
.top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
.back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem}
.game-badge{background:linear-gradient(135deg,var(--blue),var(--orange));color:#fff;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
header{position:relative;z-index:10;text-align:center;padding:18px 20px 8px}
header h1{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--text-muted);margin-top:4px;font-size:.9rem}
.game-container{position:relative;z-index:10;max-width:440px;margin:10px auto;padding:0 12px}
.hud{display:flex;justify-content:space-around;margin-bottom:10px;gap:8px}
.hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:8px 14px;text-align:center;flex:1}
.hud-box .label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.hud-box .value{font-size:1.05rem;font-weight:800;margin-top:2px}
.s-val{color:var(--blue)}.hi-val{color:var(--yellow)}.f-val{color:var(--orange)}.v-val{color:var(--green)}
.canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:#050510}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,30,.88);z-index:5}
.overlay.hidden{opacity:0;pointer-events:none;transition:opacity .3s}
.overlay h2{font-size:1.7rem;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--blue),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overlay .sub{color:var(--text-muted);margin-bottom:14px;font-size:.9rem;text-align:center;padding:0 20px}
.overlay .final-score{color:var(--blue);font-size:1.2rem;font-weight:800;margin-bottom:12px}
.start-btn{background:linear-gradient(135deg,var(--blue),var(--orange));color:#fff;border:none;padding:14px 40px;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer}
.mobile-controls{display:none;justify-content:center;gap:12px;margin-top:10px}
.ctrl-btn{width:64px;height:54px;border-radius:12px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-light);font-size:1.2rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
@media(max-width:768px){.mobile-controls{display:flex}}
.game-footer{position:relative;z-index:10;text-align:center;padding:20px;color:var(--text-muted);font-size:.8rem}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar"><a href="../index.html" class="back-link">&#8592; Back to Games</a><span class="game-badge">🚀 Lunar Lander</span></div>
<header><h1>Lunar Lander</h1><p>Land safely on the pad!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value s-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Fuel</div><div class="value f-val" id="hFuel">100</div></div>
        <div class="hud-box"><div class="label">V Speed</div><div class="value v-val" id="hVel">0</div></div>
        <div class="hud-box"><div class="label">Best</div><div class="value hi-val" id="hBest">0</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="420" height="380"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Lunar Lander</h2>
            <div class="sub" id="oSub">Use thrust to land softly on the pad!<br>◄► to move, ▲ or Space for thrust.</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Launch!</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="ctrl-btn" id="btnL">◄</button>
        <button class="ctrl-btn" id="btnT">🔥</button>
        <button class="ctrl-btn" id="btnR">►</button>
    </div>
</div>
<div class="game-footer">Lunar Lander &bull; Mini Games Arcade</div>
<script>
(function(){var k='mg_plays_lunar',c=+localStorage.getItem(k)||0;localStorage.setItem(k,c+1)})();
(function(){
'use strict';
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
const hScore=document.getElementById('hScore'),hBest=document.getElementById('hBest'),hFuel=document.getElementById('hFuel'),hVel=document.getElementById('hVel');
const BEST_KEY='lunar_best';
let bestScore=+localStorage.getItem(BEST_KEY)||0;hBest.textContent=bestScore;

const GRAVITY=0.03,THRUST=0.08,SAFE_VEL=1.5;
let state='idle',score,level,lander,terrain,padX,padW,stars,particles,af;
const keys={};let mobileL=false,mobileR=false,mobileT=false;

function genTerrain(){
    terrain=[];
    const segs=20;
    padX=100+Math.random()*(W-250);padW=50;
    for(let i=0;i<=segs;i++){
        const x=i*W/segs;
        let y=H-40-Math.random()*80;
        // Flatten pad area
        if(x>=padX-10&&x<=padX+padW+10)y=H-40;
        terrain.push({x,y});
    }
}

function genStars(){stars=[];for(let i=0;i<40;i++)stars.push({x:Math.random()*W,y:Math.random()*H*0.6,s:0.5+Math.random()});}

function startGame(){
    score=0;level=1;genStars();newLevel();
    state='running';overlay.classList.add('hidden');hScore.textContent=0;
    if(af)cancelAnimationFrame(af);af=requestAnimationFrame(loop);
}

function newLevel(){
    genTerrain();
    lander={x:W/2,y:30,vx:0,vy:0,fuel:100,angle:0};
    particles=[];
    hFuel.textContent=100;hVel.textContent='0.0';
}

function loop(){if(state!=='running')return;update();draw();af=requestAnimationFrame(loop);}

function update(){
    // Gravity
    lander.vy+=GRAVITY;
    // Controls
    let thrusting=keys.ArrowUp||keys[' ']||keys.w||mobileT;
    if(thrusting&&lander.fuel>0){
        lander.vy-=THRUST;lander.fuel=Math.max(0,lander.fuel-0.3);
        hFuel.textContent=Math.round(lander.fuel);
        // Particles
        for(let i=0;i<2;i++){
            particles.push({x:lander.x,y:lander.y+10,vx:(Math.random()-0.5)*2,vy:2+Math.random()*2,life:20,color:'#ff8a47'});
        }
    }
    if(keys.ArrowLeft||keys.a||mobileL)lander.vx-=0.05;
    if(keys.ArrowRight||keys.d||mobileR)lander.vx+=0.05;
    lander.x+=lander.vx;lander.y+=lander.vy;
    // Walls
    if(lander.x<10)lander.x=10;if(lander.x>W-10)lander.x=W-10;
    // Particles
    particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
    hVel.textContent=Math.abs(lander.vy).toFixed(1);
    // Ground collision
    const groundY=getGroundY(lander.x);
    if(lander.y+8>=groundY){
        lander.y=groundY-8;
        const onPad=lander.x>=padX&&lander.x<=padX+padW;
        const softLanding=Math.abs(lander.vy)<SAFE_VEL&&Math.abs(lander.vx)<1;
        if(onPad&&softLanding){
            const bonus=Math.round(lander.fuel*10);
            score+=100+bonus;hScore.textContent=score;
            level++;
            setTimeout(newLevel,800);
        } else {
            endGame(onPad?'Too fast!':'Missed the pad!');
        }
    }
}

function getGroundY(x){
    for(let i=0;i<terrain.length-1;i++){
        if(x>=terrain[i].x&&x<=terrain[i+1].x){
            const t=(x-terrain[i].x)/(terrain[i+1].x-terrain[i].x);
            return terrain[i].y*(1-t)+terrain[i+1].y*t;
        }
    }
    return H-40;
}

function draw(){
    ctx.fillStyle='#050510';ctx.fillRect(0,0,W,H);
    // Stars
    stars.forEach(s=>{ctx.fillStyle=`rgba(240,230,255,${0.3+s.s*0.3})`;ctx.fillRect(s.x,s.y,1.5,1.5);});
    // Terrain
    ctx.fillStyle='#2a2a4a';ctx.beginPath();ctx.moveTo(0,H);
    terrain.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#4a4a6a';ctx.lineWidth=2;ctx.beginPath();
    terrain.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    // Landing pad
    ctx.fillStyle='#06d6a0';ctx.fillRect(padX,H-42,padW,4);
    ctx.fillStyle='rgba(6,214,160,0.2)';ctx.fillRect(padX,H-42,padW,2);
    // Lander
    ctx.fillStyle='#f0e6ff';
    ctx.beginPath();ctx.moveTo(lander.x,lander.y-8);ctx.lineTo(lander.x-8,lander.y+8);
    ctx.lineTo(lander.x+8,lander.y+8);ctx.closePath();ctx.fill();
    ctx.fillStyle='#00e5ff';ctx.fillRect(lander.x-10,lander.y+8,20,3);
    // Legs
    ctx.strokeStyle='#a99ec4';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(lander.x-8,lander.y+8);ctx.lineTo(lander.x-12,lander.y+14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(lander.x+8,lander.y+8);ctx.lineTo(lander.x+12,lander.y+14);ctx.stroke();
    // Particles
    particles.forEach(p=>{
        ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();
    });ctx.globalAlpha=1;
    // Level indicator
    ctx.fillStyle='var(--text-muted)';ctx.font='12px sans-serif';ctx.textAlign='left';
    ctx.fillText('Level '+level,10,H-10);
}

function endGame(msg){
    state='dead';if(af)cancelAnimationFrame(af);
    if(score>bestScore){bestScore=score;localStorage.setItem(BEST_KEY,bestScore);hBest.textContent=bestScore;}
    oTitle.textContent='Crashed!';oSub.textContent=msg;oScore.textContent='Score: '+score;oScore.style.display='block';
    overlay.classList.remove('hidden');document.getElementById('startBtn').textContent='Retry';
}

document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
const bL=document.getElementById('btnL'),bR=document.getElementById('btnR'),bT=document.getElementById('btnT');
bL.addEventListener('touchstart',e=>{e.preventDefault();mobileL=true},{passive:false});bL.addEventListener('touchend',()=>mobileL=false);
bR.addEventListener('touchstart',e=>{e.preventDefault();mobileR=true},{passive:false});bR.addEventListener('touchend',()=>mobileR=false);
bT.addEventListener('touchstart',e=>{e.preventDefault();mobileT=true},{passive:false});bT.addEventListener('touchend',()=>mobileT=false);
document.getElementById('startBtn').addEventListener('click',startGame);
})();
</script>
</body>
</html>
