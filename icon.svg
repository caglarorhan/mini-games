<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0f0a1e"/>
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#g1)" opacity=".18"/>
  <!-- Gamepad body -->
  <rect x="116" y="196" width="280" height="160" rx="80" fill="url(#g1)"/>
  <!-- D-pad -->
  <rect x="172" y="252" width="40" height="12" rx="3" fill="#f0e6ff"/>
  <rect x="186" y="238" width="12" height="40" rx="3" fill="#f0e6ff"/>
  <!-- Buttons -->
  <circle cx="332" cy="250" r="10" fill="#ff6b9d"/>
  <circle cx="356" cy="268" r="10" fill="#00e5ff"/>
  <circle cx="308" cy="268" r="10" fill="#ffd166"/>
  <circle cx="332" cy="286" r="10" fill="#06d6a0"/>
  <!-- Sticks -->
  <circle cx="206" cy="308" r="16" fill="rgba(255,255,255,0.15)" stroke="#f0e6ff" stroke-width="2"/>
  <circle cx="316" cy="308" r="16" fill="rgba(255,255,255,0.15)" stroke="#f0e6ff" stroke-width="2"/>
  <!-- Title -->
  <text x="256" y="168" font-size="72" font-weight="900" text-anchor="middle" fill="url(#g2)" font-family="system-ui,sans-serif">ARCADE</text>
  <!-- Decorative dots -->
  <circle cx="152" cy="420" r="6" fill="#00e5ff" opacity=".6"/>
  <circle cx="256" cy="430" r="5" fill="#ffd166" opacity=".6"/>
  <circle cx="360" cy="420" r="6" fill="#ff6b9d" opacity=".6"/>
