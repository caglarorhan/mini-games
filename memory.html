<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#127183; Memory Match — Mini Games Arcade</title>
<style>
  :root {
    --bg-dark: #0f0a1e;
    --bg-card: #1a1333;
    --border: #2a1f4e;
    --pink: #ff6b9d;
    --orange: #ff8a47;
    --yellow: #ffd166;
    --green: #06d6a0;
    --cyan: #00e5ff;
    --blue: #118ab2;
    --purple: #a855f7;
    --deep-purple: #7c3aed;
    --text-light: #f0e6ff;
    --text-muted: #a99ec4;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-dark); color: var(--text-light); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

  .bg-shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-shapes .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; animation: blobFloat 20s ease-in-out infinite alternate; }
  .blob:nth-child(1) { width: 350px; height: 350px; background: var(--purple); top: -10%; right: -5%; animation-duration: 24s; }
  .blob:nth-child(2) { width: 300px; height: 300px; background: var(--pink); bottom: -5%; left: -5%; animation-duration: 20s; animation-delay: -6s; }
  .blob:nth-child(3) { width: 250px; height: 250px; background: var(--cyan); top: 40%; left: 50%; animation-duration: 28s; animation-delay: -12s; }
  @keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-20px) scale(1.1); } 100% { transform: translate(-20px,30px) scale(0.95); } }

  .page-content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }
  .top-bar { width: 100%; max-width: 560px; padding: 20px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; padding: 8px 16px; border-radius: 50px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s; }
  .back-link:hover { color: var(--cyan); border-color: rgba(0,229,255,0.3); }
  .game-badge { display: inline-block; background: linear-gradient(135deg, var(--purple), var(--deep-purple)); color: white; padding: 5px 14px; border-radius: 50px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

  header { width: 100%; text-align: center; padding: 24px 0 12px; }
  .title { font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 900; background: linear-gradient(135deg, var(--purple), var(--pink), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 4px; text-transform: uppercase; }
  .title-sub { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }

  .game-container { padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; max-width: 560px; }

  .hud { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .hud-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; text-align: center; }
  .hud-label { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
  .hud-value { font-size: 1.1rem; font-weight: 800; }
  .hud-box:nth-child(1) .hud-value { color: var(--purple); }
  .hud-box:nth-child(2) .hud-value { color: var(--pink); }
  .hud-box:nth-child(3) .hud-value { color: var(--yellow); }

  .difficulty { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .diff-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-muted); font-family: inherit; font-size: 0.82rem; font-weight: 600; padding: 8px 16px; cursor: pointer; border-radius: 50px; transition: all 0.2s; }
  .diff-btn:hover { border-color: var(--purple); color: var(--purple); }
  .diff-btn.active { border-color: var(--purple); color: white; background: linear-gradient(135deg, var(--purple), var(--deep-purple)); }

  .board { display: grid; gap: 10px; perspective: 800px; justify-content: center; }
  .board.size-4 { grid-template-columns: repeat(4, 1fr); max-width: 360px; }
  .board.size-6 { grid-template-columns: repeat(4, 1fr); max-width: 360px; }
  .board.size-8 { grid-template-columns: repeat(4, 1fr); max-width: 400px; }

  .card { width: 72px; height: 90px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); }
  .card.matched .card-front { box-shadow: 0 0 20px rgba(6,214,160,0.5); border-color: var(--green); }

  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
  .card-back { background: linear-gradient(135deg, var(--bg-card), #231a44); font-size: 1.6rem; }
  .card-front { background: var(--bg-card); transform: rotateY(180deg); font-size: 2rem; }

  .win-msg { text-align: center; padding: 20px; }
  .win-msg h2 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .win-msg p { color: var(--text-muted); margin-bottom: 16px; }
  .win-msg button { font-family: inherit; font-size: 0.85rem; font-weight: 800; background: linear-gradient(135deg, var(--purple), var(--pink)); border: none; color: white; padding: 12px 28px; cursor: pointer; border-radius: 50px; transition: all 0.2s; }
  .win-msg button:hover { transform: scale(1.06); }

  .game-footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.78rem; }
  .game-footer a { color: var(--cyan); text-decoration: none; }

  @media (max-width: 400px) {
    .card { width: 60px; height: 76px; }
    .board { gap: 8px; }
  }
</style>
</head>
<body>
<div class="bg-shapes"><div class="blob"></div><div class="blob"></div><div class="blob"></div></div>
<div class="page-content">
  <div class="top-bar">
    <a href="index.html" class="back-link">&#8592; Home</a>
    <span class="game-badge">Brain &middot; Chill</span>
  </div>
  <header>
    <div class="title">&#127183; Memory Match</div>
    <p class="title-sub">Flip cards, find pairs, question your memory.</p>
  </header>
  <div class="game-container">
    <div class="hud">
      <div class="hud-box"><div class="hud-label">Moves</div><div class="hud-value" id="moves-val">0</div></div>
      <div class="hud-box"><div class="hud-label">Pairs</div><div class="hud-value" id="pairs-val">0 / 0</div></div>
      <div class="hud-box"><div class="hud-label">Time</div><div class="hud-value" id="time-val">0:00</div></div>
    </div>
    <div class="difficulty">
      <button class="diff-btn active" data-pairs="6">Easy (6)</button>
      <button class="diff-btn" data-pairs="8">Medium (8)</button>
      <button class="diff-btn" data-pairs="10">Hard (10)</button>
    </div>
    <div class="board size-4" id="board"></div>
    <div class="win-msg" id="win-msg" style="display:none">
      <h2>&#127881; You Won!</h2>
      <p id="win-stats"></p>
      <button id="play-again">Play Again</button>
    </div>
  </div>
  <div class="game-footer"><p>Made with &#10084;&#65039; for <a href="index.html">Mini Games Arcade</a></p></div>
</div>

<script>
var EMOJIS = ['&#128049;','&#128054;','&#128025;','&#129412;','&#128038;','&#127800;','&#127803;','&#127752;','&#9978;&#65039;','&#127942;','&#128142;','&#127880;','&#128640;','&#127775;','&#128171;'];
var boardEl = document.getElementById('board');
var movesEl = document.getElementById('moves-val');
var pairsEl = document.getElementById('pairs-val');
var timeEl = document.getElementById('time-val');
var winMsg = document.getElementById('win-msg');
var winStats = document.getElementById('win-stats');
var playAgain = document.getElementById('play-again');

var pairCount = 6;
var cards = [];
var flippedCards = [];
var matchedCount = 0;
var moves = 0;
var timer = null;
var seconds = 0;
var locked = false;

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function startGame() {
  clearInterval(timer);
  seconds = 0; moves = 0; matchedCount = 0; locked = false;
  flippedCards = [];
  winMsg.style.display = 'none';
  timeEl.textContent = '0:00';
  movesEl.textContent = '0';

  var emojis = shuffle(EMOJIS.slice()).slice(0, pairCount);
  var deck = shuffle(emojis.concat(emojis));
  cards = deck;

  // Board class
  boardEl.className = 'board';
  if (pairCount <= 6) boardEl.classList.add('size-4');
  else if (pairCount <= 8) boardEl.classList.add('size-6');
  else boardEl.classList.add('size-8');

  boardEl.innerHTML = '';
  for (var i = 0; i < deck.length; i++) {
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.index = i;
    card.innerHTML = '<div class="card-face card-back">&#10068;</div><div class="card-face card-front">' + deck[i] + '</div>';
    card.addEventListener('click', onCardClick);
    boardEl.appendChild(card);
  }

  pairsEl.textContent = '0 / ' + pairCount;

  timer = setInterval(function() {
    seconds++;
    var m = Math.floor(seconds / 60);
    var s = seconds % 60;
    timeEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }, 1000);
}

function onCardClick() {
  if (locked) return;
  var idx = parseInt(this.dataset.index);
  if (this.classList.contains('flipped') || this.classList.contains('matched')) return;

  this.classList.add('flipped');
  flippedCards.push({el: this, idx: idx});

  if (flippedCards.length === 2) {
    moves++;
    movesEl.textContent = moves;
    locked = true;

    var a = flippedCards[0], b = flippedCards[1];
    if (cards[a.idx] === cards[b.idx]) {
      a.el.classList.add('matched');
      b.el.classList.add('matched');
      matchedCount++;
      pairsEl.textContent = matchedCount + ' / ' + pairCount;
      flippedCards = [];
      locked = false;

      if (matchedCount === pairCount) {
        clearInterval(timer);
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        winStats.textContent = moves + ' moves in ' + m + ':' + (s < 10 ? '0' : '') + s;
        winMsg.style.display = 'block';
      }
    } else {
      setTimeout(function() {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        flippedCards = [];
        locked = false;
      }, 800);
    }
  }
}

document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    pairCount = parseInt(btn.dataset.pairs);
    startGame();
  });
});

playAgain.addEventListener('click', startGame);

startGame();
</script>
</body>
</html>
