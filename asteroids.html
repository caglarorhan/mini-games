<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids - Mini Games Arcade</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg-dark:#0f0a1e;--bg-card:#1a1333;--border:#2a1f4e;--pink:#ff6b9d;--orange:#ff8a47;--yellow:#ffd166;--green:#06d6a0;--cyan:#00e5ff;--blue:#118ab2;--purple:#a855f7;--deep-purple:#7c3aed;--text-light:#f0e6ff;--text-muted:#a99ec4}
    body{background:var(--bg-dark);color:var(--text-light);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
    .bg-shapes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18}
    .bg-blob:nth-child(1){width:400px;height:400px;background:var(--yellow);top:-100px;left:-100px}
    .bg-blob:nth-child(2){width:350px;height:350px;background:var(--pink);bottom:-80px;right:-80px}
    .bg-blob:nth-child(3){width:300px;height:300px;background:var(--cyan);top:50%;left:50%;transform:translate(-50%,-50%)}
    .top-bar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(15,10,30,.85);border-bottom:1px solid var(--border)}
    .back-link{color:var(--cyan);text-decoration:none;font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-link:hover{color:var(--green)}
    .game-badge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:700}
    header{position:relative;z-index:10;text-align:center;padding:28px 20px 10px}
    header h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--yellow),var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{color:var(--text-muted);margin-top:6px;font-size:.95rem}
    .game-container{position:relative;z-index:10;max-width:660px;margin:20px auto;padding:0 16px}
    .hud{display:flex;justify-content:space-around;margin-bottom:14px;gap:10px;flex-wrap:wrap}
    .hud-box{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;text-align:center;min-width:80px}
    .hud-box .label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .hud-box .value{font-size:1.3rem;font-weight:800;margin-top:2px}
    .sc-val{color:var(--yellow)}.lv-val{color:var(--cyan)}.li-val{color:var(--pink)}
    .canvas-wrap{position:relative;border-radius:14px;overflow:hidden;border:2px solid var(--border);box-shadow:0 0 30px rgba(255,209,102,.1);background:#000}
    canvas{display:block;width:100%;height:auto}
    .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.82);z-index:5;transition:opacity .3s}
    .overlay.hidden{opacity:0;pointer-events:none}
    .overlay h2{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--yellow),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .overlay .sub{color:var(--text-muted);margin-bottom:18px;font-size:.95rem;text-align:center;line-height:1.6}
    .overlay .final-score{color:var(--yellow);font-size:1.3rem;font-weight:800;margin-bottom:14px}
    .start-btn{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;border:none;padding:14px 40px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s}
    .start-btn:hover{transform:translateY(-2px)}
    .mobile-controls{display:none;margin-top:14px;text-align:center;gap:8px;justify-content:center;flex-wrap:wrap}
    .mob-btn{background:linear-gradient(135deg,var(--deep-purple),var(--purple));color:#fff;border:none;padding:14px 20px;border-radius:14px;font-size:.95rem;font-weight:800;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
    @media(max-width:768px){.mobile-controls{display:flex}}
    @media(max-width:500px){header h1{font-size:1.6rem}}
    .game-footer{position:relative;z-index:10;text-align:center;padding:30px 20px;color:var(--text-muted);font-size:.8rem;margin-top:20px}
</style>
</head>
<body>
<div class="bg-shapes"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>
<div class="top-bar">
    <a href="index.html" class="back-link">&#8592; Back to Games</a>
    <span class="game-badge">&#9732;&#65039; Asteroids</span>
</div>
<header><h1>Asteroids</h1><p>Rotate, thrust &amp; blast those space rocks!</p></header>
<div class="game-container">
    <div class="hud">
        <div class="hud-box"><div class="label">Score</div><div class="value sc-val" id="hScore">0</div></div>
        <div class="hud-box"><div class="label">Level</div><div class="value lv-val" id="hLevel">1</div></div>
        <div class="hud-box"><div class="label">Lives</div><div class="value li-val" id="hLives">3</div></div>
    </div>
    <div class="canvas-wrap">
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="oTitle">Asteroids</h2>
            <div class="sub" id="oSub">Arrows to move, Space to shoot<br>Up = thrust, Left/Right = rotate</div>
            <div class="final-score" id="oScore" style="display:none"></div>
            <button class="start-btn" id="startBtn">Start</button>
        </div>
    </div>
    <div class="mobile-controls">
        <button class="mob-btn" id="btnRotL">&#8634;</button>
        <button class="mob-btn" id="btnThrust">&#9650;</button>
        <button class="mob-btn" id="btnRotR">&#8635;</button>
        <button class="mob-btn" id="btnFire">FIRE</button>
    </div>
</div>
<div class="game-footer">Asteroids &bull; Mini Games Arcade</div>
<script>
(function(){
    const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    const overlay=document.getElementById('overlay'),oTitle=document.getElementById('oTitle'),oSub=document.getElementById('oSub'),oScore=document.getElementById('oScore');
    const hScore=document.getElementById('hScore'),hLevel=document.getElementById('hLevel'),hLives=document.getElementById('hLives');
    const TAU=Math.PI*2;

    let state='idle',score,lives,level,ship,asteroids,bullets,particles,frame;
    let keys={};

    document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space'){e.preventDefault();if(state!=='running')startGame();else shoot();}});
    document.addEventListener('keyup',e=>{keys[e.code]=false;});
    document.getElementById('startBtn').addEventListener('click',()=>{if(state!=='running')startGame();});

    // Mobile
    let mobRotL=false,mobRotR=false,mobThrust=false;
    const bRL=document.getElementById('btnRotL'),bRR=document.getElementById('btnRotR'),bTh=document.getElementById('btnThrust'),bFi=document.getElementById('btnFire');
    bRL.addEventListener('touchstart',e=>{e.preventDefault();mobRotL=true;});bRL.addEventListener('touchend',()=>{mobRotL=false;});
    bRR.addEventListener('touchstart',e=>{e.preventDefault();mobRotR=true;});bRR.addEventListener('touchend',()=>{mobRotR=false;});
    bTh.addEventListener('touchstart',e=>{e.preventDefault();mobThrust=true;});bTh.addEventListener('touchend',()=>{mobThrust=false;});
    bFi.addEventListener('touchstart',e=>{e.preventDefault();if(state==='running')shoot();else startGame();});

    function spawnAsteroids(n){
        for(let i=0;i<n;i++){
            let x,y;
            do{x=Math.random()*W;y=Math.random()*H;}while(dist(x,y,ship.x,ship.y)<120);
            const angle=Math.random()*TAU;
            const speed=0.5+Math.random()*1.2;
            const r=35+Math.random()*15;
            asteroids.push(makeAsteroid(x,y,Math.cos(angle)*speed,Math.sin(angle)*speed,r));
        }
    }

    function makeAsteroid(x,y,vx,vy,r){
        // Random polygon
        const pts=[];
        const n=8+Math.floor(Math.random()*5);
        for(let i=0;i<n;i++){
            const a=(i/n)*TAU;
            const rr=r*(0.7+Math.random()*0.3);
            pts.push({x:Math.cos(a)*rr,y:Math.sin(a)*rr});
        }
        return {x,y,vx,vy,r,pts,rot:Math.random()*TAU,rotSpd:(Math.random()-.5)*0.02};
    }

    function startGame(){
        if(state==='idle'||state==='dead'){score=0;lives=3;level=1;}
        ship={x:W/2,y:H/2,angle:-Math.PI/2,vx:0,vy:0,invincible:0};
        asteroids=[];bullets=[];particles=[];frame=0;
        spawnAsteroids(3+level);
        state='running';overlay.classList.add('hidden');
        updateHUD();requestAnimationFrame(loop);
    }

    function updateHUD(){hScore.textContent=score;hLevel.textContent=level;hLives.textContent=lives;}

    let lastShot=0;
    function shoot(){
        if(frame-lastShot<10)return;
        const spd=7;
        bullets.push({x:ship.x+Math.cos(ship.angle)*14,y:ship.y+Math.sin(ship.angle)*14,vx:Math.cos(ship.angle)*spd+ship.vx*.5,vy:Math.sin(ship.angle)*spd+ship.vy*.5,life:60});
        lastShot=frame;
    }

    function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}

    function wrap(obj){
        if(obj.x<-50)obj.x=W+50;if(obj.x>W+50)obj.x=-50;
        if(obj.y<-50)obj.y=H+50;if(obj.y>H+50)obj.y=-50;
    }

    function addParticles(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:1,color:col,r:Math.random()*2+1});}

    function update(){
        frame++;
        // Ship rotation
        if(keys['ArrowLeft']||mobRotL)ship.angle-=0.06;
        if(keys['ArrowRight']||mobRotR)ship.angle+=0.06;
        // Thrust
        if(keys['ArrowUp']||mobThrust){
            ship.vx+=Math.cos(ship.angle)*0.12;
            ship.vy+=Math.sin(ship.angle)*0.12;
        }
        // Friction
        ship.vx*=0.99;ship.vy*=0.99;
        ship.x+=ship.vx;ship.y+=ship.vy;
        wrap(ship);
        if(ship.invincible>0)ship.invincible--;

        // Bullets
        for(let i=bullets.length-1;i>=0;i--){
            const b=bullets[i];
            b.x+=b.vx;b.y+=b.vy;b.life--;
            if(b.life<=0){bullets.splice(i,1);continue;}
            wrap(b);
        }

        // Asteroids
        for(const a of asteroids){
            a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpd;
            wrap(a);
        }

        // Bullet-asteroid collision
        for(let i=bullets.length-1;i>=0;i--){
            const b=bullets[i];
            for(let j=asteroids.length-1;j>=0;j--){
                const a=asteroids[j];
                if(dist(b.x,b.y,a.x,a.y)<a.r){
                    bullets.splice(i,1);
                    addParticles(a.x,a.y,'#a99ec4',6);
                    // Split
                    if(a.r>18){
                        const nr=a.r*0.55;
                        for(let k=0;k<2;k++){
                            const ang=Math.random()*TAU;
                            const spd=1+Math.random()*1.5;
                            asteroids.push(makeAsteroid(a.x,a.y,Math.cos(ang)*spd,Math.sin(ang)*spd,nr));
                        }
                    }
                    score+=Math.round(100/a.r*10);
                    asteroids.splice(j,1);
                    updateHUD();break;
                }
            }
        }

        // Ship-asteroid collision
        if(ship.invincible<=0){
            for(const a of asteroids){
                if(dist(ship.x,ship.y,a.x,a.y)<a.r+10){
                    lives--;updateHUD();
                    addParticles(ship.x,ship.y,'#ffd166',10);
                    if(lives<=0){endGame();return;}
                    ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;ship.invincible=120;
                    break;
                }
            }
        }

        // Level clear
        if(asteroids.length===0){level++;spawnAsteroids(3+level);updateHUD();}

        // Particles
        for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.025;if(p.life<=0)particles.splice(i,1);}
    }

    function draw(){
        ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
        // Stars
        ctx.fillStyle='rgba(169,158,196,.15)';
        for(let i=0;i<35;i++){ctx.beginPath();ctx.arc((i*173)%W,(i*113)%H,1,0,TAU);ctx.fill();}

        // Asteroids
        ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;
        for(const a of asteroids){
            ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
            ctx.beginPath();
            ctx.moveTo(a.pts[0].x,a.pts[0].y);
            for(let i=1;i<a.pts.length;i++)ctx.lineTo(a.pts[i].x,a.pts[i].y);
            ctx.closePath();ctx.stroke();
            ctx.restore();
        }

        // Ship
        if(ship.invincible>0&&frame%8<4){/* blink */}
        else{
            ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
            ctx.strokeStyle='#ffd166';ctx.lineWidth=2;
            ctx.beginPath();
            ctx.moveTo(14,0);ctx.lineTo(-10,8);ctx.lineTo(-6,0);ctx.lineTo(-10,-8);ctx.closePath();
            ctx.stroke();
            // Thrust flame
            if(keys['ArrowUp']||mobThrust){
                ctx.strokeStyle='#ff6b9d';ctx.lineWidth=1.5;
                ctx.beginPath();ctx.moveTo(-6,3);ctx.lineTo(-14-Math.random()*6,0);ctx.lineTo(-6,-3);ctx.stroke();
            }
            ctx.restore();
        }

        // Bullets
        ctx.fillStyle='#00e5ff';
        for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,2,0,TAU);ctx.fill();}

        // Particles
        for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();}
        ctx.globalAlpha=1;
    }

    function endGame(){
        state='dead';
        oTitle.textContent='Game Over!';oSub.textContent='Press Space or Tap Fire to Retry';
        oScore.style.display='block';oScore.textContent='Score: '+score+' | Level: '+level;
        document.getElementById('startBtn').textContent='Retry';
        overlay.classList.remove('hidden');
    }

    function loop(){if(state!=='running')return;update();draw();requestAnimationFrame(loop);}
    (function(){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);})();
})();
</script>
</body>
</html>
